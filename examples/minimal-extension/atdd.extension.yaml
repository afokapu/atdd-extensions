schema_version: "1.0.0"

extension_id: publisher-name.extension.minimal-example
version: "0.1.0"
kind: extension

role: coder
flow_wagon: validate-source-surface
feature: minimal-example

owns:
  conventions: []
  relationships: []
  implementations: []
  schemas: []
  gates: []
  scopes: []

depends_on:
  core:
    - atdd.core.extension-schema
  # A minimal extension targets no runtime. As soon as it ships an
  # implementation, declare the workspace provider it runs inside, e.g.:
  #   workspaces:
  #     - id: atdd.workspace.python-pytest
  #       contract: "^1.0.0"
  workspaces: []

removal_policy:
  allowed_if_no_external_dependents: true
