# Composition gate (afokapu/atdd#1132): continuously prove every package in this repo
# still COMPOSES against installed ATDD core. Installs the atdd toolkit (which ships the
# composition CLI + the core nodes/schema as package data) and runs `atdd validate
# package` — load/validate/compose only, NO runtime execution, and NO composition
# semantics are defined here (they live in atdd core: compose.py / feature
# author-atdd-substrate:package-composition).
name: validate-packages

on:
  push:
    branches: [main]
  pull_request:

jobs:
  compose-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ATDD toolkit (composition CLI + core nodes via package-data)
        run: pip install "git+https://github.com/afokapu/atdd.git@main"

      - name: Validate every OFFICIAL package composes against installed core
        # Scope: official/ packages are the composition guarantee consumers rely on.
        # examples/ are illustrative (may intentionally be partial) and are NOT gated.
        run: |
          set -euo pipefail
          shopt -s nullglob
          found=0
          for pkg in official/*/; do
            [ -f "$pkg/atdd.extension.yaml" ] || [ -f "$pkg/atdd.workspace.yaml" ] || continue
            found=1
            echo "::group::atdd validate package $pkg"
            atdd validate package "$pkg"   # exits non-zero on any composition violation
            echo "::endgroup::"
          done
          if [ "$found" = 0 ]; then echo "::error::no official packages discovered to validate"; exit 1; fi

      - name: Negative canary — the gate rejects an invalid realization
        # Proves the gate has teeth (criteria 3-6). The full negative contract — bad
        # manifest shape, unresolved core node, realized design_candidate, authored
        # cross-package edge — is enforced by `atdd validate package` and covered by
        # atdd core's C007 acceptance tests; here we exercise one representative case.
        run: |
          set -euo pipefail
          broken="$RUNNER_TEMP/broken-extension"
          cp -r official/atdd.extension.github "$broken"
          python - "$broken/atdd.extension.yaml" <<'PY'
          import sys, yaml
          p = sys.argv[1]
          d = yaml.safe_load(open(p))
          d.setdefault("realizes", []).append({
              "extension_node": "github.pr.merge-blocks-on-pre-smoke-close",
              "core_node": "coach.bogus.does-not-exist",   # unresolved -> must fail
          })
          yaml.safe_dump(d, open(p, "w"), sort_keys=False)
          PY
          if atdd validate package "$broken"; then
            echo "::error::composition gate FAILED to reject an invalid realization"
            exit 1
          fi
          echo "✓ gate correctly rejected the broken package"

  # Provider conformance: a REAL pytest run proving atdd.workspace.python-pytest
  # satisfies its workspace-provider contract (discover + run → violation-output).
  # The compose-gate above only proves manifests load/validate; this proves the
  # provider's adapter mechanics actually work. Runner-specific and independent of
  # the composition gate, so it runs as its own job.
  provider-conformance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install conformance deps
        run: pip install pytest pyyaml

      - name: Run atdd.workspace.python-pytest provider conformance
        run: pytest official/atdd.workspace.python-pytest/conformance/ -v

      - name: Run atdd.workspace.cmux-claude provider conformance
        # REAL suite — subprocess round-trip + durable feed + two-way channel. No
        # cmux binary / Claude API needed (the agent command is injected).
        run: pytest official/atdd.workspace.cmux-claude/conformance/ -v

  # Real end-to-end: the python-pytest provider DISCOVERS every github extension
  # implementation manifest and RUNS its suite. Proves the provider<->implementation
  # contract chain works, not just that manifests load.
  github-implementations:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install pytest pyyaml

      - name: Provider discovers + runs every github implementation
        run: |
          set -euo pipefail
          python - <<'PY'
          import sys
          from pathlib import Path
          sys.path.insert(0, str(Path("official/atdd.workspace.python-pytest/adapter").resolve()))
          import discover, run
          ext = Path("official/atdd.extension.github/implementations").resolve()
          impls = discover.discover_implementations(ext)
          assert len(impls) == 7, f"expected 7 implementations, discovered {len(impls)}"
          failed = []
          for i in impls:
              res = run.run_implementation(i.implementation_id, i.manifest_path.parent)
              print(f"[{'PASS' if res.passed else 'FAIL'}] {i.implementation_id} exit={res.exit_code}")
              if not res.passed:
                  failed.append(i.implementation_id)
                  print(res.stdout[-800:])
          if failed:
              sys.exit(f"implementations failed: {failed}")
          print("all 7 github implementations discovered and green")
          PY
