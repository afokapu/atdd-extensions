schema_version: "1.1.0"
kind: implementation
implementation_id: coder.convex.security-missing-auth
targets_workspace: convex.workspace.runtime
contract_version: "1.1.0"

# Back-reference to the agnostic obligation this detector realizes. The convention
# node is authored in atdd.extension.convex-coder; this implementation is the
# convex-workspace realization of it (two-layer model).
realizes_convention: coder.convex.security-missing-auth

# Single rule_id (disposition strict). The detector emits RAW violations; the
# strict verdict is a downstream consumer concern.
emits_rule_ids:
  - coder.convex.security-missing-auth   # disposition: strict

# The detector module. It scans ATDD_SCAN_ROOTS for Convex server source and writes
# the RAW {rule_id,file,line,col,evidence,source_line} report to
# ATDD_VIOLATIONS_REPORT (v1.1 channel). No disposition.
entrypoint: detect.mjs

# The runnable v1.1 report-emitting unit the provider command executes (plain `node`
# in Phase 0; vitest in 0.5). Declared so the provider CLI runs THIS detector.
report: detect.mjs
