schema_version: "1.1.0"
kind: implementation
implementation_id: coder.convex.api-no-underscore-dir
targets_workspace: convex.workspace.runtime
contract_version: "1.1.0"

# Back-reference to the agnostic obligation this detector realizes. The convention
# node is authored in atdd.extension.convex-coder; this implementation is the
# convex-workspace realization of it (two-layer model). This is a NATIVE Convex
# rule — there is no Core sibling; it encodes a hard constraint of Convex's
# path-based API auto-discovery.
realizes_convention: coder.convex.api-no-underscore-dir

# Single rule_id (disposition strict). The detector emits RAW violations; the
# strict verdict is a downstream consumer concern.
emits_rule_ids:
  - coder.convex.api-no-underscore-dir   # disposition: strict

# The detector module. It scans ATDD_SCAN_ROOTS for Convex server source and
# writes the RAW {rule_id,file,line,col,evidence,source_line} report to
# ATDD_VIOLATIONS_REPORT (v1.1 channel). No disposition.
entrypoint: detect.mjs

# The runnable v1.1 report-emitting unit the provider command executes. Declared
# (not hardcoded) so the provider CLI runs THIS detector.
report: detect.mjs
