schema_version: "1.1.0"
kind: implementation
implementation_id: coder.convex.performance-perf
targets_workspace: convex.workspace.runtime
contract_version: "1.1.0"

# Convex realization of the agnostic coder.performance.perf principle ("no per-item
# IO inside iteration"). The convention node is authored in atdd.extension.convex-coder;
# this is its convex-workspace advisory detector. (Core's performance.perf is a
# documentation-only principle with no validator; Convex adds a concrete advisory
# detector at the same disposition.)
realizes_convention: coder.convex.performance-perf

# Single rule_id (disposition documentation-only). The detector emits RAW
# violations; the documentation-only verdict is a downstream consumer concern.
emits_rule_ids:
  - coder.convex.performance-perf   # disposition: documentation-only

# The detector module. Scans ATDD_SCAN_ROOTS for Convex server source and writes
# RAW {rule_id,file,line,col,evidence,source_line} to ATDD_VIOLATIONS_REPORT.
entrypoint: detect.mjs

# The runnable v1.1 report-emitting unit the provider runs with `node`.
report: detect.mjs
