schema_version: "1.1.0"
kind: implementation
implementation_id: coder.convex.logging-silent-swallow
targets_workspace: convex.workspace.runtime
contract_version: "1.1.0"

# Convex realization of the agnostic coder.logging.coach-silent-swallow obligation
# ("an exception handler must observably react, never silently swallow"). The
# convention node is authored in atdd.extension.convex-coder; this is its detector.
realizes_convention: coder.convex.logging-silent-swallow

# Single rule_id (disposition suppress-and-clean). The detector emits RAW
# violations; the suppress-and-clean verdict is a downstream consumer concern.
emits_rule_ids:
  - coder.convex.logging-silent-swallow   # disposition: suppress-and-clean

# The detector module. Scans ATDD_SCAN_ROOTS for Convex server source and writes
# RAW {rule_id,file,line,col,evidence,source_line} to ATDD_VIOLATIONS_REPORT.
entrypoint: detect.mjs

# The runnable v1.1 report-emitting unit the provider runs with `node`.
report: detect.mjs
