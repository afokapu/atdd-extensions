schema_version: "1.1.0"
kind: implementation
implementation_id: coder.convex.complexity-cyclomatic
targets_workspace: convex.workspace.runtime
contract_version: "1.1.0"

# Back-reference to the agnostic obligation this detector realizes. The convention
# node is authored in atdd.extension.convex-coder; this implementation is the
# convex-workspace realization of it (two-layer model). It is the Convex sibling of
# Core's coder.refactor.complexity-cyclomatic (per the Core-parity matrix, Worker W3).
realizes_convention: coder.convex.complexity-cyclomatic

# Single rule_id (disposition strict). The detector emits RAW per-function
# violations — one per offending function at its header line; the strict verdict is
# a downstream consumer concern. Metric: cyclomatic complexity (1 + decision keywords + boolean/nullish operators + ternaries), threshold 10.
emits_rule_ids:
  - coder.convex.complexity-cyclomatic   # disposition: strict

# The detector module. It parses each function over ATDD_SCAN_ROOTS (convex/** TS,
# skipping _generated/, node_modules, build dirs and *.test/*.spec files) and writes
# the RAW {rule_id,file,line,col,evidence,source_line} report to
# ATDD_VIOLATIONS_REPORT (v1.1 channel). Zero dependencies, no AST.
entrypoint: detect.mjs

# The runnable v1.1 report-emitting unit the provider command executes with node.
report: detect.mjs
