schema_version: "1.1.0"
kind: implementation
implementation_id: tester.convex.filename-urn
targets_workspace: convex.workspace.runtime
contract_version: "1.1.0"

# Back-reference to the agnostic obligation this detector realizes. The convention
# node is authored in convex.extension.tester; this implementation is the
# convex-workspace realization of it (two-layer model). The CORE invariant — a
# test's IDENTITY comes from its URN header — stays in core; what this realizes is
# only the per-stack FILENAME rendering of that URN for the Vitest/Convex stack.
realizes_convention: tester.convex.filename-urn

# Single rule_id (disposition documentation-only). The detector emits RAW
# violations; whether a mis-named test blocks is a downstream consumer concern.
emits_rule_ids:
  - tester.convex.filename-urn   # disposition: documentation-only

# The detector module. It scans ATDD_SCAN_ROOTS for `*.test.ts`/`*.spec.ts` under
# the Convex tree and writes the RAW {rule_id,file,line,col,evidence,source_line}
# report to ATDD_VIOLATIONS_REPORT (v1.1 channel). No disposition.
entrypoint: detect.mjs

# The runnable v1.1 report-emitting unit the provider command executes. In Phase 0
# this is the same .mjs the provider runs with `node`; in Phase 0.5 it becomes the
# vitest spec. Declared (not hardcoded) so the provider CLI runs THIS detector.
report: detect.mjs
