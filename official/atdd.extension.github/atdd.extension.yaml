schema_version: "1.0.0"

# Official ATDD GitHub platform extension.
#
# Boundary (see README + docs/atdd-extension-github-boundary.md in core, issue
# afokapu/atdd#1118):
#   "Core owns the lifecycle. This extension maps GitHub concepts onto the
#    lifecycle." After the coach-orchestration decommission (core #1487 and the
#   removal of the `atdd issue` CLI, #1309), this package no longer carries the
#   gh PATH shim, the forbidden-command classifier, or the PR/issue lifecycle
#   gates — those enforced an orchestration model core is retiring. What remains
#   are the GitHub-side POST-MERGE SIDE-EFFECTS core triggers via provider-neutral
#   signals (release tag+publish, store<->issue sync) plus the label taxonomy the
#   sync provider reads. It NEVER redeclares a core lifecycle/role/graph node.
extension_id: atdd.extension.github
version: "0.1.0"
kind: extension

# This extension realizes coach-protocol behavior on the GitHub platform. The
# surviving implementations are post-merge provider side-effect workers (the
# release drain and the store<->GitHub sync provider), so the closest role is
# still the lifecycle orchestrator (coach).
role: coach
flow_wagon: govern-lifecycle
feature: github-platform-binding

# What this package owns. Conventions + relationships are authored here;
# implementations are real, discoverable units (pure decision core + pytest) under
# implementations/<name>/atdd.implementation.yaml, targeting the python-pytest
# provider. See implementations/README.md.
owns:
  conventions:
    # The label taxonomy survives as the atdd:{PHASE} label contract the sync
    # provider reads; the release + state-sync nodes are the post-merge
    # side-effects. The orchestration conventions (shim, forbidden-command, and
    # the PR/issue lifecycle gates) were removed with their implementations.
    - conventions/github.issue.label-taxonomy.convention.yaml
    - conventions/github.release.version-decided-drains-to-tag-and-publish.convention.yaml
    - conventions/github.state.sync-store-from-issues.convention.yaml
  relationships:
    - relationships.yaml
  implementations:
    # Post-merge provider side-effect workers — see implementations/README.md.
    - implementations/release_worker
    - implementations/state_sync_provider
  schemas: []
  gates: []
  # No selector types: github_issue/github_pr were defined by (and only used by)
  # the removed issue/PR lifecycle conventions.
  scopes: []

# This extension TARGETS the core coach protocol. It does not redeclare any core
# lifecycle/role/graph node — every GitHub behavior maps onto a core node that
# remains the authority (see README §"Convention → lifecycle mapping").
depends_on:
  core:
    - atdd.core.convention-node-schema
    - atdd.core.relationship-schema
    - atdd.core.implementation-schema
    - atdd.core.violation-output-schema
  # Core coach nodes (shipped in Slice 2 / core PR #1117) that the surviving
  # GitHub behaviors realize. Referenced by id; never copied here. Core remains
  # the authority. targets.coach_nodes lists ONLY shipped, resolvable core nodes.
  # The single-step-advance / no-terminal / runtime-state / atomic-registry
  # targets left with the lifecycle gates that referenced them; only the
  # phase-machine (expressed by the surviving label taxonomy) remains.
  targets:
    coach_nodes:
      - coach.lifecycle.phase-machine
  # Implementations run inside this shared workspace
  # provider; each implementations/<name>/atdd.implementation.yaml echoes the
  # target id + a contract_version satisfying the range below.
  workspaces:
    - id: atdd.workspace.python-pytest
      contract: "^1.0.0"

removal_policy:
  allowed_if_no_external_dependents: true
