# The convention (in this same extension) this gate realizes. Migrates core's
# COACH-PRGATE-0003 / test_issue_advancement into a PURE decision core: a PR that
# auto-closes its own linked ATDD issue must leave that issue advanced
# (REFACTOR/COMPLETE; SMOKE = advance-in-progress). Scope is the own PR (core
# #1296); cross-PR is advisory. See afokapu/atdd-extensions#40 (Phase 1).
realizes_convention: github.issue.auto-phase-on-merge
entrypoint: issue_advancement.py
