schema_version: "1.0.0"

# Extension-LOCAL relationship graph for atdd.extension.github.
#
# IMPORTANT (boundary spec §6.2): core↔extension edges are NOT authored here.
# Whether/how a core coach node composes with these github nodes is an
# unresolved prerequisite design (Slice-2 guardrail; cf. afokapu/atdd#1122
# coach.extension.*). The core targets a github node *realizes* are declared
# narratively in atdd.extension.yaml::depends_on.targets and in the README
# mapping table — NOT as graph edges. Only extension-internal edges live here.
graph_id: atdd.extension.github.relationships

# After the coach-orchestration decommission this graph holds only the surviving
# post-merge side-effect nodes and the label contract the sync provider reads.
# The removed shim / forbidden-command / PR-and-issue lifecycle nodes and every
# edge touching them left with their implementations.
nodes:
  - github.issue.label-taxonomy
  - github.release.version-decided-drains-to-tag-and-publish
  - github.state.sync-store-from-issues

edges:
  # store<->GitHub sync reads the atdd:{PHASE} label the taxonomy defines.
  - from: github.state.sync-store-from-issues
    to: github.issue.label-taxonomy
    type: depends_on
    rationale: Ingest maps each issue's atdd:{PHASE} label (defined by the taxonomy) to the canonical inbox state event.

  # the two surviving post-merge provider side-effects are siblings.
  - from: github.release.version-decided-drains-to-tag-and-publish
    to: github.state.sync-store-from-issues
    type: complements
    rationale: Both are post-merge GitHub-provider side-effects that drain a provider-neutral core outbox signal (version_decided -> tag + publish; sync outbox -> GitHub), keeping core decision-only and the GitHub effect in the extension.
