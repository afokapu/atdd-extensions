schema_version: 1.1.0
rule_id: github.shim.gh-issue-create-blocked
kind: rule
status: active
name: gh issue create is blocked by the PATH shim and pre-commit grep
statement: A PATH shim (.atdd/bin/gh) hard-blocks `gh issue create` for any worktree shell process and
  forwards every other gh subcommand unchanged, while a pre-commit grep rejects staged diff lines that bake
  a gh issue create call into a committed script (*.md exempt). Both fail safe; this realizes the core
  atomic-registry-write rule across harness-agnostic enforcement sites.
source:
  legacy_path: src/atdd/coach/conventions/path_shim_gh.convention.yaml
  legacy_section: patterns
  legacy_rule_id: ATDD-SHIM-GH-ISSUE-CREATE
  legacy_sha: c070f627425e11fa
  extraction_mode: high_fidelity
content:
  summary: Two harness-agnostic enforcement sites (L3a PATH shim, L3b pre-commit) close the gap the
    in-harness PreToolUse hook leaves open.
  normative_text: |
    L3a (shim): .atdd/bin/gh wraps the gh binary at PATH precedence inside the worktree. Blocks
    `gh issue create` (argv_prefix ["issue", "create"], exact-token match) for ANY shell process,
    forwards all other gh subcommands. On its own load/exec failure it forwards to the real gh
    (fail-open: never strands read-path commands).
    L3b (pre-commit): greps the staged diff for added lines matching ^\+.*\bgh\s+issue\s+create\b and
    rejects the commit; *.md paths are exempt so docs about the rule still commit. A missing hook simply
    means no L3b coverage (L1/L4 still apply).
  fix_hint: |
    Use `atdd issue <slug>` instead of `gh issue create`. If you are documenting the rule, put the
    example in a *.md file (pre-commit exempts *.md paths).
  exceptions:
    - "*.md staged paths are exempt from the pre-commit grep"
metadata:
  severity: 3
  disposition: documentation-only
  introduced_in: 2.1.0
parity:
  source_fragments_preserved: true
  examples_preserved: false
  implementation_preserved: false
  fix_hint_preserved: true
  reviewed_at: '2026-06-17'
terms:
- term_id: path_shim
  text: the .atdd/bin/gh wrapper at PATH precedence that hard-blocks `gh issue create` for any worktree
    shell while forwarding all other gh subcommands.
- term_id: fail_open_forward
  text: the shim's safe-failure mode — on internal load/exec failure it forwards to the real gh so read-path
    commands never get stranded.
