terms:
- term_id: closing_issues_references
  text: >-
    GitHub's GraphQL field listing the issues a PR will auto-close on merge — the platform's effective
    close set.
- term_id: refs_keyword
  text: >-
    the non-closing `Refs #N` reference used for partial deliveries, commit messages, and negated
    mentions so auto-close does not fire.
