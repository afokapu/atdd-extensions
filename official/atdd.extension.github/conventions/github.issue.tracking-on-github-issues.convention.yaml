schema_version: 1.1.0
rule_id: github.issue.tracking-on-github-issues
kind: rule
status: active
name: ATDD units are tracked as GitHub Issues
statement: ATDD delivery units are tracked as GitHub Issues with a three-layer architecture (parent
  issue body, Project v2 custom fields, WMBT sub-issues), created and transitioned exclusively through
  the atdd CLI, which depends on gh, the Projects v2 GraphQL API, and the sub-issues feature.
source:
  legacy_path: src/atdd/coach/conventions/issue.convention.yaml
  legacy_section: github_issue_tracking
  legacy_sha: 5cd3d1911851a683
  extraction_mode: high_fidelity
content:
  summary: GitHub Issues (with Project v2 fields + sub-issues) are the platform expression of an ATDD
    delivery unit; the lifecycle phase itself is owned by core.
  normative_text: |
    Three-layer architecture:
      Layer 1: Parent issue body — human-readable context, architecture, decisions, log.
      Layer 2: Project v2 custom fields — machine-parseable metadata (queryable, filterable).
      Layer 3: Sub-issues — WMBT tracking with automatic progress bar.
    Issues are created via `atdd issue <slug>` (parent + WMBT sub-issues) and transitioned via
    `atdd issue <N> --status <S>` (status + label swap). Never via raw gh.
  constraints:
    - gh CLI must be installed and authenticated
    - GitHub Projects v2 API access (GraphQL)
    - GitHub sub-issues feature (GA since 2025)
    - atdd init must have been run (project_id in .atdd/config.yaml)
metadata:
  severity: 3
  disposition: documentation-only
  introduced_in: 2.1.0
parity:
  source_fragments_preserved: true
  examples_preserved: false
  implementation_preserved: false
  fix_hint_preserved: false
  reviewed_at: '2026-06-17'
terms:
- term_id: three_layer_issue
  text: parent issue body (human), Project v2 custom fields (machine), and WMBT sub-issues (progress) —
    the GitHub realization of one ATDD delivery unit.
- term_id: github_issue_selector
  text: the github_issue selector type addresses a parent ATDD issue and its sub-issues on the GitHub
    platform.
