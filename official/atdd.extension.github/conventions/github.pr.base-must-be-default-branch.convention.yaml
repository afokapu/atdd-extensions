schema_version: 1.1.0
rule_id: github.pr.base-must-be-default-branch
kind: rule
status: active
name: Every PR targets the repo default branch
statement: Every PR (open or being created via `atdd pr`) must target the repo's default branch unless
  --force is set. This is a GitHub-platform safety rule owned outright by this extension — it has no core
  lifecycle counterpart.
source:
  legacy_path: src/atdd/coach/conventions/rule-id.convention.yaml
  legacy_section: rules
  legacy_rule_id: coach.pr.base-must-be-default-branch
  legacy_sha: 6892b8c7d07bb073
  extraction_mode: high_fidelity
content:
  summary: Platform-local guard against merging onto a sibling/non-default base branch.
  normative_text: |
    Prevents the orphan-merge incident from #475 where a PR merged onto a sibling-PR's branch (which
    was deleted post-merge), orphaning the v3.11.0 work. The default branch is recorded at
    .atdd/config.yaml::github.default_branch (for atdd it is "main").
  fix_hint: |
    The named PR targets a non-default base branch. Repair:
      1. Read the violation — it cites "PR#<N>" and names the offending baseRefName
         (e.g. "PR#475 ... targets base 'fix/473-init-template-fix'").
      2. Re-target via `gh pr edit <N> --base <default>` (<default> = the default branch, e.g. "main";
         run `gh repo view --json defaultBranchRef --jq .defaultBranchRef.name` to inspect).
      3. If the non-default base is intentional (release-train / stacked PRs), close and re-open via
         `atdd pr <issue> --base <base> --force`.
      4. Re-run the gate to confirm clean.
  exceptions:
    - intentional non-default base is allowed via `atdd pr <issue> --base <base> --force`
metadata:
  severity: 3
  disposition: documentation-only
  introduced_in: 3.12.0
parity:
  source_fragments_preserved: true
  examples_preserved: false
  implementation_preserved: false
  fix_hint_preserved: true
  reviewed_at: '2026-06-17'
terms:
- term_id: default_branch
  text: the repo's canonical default branch (e.g. "main") recorded at .atdd/config.yaml::github.default_branch;
    every PR must target it unless --force.
- term_id: orphan_merge
  text: a merge onto a sibling-PR branch that is later auto-deleted, stranding the merged commit off the
    default-branch history (#475).
