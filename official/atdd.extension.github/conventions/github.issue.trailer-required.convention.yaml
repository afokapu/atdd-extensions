schema_version: 1.1.0
rule_id: github.issue.trailer-required
kind: rule
status: active
name: Commits carry an Issue trailer naming the GitHub issue
statement: >-
  Every commit on a coach-watched worktree must carry an `Issue: <number>` trailer naming the
  GitHub issue it advances, so cross-wagon journey context and review-aggregate keying resolve from the
  commit alone. This is the GitHub interpretation of work provenance (core design_candidate
  coach.execution.work-provenance, #1122).
source:
  legacy_path: src/atdd/coach/conventions/commit-trailers.convention.yaml
  legacy_section: rules
  legacy_rule_id: coach.commit-trailers.issue-required
  legacy_sha: c6f32105e935c940
  extraction_mode: high_fidelity
content:
  summary: The Issue trailer ties a commit to a GitHub issue number; the broader provenance contract is
    a core concern.
  normative_text: |
    Every commit on a coach-watched worktree MUST carry an `Issue: <number>` trailer naming the GitHub
    issue it advances. The coach v9 git watcher runs `git interpret-trailers --parse` and emits this
    rule when the Issue token is absent or empty.
  fix_hint: |
    Add an `Issue: <number>` trailer to the commit message, where <number> is the GitHub issue this
    commit advances (e.g. "Issue: 1118"). On a coach-watched worktree the trailer is also enforced
    producer-side by the pre-commit hook.
metadata:
  severity: 4
  disposition: documentation-only
  introduced_in: 3.0.0
parity:
  source_fragments_preserved: true
  examples_preserved: false
  implementation_preserved: false
  fix_hint_preserved: true
  reviewed_at: '2026-06-17'
terms:
- term_id: issue_trailer
  text: >-
    an RFC-822-style `Issue: <number>` commit trailer naming the GitHub issue the commit advances.
- term_id: review_aggregate_keying
  text: keying of review artifacts under .atdd/runtime/issue-reviews/<issue-N>/, resolved from the Issue
    trailer.
