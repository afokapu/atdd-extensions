schema_version: 1.1.0
rule_id: github.command.forbidden-gh-patterns
kind: policy
status: active
name: Forbidden gh command patterns
statement: The command-policy classifier hard-blocks `gh issue create` and `gh pr create` (each bypasses
  an atdd safety verb) and loop-blocks `gh pr view/list/checks` polling (which exhausts GitHub API rate
  limits). These are GitHub-platform command policies owned by this extension; on registry load failure
  the classifier fails open.
source:
  legacy_path: src/atdd/coach/conventions/forbidden_commands.convention.yaml
  legacy_section: patterns
  legacy_rule_id: ATDD-FORBID-GH-PR-CREATE
  legacy_sha: a5eefd2bf7d8f181
  extraction_mode: high_fidelity
content:
  summary: The GitHub-specific subset of the forbidden-commands registry (ATDD-FORBID-GH-* and
    ATDD-LOOP-GH-PR-POLL); non-gh patterns in the legacy file are out of this extension's scope.
  normative_text: |
    ATDD-FORBID-GH-ISSUE-CREATE (hard_block, contains "gh issue create"): bypasses atdd manifest
    registration and WMBT sub-issue generation. Alternative: `atdd issue <slug>`.
    ATDD-FORBID-GH-PR-CREATE (hard_block, contains "gh pr create"): bypasses --base validation against
    the repo default branch (the #475 orphan-merge class). Alternative: `atdd pr <N>`.
    ATDD-LOOP-GH-PR-POLL (loop_block, contains_any "gh pr view"/"gh pr list"/"gh pr checks"; threshold 1,
    ttl 60s): polling gh pr in a loop exhausts GitHub API rate limits (2026-05-13 GraphQL exhaustion).
    One-off reads are allowed; repeated polling is blocked. Alternative: `atdd observer status` or
    `atdd agent wait-ci`. On registry load failure the classifier fails OPEN.
  fix_hint: |
    Replace the blocked gh command with its atdd equivalent:
      gh issue create  →  atdd issue <slug>
      gh pr create     →  atdd pr <N>
      gh pr view/list/checks in a loop  →  atdd observer status  OR  atdd agent wait-ci
  exceptions:
    - one-off gh pr view/list/checks reads are allowed; only loop/threshold-exceeded polling is blocked
metadata:
  severity: 3
  disposition: documentation-only
  introduced_in: 2.1.0
parity:
  source_fragments_preserved: true
  examples_preserved: false
  implementation_preserved: false
  fix_hint_preserved: true
  reviewed_at: '2026-06-17'
terms:
- term_id: hard_block
  text: a command-policy match that is always blocked (gh issue create, gh pr create), exiting with an
    educational error.
- term_id: loop_block
  text: a command-policy match allowed once but blocked as a loop construct or when the same rule trips
    more than the threshold within the TTL (gh pr poll).
- term_id: fail_open
  text: classifier behavior on registry load failure — every command is allowed and a warning is printed
    to stderr.
