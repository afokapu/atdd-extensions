schema_version: 1.1.0
rule_id: github.issue.create-via-atdd-not-gh
kind: constraint
status: active
name: Issues are created via atdd, never raw gh issue create
statement: Issues must be created with `atdd issue <slug>` (which registers the unit in the manifest,
  generates WMBT sub-issues, and sets up Project v2 fields), never with `gh issue create`, which bypasses
  manifest registration. This is the GitHub-platform expression of the core atomic-registry-write rule.
source:
  legacy_path: src/atdd/coach/conventions/forbidden_commands.convention.yaml
  legacy_section: patterns
  legacy_rule_id: ATDD-FORBID-GH-ISSUE-CREATE
  legacy_sha: a5eefd2bf7d8f181
  extraction_mode: high_fidelity
content:
  summary: gh issue create bypasses atdd manifest registration; on issue creation the manifest write must
    be atomic (core atomic-registry-write).
  normative_text: |
    `gh issue create` bypasses atdd manifest registration, WMBT sub-issue generation, and Project v2
    field setup. Any issue created this way is missing from .atdd/manifest.yaml and flagged by
    `atdd validate coach`. Incident: #659 was filed with gh issue create and lacked a manifest entry.
  fix_hint: |
    Use `atdd issue <slug>` to create an ATDD parent issue. It registers the unit in
    .atdd/manifest.yaml atomically with creation (see core coach.execution.atomic-registry-write),
    generates WMBT sub-issues, and wires Project v2 fields.
  exceptions:
    - documenting the rule in a *.md file is exempt (no live call is made)
metadata:
  severity: 3
  disposition: documentation-only
  introduced_in: 2.1.0
parity:
  source_fragments_preserved: true
  examples_preserved: false
  implementation_preserved: false
  fix_hint_preserved: true
  reviewed_at: '2026-06-17'
terms:
- term_id: manifest_registration
  text: the act of recording a created issue in .atdd/manifest.yaml; bypassing it strands the issue from
    atdd validate coach.
- term_id: atdd_issue_create
  text: the `atdd issue <slug>` verb — the only sanctioned issue-creation path on GitHub.
