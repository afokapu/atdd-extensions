schema_version: 1.1.0
rule_id: github.issue.label-taxonomy
kind: rule
status: active
name: ATDD label taxonomy on GitHub issues
statement: An ATDD parent issue carries the atdd-issue label, exactly one archetype:{id} label, exactly
  one swapped atdd:{STATUS} phase label, and exactly one wagon:{slug} label; WMBT sub-issues carry atdd-wmbt.
  The atdd:{PHASE} label is the GitHub expression of the core phase machine, not a redefinition of it.
source:
  legacy_path: src/atdd/coach/conventions/issue.convention.yaml
  legacy_section: github_issue_tracking.labels
  legacy_sha: 5cd3d1911851a683
  extraction_mode: high_fidelity
content:
  summary: Label application rules and the static/dynamic label set that GitHub uses to express ATDD phase,
    archetype, and wagon membership.
  normative_text: |
    Parent application rule: ["atdd-issue", "archetype:{id} (one per archetype)",
      "atdd:{STATUS} (exactly one, swapped)", "wagon:{slug} (exactly one)"].
    Sub-issue application rule: ["atdd-wmbt"].
    Phase labels (atdd:INIT, atdd:PLANNED, atdd:RED, atdd:GREEN, atdd:SMOKE, atdd:REFACTOR,
    atdd:COMPLETE, atdd:BLOCKED) realize coach.lifecycle.phase-machine — swap is single-occupancy.
    wagon:{slug} is dynamic — `atdd issue <slug>` creates it if absent.
  constraints:
    - exactly one atdd:{STATUS} label at a time (swapped, never accumulated)
    - exactly one wagon:{slug} label per parent
metadata:
  severity: 3
  disposition: documentation-only
  introduced_in: 2.1.0
parity:
  source_fragments_preserved: true
  examples_preserved: false
  implementation_preserved: false
  fix_hint_preserved: false
  reviewed_at: '2026-06-17'
terms:
- term_id: phase_label
  text: an atdd:{PHASE} GitHub label expressing the unit's current lifecycle phase; the authoritative
    phase machine lives in core (coach.lifecycle.phase-machine).
- term_id: label_swap
  text: transition replaces the single atdd:{STATUS} label rather than adding a second, keeping phase
    single-occupancy on the issue.
