  extraction_mode: high_fidelity
content:
  summary: Emitted at the PR boundary (legacy alias COACH-PRGATE-0003) when GREEN-phase code ships without
    SMOKE evidence.
  normative_text: |
    A GREEN-phase PR ships code files without SMOKE evidence (issue #293). Documentation-only:
    the coherence validator does not require a static validator pointer for this rule; it is emitted at
    runtime by the PR phase-alignment check (legacy Violation rule_id COACH-PRGATE-0003).
