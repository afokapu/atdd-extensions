schema_version: 1.1.0
rule_id: github.pr.green-ships-without-smoke
kind: anti_pattern
status: active
name: GREEN-phase PR ships code without SMOKE evidence
statement: A GREEN-phase PR that ships code files without SMOKE evidence is an anti-pattern — code crossing
  the PR boundary before real-infra verification. This realizes the core no-terminal-before-lifecycle-satisfied
  rule on the GitHub platform; whether the lifecycle is satisfied is owned by core.
