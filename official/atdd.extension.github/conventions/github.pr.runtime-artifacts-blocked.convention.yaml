schema_version: 1.1.0
rule_id: github.pr.runtime-artifacts-blocked
kind: rule
status: active
name: PR diffs must not add or modify runtime artifacts
statement: No PR diff may add or modify paths under .atdd/runtime/** — ephemeral per-run state (coach
  session files, decisions.jsonl, validation logs, agent events) must never ride into a PR diff. This is
  the GitHub-diff-inspection expression of the core runtime-state-not-a-delivery-artifact rule.
source:
  legacy_path: src/atdd/coach/conventions/pr.convention.yaml
  legacy_section: rules
  legacy_rule_id: coach.pr.runtime-artifacts-blocked
  legacy_sha: 30c82fcc9aae8570
  extraction_mode: high_fidelity
content:
  summary: The PR diff is inspected for runtime artifacts; what counts as ephemeral runtime state is owned
    by the core rule.
  normative_text: |
    When agents use `git add -A` or `git commit`, files under .atdd/runtime/ ride into the PR diff
    silently — PR #749 shipped .atdd/runtime/coach/358/planner-358-e7620840.session.json and 2 appended
    lines in decisions.jsonl from an unrelated zombie issue (#358). Green CI gave false confidence
    because no check inspected the diff file set. Strict: runtime artifacts in PRs are never intentional.
  fix_hint: |
    The PR diff contains one or more paths under .atdd/runtime/. Repair:
      1. Add .atdd/runtime/ to .gitignore (the full directory, not sub-paths).
      2. Untrack tracked files: git ls-files .atdd/runtime/ | xargs git rm --cached
      3. Commit the .gitignore change and the rm --cached deletions.
      4. Verify none remain tracked: git ls-files .atdd/runtime/ (should print nothing).
      5. Re-run the gate to confirm the violation is cleared.
    If decisions.jsonl content was intentional, relocate it outside .atdd/runtime/ and re-commit.
metadata:
  severity: 4
  disposition: documentation-only
  introduced_in: 3.57.0
parity:
  source_fragments_preserved: true
  examples_preserved: false
  implementation_preserved: false
  fix_hint_preserved: true
  reviewed_at: '2026-06-17'
terms:
- term_id: runtime_artifact
  text: an ephemeral per-run file under .atdd/runtime/ (session files, decisions.jsonl, validation logs,
    agent events) that must never appear in a PR diff.
- term_id: diff_inspection
  text: the GitHub PR gate that inspects the diff file set for runtime-artifact paths.
