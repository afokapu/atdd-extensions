schema_version: 1.1.0
rule_id: github.issue.auto-phase-on-merge
kind: rule
status: active
name: Auto-phase advance on PR merge
statement: On pull_request closed with merged == true, the atdd-auto-phase workflow runs `atdd auto-phase
  <PR>` which dispatches a single-step phase advance for the closed issue, so manifest discipline and label-swap
  rules apply uniformly. This realizes the core single-step-advance-on-delivery rule on the GitHub platform.
source:
  legacy_path: src/atdd/coach/conventions/issue.convention.yaml
  legacy_section: status.auto_transition_on_merge
  legacy_sha: 5cd3d1911851a683
  extraction_mode: high_fidelity
content:
  summary: GitHub's merge event is the platform trigger; the single-step-advance rule (RED→GREEN→SMOKE→REFACTOR→COMPLETE)
    is owned by core.
  normative_text: |
    Trigger: .github/workflows/atdd-auto-phase.yml on `pull_request: closed` with merged == true.
    CLI: `atdd auto-phase <pr-number>`.
    Advance map: RED→GREEN, GREEN→SMOKE, SMOKE→REFACTOR, REFACTOR→COMPLETE.
    No-op phases (manual transition required; merging while in these is unusual — operator review):
      INIT, PLANNED, BLOCKED, and the terminal COMPLETE, OBSOLETE.
    The advance fires through `atdd issue <N> --status <NEXT>` so manifest discipline (#344) and the
    label-swap rules apply uniformly. Closing issue references come from `closingIssuesReferences`.
  constraints:
    - single-step advance per state machine on PR merge
    - terminal phases never re-advance from a re-merged PR
metadata:
  severity: 3
  disposition: documentation-only
  introduced_in: 2.1.0
parity:
  source_fragments_preserved: true
  examples_preserved: false
  implementation_preserved: false
  fix_hint_preserved: false
  reviewed_at: '2026-06-17'
terms:
- term_id: auto_phase
  text: the GitHub Actions workflow + `atdd auto-phase` CLI that converts a merge event into a single
    core-governed phase advance.
- term_id: closing_issue_references
  text: GitHub's closingIssuesReferences GraphQL field — the platform's record of which issue a merged
    PR will close.
