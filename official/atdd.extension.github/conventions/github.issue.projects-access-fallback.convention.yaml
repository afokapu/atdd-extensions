schema_version: 1.1.0
rule_id: github.issue.projects-access-fallback
kind: exception
status: active
name: Project v2 access fallback to label-only sync
statement: When the workflow token lacks Projects R/W (the default GITHUB_TOKEN cannot grant the account-level
  Projects scope), an issue status update degrades to label-only sync — the narrow "Resource not accessible
  by integration" error is caught, logged at WARNING, and the atdd:{PHASE} label swap still applies; full
  Project v2 field sync is opt-in via a fine-grained PROJECT_TOKEN.
source:
  legacy_path: src/atdd/coach/conventions/issue.convention.yaml
  legacy_section: status.auto_transition_on_merge.projects_access_fallback
  legacy_sha: 5cd3d1911851a683
  extraction_mode: high_fidelity
content:
  summary: Graceful degradation when Projects scope is unavailable — phase still tracked via labels.
  normative_text: |
    Trigger: GitHubClientError matching "Resource not accessible by integration".
    Behavior: label-only sync (atdd:{PHASE} swap); Project v2 fields skipped.
    Log level: WARNING. Non-matching GitHubClientError instances still abort.
    Remediation: set the optional PROJECT_TOKEN secret (fine-grained PAT, scope account → Projects R/W)
    to enable full Project v2 Status sync; default falls back to label-only sync via the workflow's
    fallback expression ${{ secrets.PROJECT_TOKEN || secrets.GITHUB_TOKEN }} (issue #404).
  exceptions:
    - Project v2 field sync is opt-in; default consumers run on GITHUB_TOKEN and never hit preflight failure
metadata:
  severity: 2
  disposition: documentation-only
  introduced_in: 2.1.0
parity:
  source_fragments_preserved: true
  examples_preserved: false
  implementation_preserved: false
  fix_hint_preserved: false
  reviewed_at: '2026-06-17'
terms:
- term_id: label_only_sync
  text: fallback sync mode that swaps the atdd:{PHASE} label without touching Project v2 fields when the
    token lacks Projects scope.
- term_id: project_token
  text: optional fine-grained PAT (account → Projects R/W) that enables full Project v2 Status sync.
