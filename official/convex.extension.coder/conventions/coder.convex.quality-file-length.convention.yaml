schema_version: 1.1.0
rule_id: coder.convex.quality-file-length
kind: rule
status: active
name: Convex source file length is tracked against a report threshold
statement: Convex server modules (a `*.ts`/`*.tsx`/`*.js`/`*.mjs` file under the `convex/` function tree,
  excluding `_generated/` codegen and test files) that exceed the line-count report threshold (500 lines)
  MUST be surfaced as factual observations so their growth can be governed during the REFACTOR phase.
  There is no hard maximum — the report is the raw input to a downstream ratchet that prevents oversized
  files from growing further. This is the Convex-stack realization of the agnostic obligation owned by
  Core (`coder.refactor.quality-file-length`); the stack-specific detector is a zero-dependency per-file
  line counter emitting a record for every file over 500 lines — the obligation is stack-bound, the detector
  is JS-specific.
terms:
- term_id: report_threshold
  text: the 500-line mark above which a Convex module is surfaced as a raw observation; not a hard limit
    but the input to a downstream growth ratchet.
- term_id: growth_ratchet
  text: the downstream disposition that baselines an over-threshold file's current size and fails only
    on further growth — applied by the consumer, never by the provider/detector.
implementation:
  type: validator
  ref: coder.convex.quality-file-length
content:
  summary: An agnostic "track file size" obligation, the Convex sibling of coder.refactor.quality-file-length.
    The realization is a zero-dependency JS detector that counts the lines of each Convex server module
    and emits a RAW observation for every file over the 500-line report threshold, skipping `_generated/`
    and `*.test.ts`/ `*.spec.ts`.
  normative_text: 'There is deliberately NO hard line limit — comments, imports, type annotations, and

    `v.*` validator literals inflate line count without adding complexity, so a hard cap

    creates false positives and encourages artificial splitting. Instead the rule emits a

    RAW factual record for every file whose total line count strictly exceeds the report

    threshold of `REPORT_THRESHOLD` (= 500). A single trailing newline is not counted as an

    extra line. The violation is anchored at line 501 (the first line past the threshold).

    DISPOSITION BOUNDARY (PROVIDER-CONTRACT-v1.1 §1): the provider/detector emits only the

    fact "file X has N lines (> 500)"; the "growth-only" decision — baseline a 600-line file

    but fail it if it grows to 700 — is a downstream ratchet disposition applied by the

    consumer, NOT by the detector. Files at or under 500 lines are not tracked.

    '
  fix_hint: 'A file over the report threshold is not automatically wrong, but it is now

    ratchet-tracked: do not let it grow further without an explicit baseline update. To

    genuinely reduce size, extract cohesive Convex modules (split by responsibility — e.g.

    one file per feature''s queries/mutations — not arbitrarily). This rule is recorded as

    `strict` in the rule registry; the report-threshold emission is the raw fact, and the

    growth ratchet is applied downstream.

    '
  exceptions:
  - Files at or below 500 lines are not tracked.
  - There is no hard maximum line count — exceeding 500 is a tracked observation, not an automatic structural
    failure; the growth ratchet is a downstream disposition concern.
  - Test files (`*.test.*` / `*.spec.*`), generated code under `convex/_generated/`, and vendored/build
    dirs are out of scope.
metadata:
  aliases:
  - CONVEX-QUALITY-FILE-LENGTH-001
  severity: 2
  disposition: strict
  introduced_in: 0.1.0
