schema_version: 1.1.0
rule_id: coder.convex.security-hardcoded-secret
kind: rule
status: active
name: No hardcoded secrets in Convex source files
statement: Convex source files (`*.ts`/`*.tsx`/`*.js`/`*.mjs` under the `convex/` function tree, excluding
  `_generated/` codegen and test files) MUST NOT contain hardcoded credentials — AWS access keys (`AKIA…`),
  `sk_…` secret-key prefixes, `Bearer …` token literals, PEM private-key headers, long hex/base64 blobs,
  or `password`/`api_key`/`token` assignments to a quoted literal — because a committed secret is compromised
  the instant it lands in the repo and cannot be rotated by code review alone. Credentials belong in Convex
  environment variables read at runtime via `process.env.*`, never in source. This is the Convex-stack
  realization of the agnostic "no committed secrets" obligation owned by the coder extension (the python-pytest
  sibling is `coder.security.hardcoded-secret`). The obligation is stack-bound; the detector that enforces
  it — a regex line scan over Convex source for secret-shaped literals, skipping comment lines and truncating
  the matched value in the emitted evidence — is the atdd.workspace.convex implementation referenced below.
terms:
- term_id: secret_pattern
  text: one of the vendored regexes — AWS access key (`AKIA[0-9A-Z]{16}`), PEM private-key header, `sk_…`
    secret-key prefix, `Bearer …` token, long hex/base64 quoted blob, or a password/api_key/secret/token
    assignment to a quoted literal of sufficient length.
- term_id: case_sensitivity
  text: the AWS-key and PEM private-key-header patterns match case-sensitively (real keys are); the `password`/`api_key`/`secret`/`token`
    assignment pattern matches case-insensitively, mirrored from the python-pytest sibling's vendored
    set.
- term_id: truncated_evidence
  text: the emitted evidence and `source_line` truncate the offending value (first few characters plus
    a length marker) so the actual secret is not reproduced in the violation report.
- term_id: runtime_secret
  text: the prescribed correct form — a credential read at runtime from a Convex environment variable
    via `process.env.*`, which is never a quoted literal and therefore never matched.
implementation:
  type: validator
  ref: coder.convex.security-hardcoded-secret
content:
  summary: A Convex-stack "no committed secrets" obligation, the sibling of coder.security.hardcoded-secret.
    The realization is a zero-dependency JS detector (regex over source, no TS runtime) that scans each
    Convex module line-by-line — after blanking `//` and `/* */` comments so a documented example secret
    is not flagged — for a fixed set of secret-shaped patterns and flags each matching line. The matched
    value is truncated in the evidence so the detector never re-leaks the secret.
  normative_text: 'A secret literal in source is leaked the moment it is committed; the only correct home
    for a

    credential is an injected secret store — for Convex, an environment variable read at runtime

    via `process.env.*`. The obligation is "no line of Convex source matches a known secret shape".

    WHICH patterns count and HOW they are matched is delegated to the per-stack detector. For

    Convex the detector is a line scan over `convex/**` modules supplied as scan roots, with the

    vendored pattern set: `AKIA[0-9A-Z]{16}` AWS access keys and `-----BEGIN … PRIVATE KEY-----`

    headers (case-sensitive); `sk_…` secret-key prefixes and `Bearer …` token literals; long hex

    (`32+` chars) and base64 (`40+` chars) quoted blobs; and case-insensitive

    `password`/`api_key`/`secret`/`token` assignments to a quoted literal of sufficient length.

    Comment lines are blanked before matching, and the matched text is truncated in the emitted

    evidence to avoid re-leaking the secret. A value drawn from `process.env.*` is never a quoted

    literal, so the correct form is never flagged.

    '
  fix_hint: "Remove the literal and read the credential from a Convex environment variable at runtime:\n\
    \  const STRIPE_KEY = \"sk_REDACTED_PLACEHOLDER_VALUE\";   // ❌ hardcoded\n  const STRIPE_KEY =\
    \ process.env.STRIPE_SECRET_KEY;        // ✅ injected at runtime\nAWS keys, PEM private keys, and\
    \ API/bearer tokens must come from `process.env.*` (set with\n`npx convex env set`), never source.\
    \ `.env.example`, fixtures, and test trees are excluded by\nthe consumer's scan policy. This rule's\
    \ disposition is `strict`: a newly committed secret\nliteral is not suppressible and fails.\n"
  exceptions:
  - Comment lines (`//` and `/* */`) are blanked before matching — a documented non-secret example in
    a comment is not flagged.
  - A value read from `process.env.*` (or any non-literal expression) is not a quoted literal and is never
    matched — that is the prescribed correct form.
  - Example/fixture/test files (`.env.example`, `**/fixtures/**`, `*.test.*`/`*.spec.*`) are removed by
    the consumer's exclusion globs / the detector's test-file skip.
  - Generated code under `convex/_generated/` is never scanned; vendored/build dirs (`node_modules`, `dist`,
    `build`, `.next`) are skipped during traversal.
metadata:
  aliases:
  - CONVEX-HARDCODED-SECRET-001
  - SECURITY-HARDCODED-SECRET-001
  severity: 4
  disposition: strict
  introduced_in: 0.1.0
