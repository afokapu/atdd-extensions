schema_version: 1.1.0
rule_id: coder.convex.interlocking-bilateral-binding
kind: rule
status: active
name: Interlocking declarations and runtime route resolution are bilaterally bound (Convex)
statement: >-
  An interlocking system is systemic, not descriptive: it requires CLOSURE across declaration (the
  interlocking YAML route space, core afokapu/atdd#1248), runtime resolution (InterlockingRunner,
  core afokapu/atdd#1251), Station Master reachability (the `convex/app.ts` JOURNEY_MAP), TrainRunner
  delegation, and the execution trace. This convention binds those surfaces in FIVE directions so a
  declared route, a runtime resolution, a Station Master action, and a recorded trace can never drift
  apart silently. This is the Convex-stack realization of the agnostic core obligation
  `coder.train.interlocking-bilateral-binding`; the JS detector `convex_interlocking_binding` realizes
  all five directions and emits this single rule_id with the failing `direction` named in the evidence.

# Machine-readable bilateral relationship (the five binding directions + the schema-drift signal).
# Each direction names the fixture the JS detector fails on and passes the clean tree.
bidirectional:
  - direction: declaration_to_runtime
    requirement: >-
      Every declared route resolves through InterlockingRunner to the declared trainId — the route's
      train artifact (train_path / plan/_trains/<train_id>.yaml) must exist so the runtime can load it.
    fail_fixture: fixtures/dirty
  - direction: runtime_to_declaration
    requirement: >-
      InterlockingRunner never resolves a routeId/trainId absent from the loaded YAML; a runtime that
      returns a routeId/selectedTrainId literal not declared in any interlocking is a hidden route.
    fail_fixture: fixtures/dirty_runtime_hidden
  - direction: station_to_declaration
    requirement: >-
      Every Station Master interlocking mapping ({interlockingId, path}) points to an existing
      interlocking YAML — a mapping whose path resolves to no file (or names an undeclared
      interlockingId) is a dangling route.
    fail_fixture: fixtures/dirty_station_missing
  - direction: declaration_to_station
    requirement: >-
      Every interlocking with core entrypoint.exposed=true is Station-Master-reachable through one of
      its core entrypoint.actions wired into the JOURNEY_MAP to that interlocking. CONSUMES core
      afokapu/atdd#1248 entrypoint.exposed + entrypoint.actions; this extension defines NO parallel
      reachability field (entrypoints, runtime_exposure, station_actions, exposed_actions, reachability).
    fail_fixture: fixtures/dirty_unreachable
  - direction: trace_to_declaration
    requirement: >-
      Every executed interlocking route emits trace metadata that resolves back to the source YAML — a
      trace test asserting trace.routeId / trace.interlockingId values absent from the declared route
      space does not bind the run to its declaration (core afokapu/atdd#1251 trace contract).
    fail_fixture: fixtures/dirty_trace

implementation:
  type: validator
  ref: coder.convex.interlocking-bilateral-binding

content:
  summary: >-
    A bilateral-binding obligation that makes train interlocking SYSTEMIC, rendered for the Convex
    backend. One JS detector (convex_interlocking_binding) walks a consumer tree's interlocking YAML
    route space (plan/_trains/_interlockings/**), Station Master JOURNEY_MAP (convex/app.ts),
    InterlockingRunner runtime (convex/trains/**), and e2e trace tests (e2e/**), and emits RAW v1.1
    violations under this rule_id for any of the five binding directions that is broken — plus a
    schema-drift signal when a parallel reachability field is used instead of core #1248's `entrypoint`.
  normative_text: |
    Core runtime spec afokapu/atdd#1251 — the additive call model whose closure this rule enforces:

        plan/_trains/_interlockings/<id>.yaml          (declaration, core #1248)
          -> entrypoint.actions[]                       (core #1248 entrypoint field — CONSUMED here)
          -> Station Master JOURNEY_MAP action          (reachability, convex/app.ts)
          -> InterlockingRunner.resolveTrain(...)       (runtime, core #1251)
          -> InterlockingResolution(routeId, trainId, categoryDigit, ...)
          -> TrainRunner.execute(selectedTrainId)       (delegation)
          -> trace(interlockingId, routeId, selectedTrainId, ...)
          -> validator resolves the trace back to the YAML route

    OWNERSHIP SPLIT (collision prevention): core afokapu/atdd#1248/#1249 own the interlocking YAML
    schema and the SHAPE/allowed values of the `entrypoint` field. This extension only READS those
    core fields to validate REACHABILITY against Station Master and runtime traces in a consumer repo.
    It MUST NOT introduce `entrypoints`, `runtime_exposure`, `station_actions`, `exposed_actions`,
    `reachability`, or any other parallel reachability field. If core #1248 changes the field name or
    shape, this rule follows core and updates its detector/fixtures.
  fix_hint: |
    Close the broken binding direction named in the violation's evidence:

      declaration_to_runtime  — add the missing train artifact the declared route resolves to.
      runtime_to_declaration  — remove the hidden routeId/trainId literal, or declare it in the YAML.
      station_to_declaration  — fix the JOURNEY_MAP interlocking path to point at the real YAML.
      declaration_to_station  — wire the exposed interlocking's entrypoint.action into JOURNEY_MAP (or
                                set entrypoint.exposed:false with a reason if it is genuinely internal).
      trace_to_declaration    — assert the trace's interlockingId/routeId values that are declared.
      schema drift            — replace any parallel reachability field with core #1248's `entrypoint`.

    This rule is `strict`: a broken binding direction lets declaration, runtime, Station Master, and
    trace drift apart silently and therefore blocks CI.
  exceptions:
    - Interlockings with entrypoint.exposed:false (internal-transition-only / library-only /
      planned-not-exposed) carry no Station-Master-reachability obligation (declaration_to_station).
    - A consumer tree with no interlocking route space and no InterlockingRunner is not an interlocking
      system; the rule does not bite.
    - Per-stack renderings other than Convex are owned by their own workspace packages.

metadata:
  aliases:
    - CONVEX-INTERLOCKING-BILATERAL-BINDING-001
  severity: 1
  disposition: strict
  introduced_in: 0.1.0
  core_design_refs:
    - afokapu/atdd#1246
    - afokapu/atdd#1248
    - afokapu/atdd#1249
    - afokapu/atdd#1251

notes: >-
  DISPOSITION JUSTIFICATION (strict, severity 1). Bilateral binding is what makes interlocking a
  route-control SYSTEM rather than a description. A broken binding direction — an unresolvable declared
  route, a hidden runtime route, a dangling Station Master mapping, an unreachable exposed interlocking,
  or a trace that does not resolve to its declaration — is the exact silent-drift failure class the
  train-interlocking design (afokapu/atdd#1246) exists to close. The detector emits RAW facts only; the
  strict verdict is applied by a downstream gate. Per boundary spec §6.2 the core contracts are
  referenced NARRATIVELY, and the core `entrypoint` field is CONSUMED, never forked.

terms:
  - term_id: bilateral_binding
    text: >-
      the property that interlocking declaration, runtime resolution, Station Master reachability, and
      execution trace are bound in both directions so none can drift from the others undetected.
  - term_id: hidden_route
    text: >-
      a routeId/selectedTrainId the InterlockingRunner runtime resolves that is declared in no
      interlocking YAML — a runtime-to-declaration binding break.
  - term_id: parallel_reachability_field
    text: >-
      any non-core reachability field (entrypoints, runtime_exposure, station_actions, exposed_actions,
      reachability) that forks core afokapu/atdd#1248's `entrypoint`; using one is schema drift.
