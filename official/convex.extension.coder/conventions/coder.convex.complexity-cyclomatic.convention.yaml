schema_version: 1.1.0
rule_id: coder.convex.complexity-cyclomatic
kind: rule
status: active
name: Convex server functions must keep cyclomatic complexity at or below 10
statement: Every Convex server function (a function declaration or block-bodied arrow in a `*.ts`/`*.tsx`/`*.js`/`*.mjs`
  module under the `convex/` function tree, excluding `_generated/` codegen and test files) MUST keep
  its cyclomatic complexity at or below the threshold (default 10) so that the number of independent paths
  through any one function stays testable. This is the Convex-stack realization of the language-neutral
  `coder.refactor.complexity-cyclomatic` obligation owned by the Core coder extension (TypeScript sibling
  `coder.refactor.complexity-cyclomatic-typescript`, threshold 10). The detector that enforces it — a
  zero-dependency regex-over-source scan (no AST/tree-sitter) that slices each function body and counts
  decision points — is the atdd.workspace.convex implementation referenced below; the obligation is stack-bound,
  the detector is JS-specific.
terms:
- term_id: cyclomatic_complexity_convex
  text: the count of independent paths through a Convex server function, computed by regex as 1 plus decision
    keywords (if / for / while / do / catch / case) plus boolean and nullish operators (&& / || / ??)
    plus ternaries.
- term_id: regex_extraction
  text: the no-runtime approach this detector uses — masking strings/comments, then regex function patterns
    plus brace matching to slice a function body, instead of a TypeScript AST or tree-sitter parse.
- term_id: cyclomatic_threshold
  text: the configured maximum cyclomatic complexity a Convex function may have (default 10, parity with
    Core's TypeScript rule); the obligation is to stay at or below it.
implementation:
  type: validator
  ref: convex_complexity_detector
content:
  summary: A "no over-branching Convex server function" obligation, the Convex sibling of coder.refactor.complexity-cyclomatic-typescript.
    The realization is a zero-dependency Node ESM detector (regex + brace matching over source, no TS
    runtime) that extracts each function body and computes cyclomatic complexity as 1 + decision keywords
    (if / for / while / do / catch / case) + boolean and nullish operators (&& / || / ??) + ternaries,
    flagging any function whose score exceeds 10. Functions with fewer than 3 code lines are not scored,
    mirroring Core.
  normative_text: 'Cyclomatic complexity measures the count of independent paths through a function; the
    Convex

    obligation mirrors Core''s (default threshold <= 10). WHICH constructs count and HOW the score is

    computed is delegated to the per-stack detector; for the Convex/TS stack it is a regex pass — no

    AST, no tree-sitter — that adds one per decision keyword (`if` including `else if` / `for` /

    `while` / `do` / `catch` / `case`), one per boolean or nullish operator (`&&` / `||` / `??`),

    and one per ternary `?`, atop a base path of 1. String/template/comment text is masked before

    counting so literals never inflate the score. This realization needs no TypeScript runtime; it

    runs under the atdd.workspace.convex provider (`node` over the detector `.mjs`). Trivial

    functions (under 3 code lines) are not scored. The detector emits one RAW violation per

    offending function, located at the function''s header line.

    '
  fix_hint: "Reduce the branching of the flagged Convex function:\n  * extract nested decision blocks\
    \ into named helpers (a `lib/` or `shared/` module),\n  * replace long if/else-if ladders or switch\
    \ arms with a dispatch map,\n  * collapse compound &&/||/?? conditions into well-named predicates.\n\
    This rule's disposition is `strict`: a function over the cyclomatic threshold is not suppressible\n\
    and fails. Pre-existing counts in a consumer repo are held flat by a downstream ratchet baseline\n\
    (a consumer/coach concern), not the workspace detector — the detector always emits the RAW\nover-threshold\
    \ function list.\n"
  exceptions:
  - Functions with fewer than 3 code lines are not scored.
  - Test files (`*.test.*` / `*.spec.*`) and generated code under `convex/_generated/` are out of scope.
  - Vendored/build dirs (`node_modules`, `dist`, `build`, `.next`) are skipped during traversal.
  - The threshold (default 10) is configurable; the obligation is "at or below the configured threshold".
metadata:
  aliases:
  - CONVEX-COMPLEXITY-CYCLOMATIC-001
  severity: 3
  disposition: strict
  introduced_in: 0.1.0
