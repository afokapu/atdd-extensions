schema_version: 1.1.0
rule_id: coder.convex.no-server-console-log
kind: rule
status: active
name: Convex server functions must not call console.*
statement: >-
  Every Convex server module (a `*.ts`/`*.tsx`/`*.js`/`*.mjs` file under the `convex/`
  function tree, excluding `_generated/` codegen and test files) MUST NOT contain a bare
  `console.*` call (`console.log/info/warn/error/debug/trace`). This is the Convex-stack
  realization of the agnostic "production server code does not log via the language's bare
  console/print primitive" obligation (the python-pytest sibling is `coder.logging.print`).
  The detector that enforces it — a regex-over-source scan that reports each `console.*` call
  site — is the atdd.workspace.convex implementation referenced below; the obligation is
  stack-bound, the detector is JS-specific.
implementation:
  type: validator
  ref: coder.convex.no-server-console-log
content:
  summary: >-
    A "no bare console.* in Convex server source" obligation, the Convex sibling of
    coder.logging.print. The realization is a zero-dependency JS detector (regex over source,
    no TS runtime) that flags every `console.<method>(` call in each scanned Convex module,
    skipping `_generated/` and `*.test.ts`/`*.spec.ts` files.
  normative_text: |
    Convex queries, mutations, actions, and HTTP handlers run on Convex's backend. A bare
    `console.log(...)` there writes an unstructured, level-less line into production function
    logs — there is no severity, no correlation, and it cannot be filtered or shipped to a log
    sink. The obligation is "no `console.*` call survives in server source"; HOW the call sites
    are found is delegated to the per-stack detector. For Convex the detector resolves call
    sites by scanning `convex/**` modules supplied as scan roots; generated client code under
    `_generated/` and test files are out of scope (tests legitimately log).
  fix_hint: |
    Remove the `console.*` call, or replace it with structured logging:
      * delete the debug line, or
      * route through the project's logging utility / Convex's structured logger, or
      * if the line is genuinely diagnostic and belongs in a test, move it into a `*.test.ts`.
    This rule's disposition is `strict`: there is no inline-suppression marker. Pre-existing
    console calls in a consumer repo are held flat by a downstream ratchet baseline (a
    consumer/coach concern), not by the detector — the detector always emits the RAW call-site
    list.
  exceptions:
    - Test files (`*.test.*` / `*.spec.*`) are out of scope — tests may log freely.
    - Generated code under `convex/_generated/` is never scanned (codegen, never edited).
    - Vendored/build dirs (`node_modules`, `dist`, `build`, `.next`) are skipped during traversal.
    - Client/browser code outside the `convex/` server tree is governed by a separate frontend
      logging rule, not this server-surface one.
metadata:
  aliases:
    - CONVEX-NO-CONSOLE-001
  severity: 2
  disposition: strict
  introduced_in: 0.1.0
terms:
  - term_id: convex_server_module
    text: >-
      a non-test, non-generated source file under the `convex/` function tree that Convex
      auto-discovers and runs on its backend (a query/mutation/action/http handler or a module
      they import). The unit this rule scans.
  - term_id: bare_console_call
    text: >-
      a direct `console.<method>(...)` invocation (`log`/`info`/`warn`/`error`/`debug`/`trace`)
      in server source, as opposed to a call routed through a structured logging utility.
