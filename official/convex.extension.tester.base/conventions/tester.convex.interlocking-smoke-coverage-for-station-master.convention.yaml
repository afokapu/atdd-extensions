schema_version: 1.1.0
rule_id: tester.convex.interlocking-smoke-coverage-for-station-master
kind: rule
status: active
name: Exposed interlocking Station Master actions have smoke coverage through real entrypoints (Convex)
statement: >-
  Every exposed Station Master action of an interlocking (`entrypoint.exposed: true` with an `actions:`
  entry, core afokapu/atdd#1248) MUST have a smoke test that drives the action through the real
  entrypoint -> Station Master -> InterlockingRunner -> TrainRunner path (core afokapu/atdd#1251). This
  is the Convex-stack realization of the agnostic core obligation
  `tester.interlocking.smoke-coverage-for-station-master`; its JS detector (a member of the
  `convex_interlocking_coverage` FAMILY) scans the interlocking entrypoints and the consumer's
  `e2e/**/*.ts` tests and flags any exposed action with no smoke test that reaches the Station Master and
  exercises the production runners. EXPLICIT POLICY: an exposed action is a critical, user-facing route
  and its smoke coverage is enforced STRICT; an interlocking with `entrypoint.exposed: false` has no
  Station Master action and is OUT OF SCOPE — the criticality signal is the core `entrypoint.exposed`
  field, not a heuristic.
implementation:
  type: validator
  ref: tester.convex.interlocking-smoke-coverage-for-station-master
content:
  summary: >-
    A "exposed Station Master interlocking actions have real-entrypoint smoke coverage" obligation,
    rendered for the Convex backend. The JS realization parses each interlocking's `entrypoint`; for each
    `exposed: true` action it requires a smoke test under `e2e/**/*.ts` that references the action name,
    a Station Master reference (`StationMaster`/`stationMaster`), AND both production runners. Internal
    (`exposed: false`) interlockings carry no action and are not flagged.
  normative_text: |
    `entrypoint.exposed: true` requires at least one action (afokapu/atdd#1248), and those actions are
    Station Master action names — the user-facing surface. The smoke test for such an action should prove
    the whole interlocking-enabled path end to end: a real endpoint reaches the Station Master, the
    Station Master chooses the interlocking path (not a direct train), InterlockingRunner resolves the
    route, TrainRunner executes the selected train, and the trace records interlockingId/routeId/
    selectedTrainId. The detector's enforced minimum signature for an action's smoke test is an
    `e2e/**/*.ts` file that references the action name AND a Station Master reference AND both production
    runners (`InterlockingRunner`, `TrainRunner`).

    SEVERITY POLICY (explicit): exposed actions are critical user-facing routes -> strict;
    `exposed: false` interlockings are internal / noncritical -> out of scope. The policy is derived
    from the core `entrypoint.exposed` field, so it is mechanical, not a judgement call.
  fix_hint: |
    Add a smoke test for the flagged Station Master action that hits the real entrypoint and asserts the
    interlocking path is taken: call the real action endpoint so it reaches the Station Master, assert the
    Station Master chose the interlocking (InterlockingRunner) path, that InterlockingRunner resolved a
    route, that TrainRunner executed the selected train, and that the captured trace records the
    interlockingId / routeId / selectedTrainId. This rule is `strict` for exposed (user-facing) actions;
    if the interlocking is genuinely internal, set `entrypoint.exposed: false` with a reason and it leaves
    scope.
  exceptions:
    - Interlockings with `entrypoint.exposed` false (internal-transition-only / library-only /
      planned-not-exposed) carry no Station Master action and are out of scope.
    - An exposed action that already has a covering smoke test (a file referencing the action, the Station
      Master, and both runners) is satisfied and not flagged.
    - Per-stack renderings other than Convex are owned by their own workspace packages.
metadata:
  aliases:
    - CONVEX-TESTER-INTERLOCKING-SMOKE-STATION-MASTER-001
  severity: 1
  disposition: strict
  introduced_in: 0.1.0
  core_design_refs:
    - afokapu/atdd#1246
    - afokapu/atdd#1248
    - afokapu/atdd#1251
terms:
  - term_id: exposed_action
    text: >-
      a Station Master action name listed under an interlocking's `entrypoint.actions` when
      `entrypoint.exposed: true` (afokapu/atdd#1248). It is the user-facing route surface and requires
      smoke coverage; `exposed: false` interlockings have no such action.
  - term_id: station_master_smoke_test
    text: >-
      an `e2e/**/*.ts` smoke test that drives an exposed action through the real entrypoint to the Station
      Master, proving the Station Master chose the interlocking path, InterlockingRunner resolved a route,
      TrainRunner executed the selected train, and the trace recorded the interlockingId/routeId/
      selectedTrainId.
