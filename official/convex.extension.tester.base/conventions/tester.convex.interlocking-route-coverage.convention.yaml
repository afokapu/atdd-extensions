schema_version: 1.1.0
rule_id: tester.convex.interlocking-route-coverage
kind: rule
status: active
name: Every admissible interlocking route has an e2e test that exercises it (Convex)
statement: >-
  Every admissible route declared in an interlocking's guarded route space (the `routes:` list of
  `plan/_trains/_interlockings/**/*.yaml`, the authoritative route space locked by core
  afokapu/atdd#1248) MUST have at least one end-to-end test that exercises it — an `e2e/**/*.ts` test
  that names the route by its `routeId` or its resolved `trainId` so its resolution is proven through
  the production InterlockingRunner -> TrainRunner path (core afokapu/atdd#1251), not asserted
  descriptively. This is the Convex-stack realization of the agnostic core obligation
  `tester.interlocking.route-coverage`; its JS detector (a member of the `convex_interlocking_coverage`
  FAMILY) scans the interlocking route space against the consumer's `e2e/**/*.ts` tests and flags any
  declared route with no covering test. An admissible route with no e2e test is a SILENT-GREEN GAP.
implementation:
  type: validator
  ref: tester.convex.interlocking-route-coverage
content:
  summary: >-
    A "every declared interlocking route is exercised by an e2e test" obligation, rendered for the
    Convex backend. The JS realization parses each interlocking artifact, extracts its declared routes
    (routeId/trainId/category/categoryDigit), then scans `e2e/**/*.ts` for tests that reference the route
    by its `routeId` or its resolved `trainId` (comments masked so a name only in a comment does not
    count). Any declared route with no covering e2e test is a RAW violation anchored at the route's
    declaration line in the source interlocking YAML.
  normative_text: |
    The interlocking YAML is authoritative for the guarded route space (afokapu/atdd#1248): every entry
    under `routes:` is an admissible route the InterlockingRunner can resolve to exactly one `trainId`
    (afokapu/atdd#1251). Coverage of that route space is a tester obligation — an unexercised route is a
    branch of production route control that no test ever drives. A route is COVERED when at least one
    `e2e/**/*.ts` test references it by its `routeId` or by the `trainId` it resolves to. WHICH per-stack
    discovery applies (here: Convex `e2e/**/*.ts` scanned for the route/train tokens) is delegated to
    this realization; other stacks render the same obligation in their own e2e layout.
  fix_hint: |
    Add an end-to-end test that exercises the flagged route through the production runners. Place it
    under `e2e/interlockings/<interlocking_slug>/<slug>.routes.test.ts` and drive
    `new InterlockingRunner(...).resolveTrain(...)` so the route's guard-true case resolves to its
    expected `trainId`, then have `TrainRunner` execute it. Reference the route by its `routeId` or
    `trainId` so coverage is machine-discoverable. Do NOT satisfy this with a mock resolver or a
    descriptive assertion. This rule is `strict`: an admissible route with no covering e2e test blocks.
  exceptions:
    - YAML under the interlocking scope that declares no `routes:` (the `_interlockings.yaml` registry
      index and generated projections) carries no admissible route space and is out of scope.
    - A route already referenced by its `routeId` or resolved `trainId` in any `e2e/**/*.ts` test is
      covered and is not flagged.
    - Per-stack e2e renderings other than Convex are owned by their own workspace packages.
metadata:
  aliases:
    - CONVEX-TESTER-INTERLOCKING-ROUTE-COVERAGE-001
  severity: 1
  disposition: strict
  introduced_in: 0.1.0
  core_design_refs:
    - afokapu/atdd#1246
    - afokapu/atdd#1248
    - afokapu/atdd#1251
terms:
  - term_id: admissible_route
    text: >-
      a single entry under the `routes:` list of an interlocking artifact (afokapu/atdd#1248); it carries
      a `routeId`, the `trainId` it resolves to, a `category` + `categoryDigit`, and a `guard_ref`.
  - term_id: silent_green_route_gap
    text: >-
      an admissible route with no covering e2e test; the interlocking branch it represents is never
      executed, so CI passes while a guarded route-control path is entirely unproven.
