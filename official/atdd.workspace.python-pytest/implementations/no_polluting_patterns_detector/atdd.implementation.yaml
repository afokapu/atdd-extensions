schema_version: "1.1.0"
kind: implementation
implementation_id: tester.test-isolation.no-polluting-patterns
targets_workspace: atdd.workspace.python-pytest
contract_version: "1.1.0"

# Back-reference to the agnostic obligation this detector realizes. The tester
# OBLIGATION stays in CORE as an agnostic ATDD methodology node
# (tester.test-isolation.no-polluting-patterns); this detector is the
# python-pytest REALIZATION of that core node — NOT a new node, and NOT content
# under atdd.extension.tester. The package validator reports it as "realizes core
# node(s)".
realizes_convention: tester.test-isolation.no-polluting-patterns

# Single rule_id — the existing CORE id (disposition strict). The detector EMITS
# the RAW pollution-site list; the strict verdict (any site -> FAIL) is the
# downstream consumer's disposition decision, not the workspace detector's.
emits_rule_ids:
  - tester.test-isolation.no-polluting-patterns   # disposition: strict

# The pure detector module. test_no_polluting_patterns.py is the runnable
# enforcement the provider's `pytest` command collects; it scans ATDD_SCAN_ROOTS
# (TEST directories) and writes the RAW structured violation report to
# ATDD_VIOLATIONS_REPORT (v1.1 channel). It does NOT apply disposition.
entrypoint: no_polluting_patterns.py

# The runnable v1.1 report-emitting test the provider CLI collects: it scans
# ATDD_SCAN_ROOTS and writes the RAW {rule_id,file,line,col,evidence,source_line}
# report to ATDD_VIOLATIONS_REPORT. Declared (not hardcoded) so cli/scan.py runs
# THIS impl's detector — issue #1238 V1 generalize-cli.
report: test_no_polluting_patterns.py
