schema_version: "1.1.0"
kind: implementation
implementation_id: coder.refactor.quality-mi-typescript
targets_workspace: atdd.workspace.python-pytest
contract_version: "1.1.0"

# Back-reference to the agnostic obligation this detector primarily realizes.
realizes_convention: coder.refactor.quality-mi-typescript

# ONE run surfaces TWO rule_ids — both strict — exercising the v1.1 multi-rule
# output channel. Declared so the resolver knows one run emits more than the
# primary realizes_convention.
emits_rule_ids:
  - coder.refactor.quality-mi-typescript        # disposition: strict (approx MI < 20)
  - coder.refactor.quality-comments-typescript  # disposition: strict (comment ratio < 10%)

# SCOPE: TypeScript/TSX stack only (web/src). The MI here is a REGEX approximation
# (SEI formula, regex Halstead) — NO radon, NO tree-sitter — so it is pure stdlib
# and fires deterministically. The Python MI/comments realizations are a SEPARATE
# detector (quality_metrics_detector); these are the documented -python /
# -typescript provider split.

# test_quality_metrics_typescript.py is the runnable enforcement the provider's
# `pytest` command collects; it scans ATDD_SCAN_ROOTS and writes the RAW
# structured violation report to ATDD_VIOLATIONS_REPORT (v1.1 channel). It does
# NOT apply disposition — that is the downstream consumer's job.
entrypoint: quality_metrics_typescript.py
