schema_version: "1.1.0"
kind: implementation
implementation_id: coder.dead-code.reachability-typescript
targets_workspace: atdd.workspace.python-pytest
contract_version: "1.1.0"

# Back-reference to the agnostic obligation this detector realizes. The
# convention node lives in atdd.extension.coder; this implementation is the
# python-pytest realization of it (two-layer model).
#
# NOTE: this is a PYTHON detector inspecting TypeScript source (regex over import
# specifiers — no TS runtime needed), so it runs under the python-pytest provider
# exactly as the core Python validator did. It is NOT the separate node/vitest TS
# workspace of PHASE05-PROOF §6 gap 4.
realizes_convention: coder.dead-code.reachability-typescript

# Single rule_id (disposition strict). The detector emits RAW unreachable-file
# violations; the strict verdict and any ratchet baseline are downstream consumer
# disposition concerns.
emits_rule_ids:
  - coder.dead-code.reachability-typescript   # disposition: strict

# The pure detector module. test_dead_code_typescript.py is the runnable
# enforcement the provider's `pytest` command collects; it scans ATDD_SCAN_ROOTS
# (each root is the `@/` path-alias anchor) and writes the RAW structured
# violation report to ATDD_VIOLATIONS_REPORT (v1.1 channel). No disposition.
entrypoint: dead_code_typescript.py

# The runnable v1.1 report-emitting test the provider CLI collects: it scans
# ATDD_SCAN_ROOTS and writes the RAW {rule_id,file,line,col,evidence,source_line}
# report to ATDD_VIOLATIONS_REPORT. Declared (not hardcoded) so cli/scan.py runs
# THIS impl's detector — issue #1238 V1 generalize-cli.
report: test_dead_code_typescript.py
