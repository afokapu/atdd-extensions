schema_version: "1.1.0"
kind: implementation
implementation_id: coder.boundaries.http-client
targets_workspace: atdd.workspace.python-pytest
contract_version: "1.1.0"

# Back-reference to the agnostic obligation this detector realizes. The
# convention node lives in atdd.extension.coder; this implementation is the
# python-pytest realization of it (two-layer model). The detector runtime is
# python-pytest; it inspects TypeScript SOURCE via regex, it does not execute TS.
realizes_convention: coder.boundaries.http-client

emits_rule_ids:
  - coder.boundaries.http-client   # disposition: strict

# The pure detector module. test_contract_driven_http.py is the runnable
# enforcement the provider's `pytest` command collects; it scans ATDD_SCAN_ROOTS
# (with the consumer whitelist transported as ATDD_SCAN_EXCLUDES) and writes the
# RAW structured violation report to ATDD_VIOLATIONS_REPORT (v1.1 channel). It
# does NOT apply disposition — that is the downstream consumer's job.
entrypoint: contract_driven_http.py
