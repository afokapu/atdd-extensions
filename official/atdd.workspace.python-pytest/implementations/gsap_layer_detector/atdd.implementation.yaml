schema_version: "1.1.0"
kind: implementation
implementation_id: coder.presentation.gsap-layer
targets_workspace: atdd.workspace.python-pytest
contract_version: "1.1.0"

# Back-reference to the agnostic obligation this detector primarily realizes.
realizes_convention: coder.presentation.gsap-layer

# One run can surface a SECOND rule_id (coder.presentation.gsap-commons) too —
# both strict — exercising the v1.1 multi-rule output channel. Declared so the
# resolver knows one run emits more than the primary realizes_convention.
emits_rule_ids:
  - coder.presentation.gsap-layer    # disposition: strict (GSAP outside presentation/)
  - coder.presentation.gsap-commons  # disposition: strict (GSAP under commons/)

# test_gsap_layer.py is the runnable enforcement the provider's `pytest` command
# collects; it scans ATDD_SCAN_ROOTS and writes the RAW structured violation
# report to ATDD_VIOLATIONS_REPORT (v1.1 channel). It does NOT apply disposition.
entrypoint: gsap_layer.py
