terms:
- term_id: test_urn_header
  text: >-
    the explicit `# URN: test:{wagon}:{feature}:{WMBT}-{HARNESS}-{NNN}-{slug}` comment that carries a test
    file's authoritative identity (V3); its presence (line-leading) marks a `*.py` as an intended test.
- term_id: pytest_collectable_name
  text: >-
    a filename pytest collects by default — one starting with `test_` or ending with `_test.py`; an intended
    test that is not pytest-collectable is silently never run.
