schema_version: 1.1.0
rule_id: coder.vite.presentation-gsap-commons
kind: rule
status: active
name: Animation library is confined to the shared animation-commons module
statement: When production Vite/React code references a UI animation library (the stack's GSAP-class motion
  dependency), that import — or a bare `gsap.<method>(` call — MUST occur only inside the single shared
  animation-commons module; no other file may import or use it. This is the Vite/React realization of
  the agnostic "commons owns motion" obligation owned by the coder extension. The stack-specific detector
  that enforces it (a zero-dependency Node scan for `gsap` / `gsap/*` / `@gsap/*` imports and `gsap.*`
  uses outside the animation-commons module) is the frontend.workspace.runtime implementation referenced
  below — the obligation is agnostic, the detector is not.
terms:
- term_id: animation_commons_module
  text: the single shared module that owns motion code — an `animation`/`animations` directory under a
    `shared`/`commons` ancestor, or a file named `animationCommons`/`animation-commons`. The only place
    the animation library may be imported or used.
- term_id: animation_library
  text: a frontend motion/animation dependency (the Vite/React stack's `gsap`, `gsap/*`, `@gsap/*`) used
    to drive view transitions; confined to the animation-commons module by this rule and to the presentation
    layer by `coder.vite.presentation-gsap-layer`.
implementation:
  type: validator
  ref: vite_gsap_detector
source:
  legacy_path: official/atdd.extension.coder/conventions/coder.presentation.gsap-commons.convention.yaml
  legacy_section: rules
  legacy_rule_id: coder.presentation.gsap-commons
  extraction_mode: high_fidelity
content:
  summary: An agnostic "one auditable animation seam" obligation, the companion to `coder.vite.presentation-gsap-layer`.
    The Vite/React realization forbids any `gsap` / `gsap/*` / `@gsap/*` import (ESM, side-effect, dynamic-`import()`,
    CJS-`require`, type-only) and any bare `gsap.<method>(` call in every file EXCEPT the shared animation-commons
    module (an `animation` directory under a `shared`/`commons` ancestor, or an `animationCommons` basename).
  normative_text: 'Motion code is approved for the frontend, but it must be reachable from exactly one
    place so the

    animation surface stays auditable and the rest of the app stays motion-free. Letting any component

    import `gsap` directly scatters view-motion concerns across the codebase and defeats the single-seam

    guarantee — the same drift `coder.vite.presentation-gsap-layer` prevents at the layer boundary, here

    enforced at the module boundary. The obligation is "the animation library is imported and used only

    in the shared animation-commons module"; WHICH library token is matched and HOW the call sites are

    found is delegated to the per-stack detector. For Vite/React the tokens are `gsap` / `gsap/*` /

    `@gsap/*` across ESM, side-effect, dynamic-`import()`, CJS-`require`, and type-only forms, plus bare

    `gsap.<method>(` usage, scanned across the supplied source roots; the animation-commons module

    (path-recognized) is the sole exemption.

    '
  fix_hint: "Move the animation import out of the consuming file and into the shared animation-commons\
    \ module,\nthen call a named helper from there:\n  play-grid/presentation/Board.tsx   import { gsap\
    \ } from \"gsap\"   ->  FORBIDDEN\n  shared/animation/tween.ts          import { gsap } from \"gsap\"\
    \   ->  allowed (the one seam)\n  play-grid/presentation/Board.tsx   import { fadeIn } from \"@/shared/animation/tween\"\
    \  ->  use this\nKeep every component reaching motion through the commons helper, never `gsap` itself.\
    \ This rule is\n`strict`: a new gsap import/use outside animation-commons is not suppressible and\
    \ fails.\n"
  exceptions:
  - The shared animation-commons module (an `animation`/`animations` directory under a `shared` or `commons`
    ancestor, or a file whose basename is `animationCommons`/`animation-commons`) may import and use the
    animation library freely — that is the intended home.
  - Test code (`*.test.*` / `*.spec.*`) is out of scope (excluded via the scan-policy exclusions).
  - Vendored/build dirs (`node_modules`, `dist`, `build`, `.next`, `_generated`) are skipped.
