schema_version: 1.1.0
rule_id: coder.vite.commons-application-no-integration
kind: rule
status: active
name: Vite commons application layer must not import integration
statement: >-
  A module in the application layer of a Vite/React commons module (a non-test file under a
  `commons/application/` or `shared/application/` tree) MUST NOT import from the commons
  `integration/` layer. The application layer (hooks, context, orchestration) depends on ports
  it declares; the integration layer (HTTP clients, adapters) implements them. An application
  module that imports integration directly reverses the port/adapter relationship. This is the
  Vite-stack realization of the agnostic core obligation
  `coder.commons.application-layer-uses-ports` ("Application layer uses ports; integration
  implements them (no application→integration edges)"); the obligation is stack-neutral, the
  detector is TS-specific. The detector — a lexical import scan resolving each import's target
  layer — is the frontend.workspace.runtime family implementation referenced below.
terms:
- term_id: commons_module
  text: >-
    the frontend shared cross-cutting code root, recognized by a path segment named `commons`
    (canonical) or `shared` (legacy); a file's layer is the segment after that root.
- term_id: port
  text: >-
    an abstract interface the application layer depends on (declared in domain or application);
    the integration layer supplies concrete implementations. The application names the port,
    never the adapter.
implementation:
  type: validator
  ref: vite_commons_layering_detector
content:
  summary: >-
    A "the frontend commons application layer depends on ports, not adapters" obligation, the
    Vite realization of coder.commons.application-layer-uses-ports. The realization is a
    zero-dependency JS detector (lexical import scan, no TS runtime) that, for each
    application-layer module under the scan roots, flags every import whose resolved target is
    the commons `integration` layer.
  normative_text: |
    In the inward-only direction integration -> application -> domain, the application layer
    sits between domain and integration. Its hooks and context orchestrate use-cases in terms
    of ports — abstract interfaces it or the domain declares — and never reach outward to the
    integration adapters that implement them. An application module that imports an integration
    module inverts the dependency: the hook now knows a concrete client, cannot be tested
    against a fake port, and the integration layer is no longer swappable.

    The obligation is "the application layer uses ports; it does not import integration"; HOW
    the offending imports are found is delegated to the per-stack detector. For Vite/React the
    detector identifies an application module by location and resolves each import specifier —
    relative paths against the source directory, `@commons/*`/`@shared/*` aliases by segment —
    reporting every one that resolves into the commons `integration` layer.
  fix_hint: |
    Depend on a port instead of the adapter:
      * declare a `*Port` interface in the domain or application layer,
      * accept it as a hook/factory argument,
      * let the integration layer implement it and wire it at the app's composition root.
    The application module imports the port type, never the integration implementation.
  exceptions:
  - Non-application commons modules (`domain/*`, `integration/*`) are out of scope for this rule.
  - Test files (`*.test.*` / `*.spec.*`) are skipped; vendored/build dirs are not walked.
  - Bare package imports are not commons edges.
metadata:
  aliases:
  - VITE-COMMONS-APP-INTEGRATION-001
  - BOUNDARIES-COMMONS-002
  severity: 3
  disposition: strict
  introduced_in: 0.1.0
