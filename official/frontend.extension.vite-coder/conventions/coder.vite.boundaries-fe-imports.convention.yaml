schema_version: 1.1.0
rule_id: coder.vite.boundaries-fe-imports
kind: rule
status: active
name: Frontend imports respect inward dependency direction
statement: Vite/React frontend imports MUST respect inward dependency direction. Domain modules are
  framework-agnostic and import no other layer (no `preact`/`react`/`@maintain-ux`, no application /
  integration / presentation); presentation modules do not reach past the application layer into
  integration. This is the Vite-stack realization of the agnostic obligation owned by the coder extension
  (frontend.convention.yaml::rules + ::dependency, issue 394; the python-pytest sibling is
  `coder.frontend.boundaries-fe-imports`). The detector is the frontend.workspace.runtime family
  implementation referenced below.
terms:
- term_id: inward_direction
  text: the allowed frontend dependency edges — presentation -> application -> domain, with integration
    implementing ports; domain depends on nothing else and must stay framework-agnostic.
- term_id: framework_import
  text: an import of a UI framework (`preact`, `preact/hooks`, `react`, `react-dom`, `@maintain-ux`);
    forbidden in the domain layer.
implementation:
  type: validator
  ref: vite_boundaries_fe
content:
  summary: An "imports point inward" obligation, the Vite/React sibling of
    coder.frontend.boundaries-fe-imports. The realization reads each module's imports and flags a domain
    module that imports a UI framework or another layer, and a presentation module that imports the
    integration layer directly.
  normative_text: 'Layer boundaries are only real if the imports honor them. A domain module that imports
    `preact` is no longer portable or framework-agnostic; a presentation screen that imports
    `shared/integration/storage` bypasses the application layer and couples the view to the data source.
    The obligation: domain imports nothing but domain (and never a UI framework); presentation reaches only
    as far as the application layer. Note the deliberate frontend relaxation — the application layer MAY
    import integration (hooks are natural composition points), which differs from the backend. WHICH
    specifiers count as framework or cross-layer is delegated to the per-stack detector.

    '
  fix_hint: "Point imports inward:\n  // domain/Team.ts\n  import { h } from 'preact'                     ->\
    \  FORBIDDEN (domain must be framework-agnostic)\n  // presentation/HostScreen.tsx\n  import { storage }\
    \ from '@game/shared/integration/storage'   ->  FORBIDDEN (use an application hook)\n  import { useHost\
    \ } from '../application/useHost'            ->  allowed\n"
  exceptions:
  - The application layer MAY import integration (frontend hooks compose ports); this is NOT flagged.
  - Only domain and presentation layers are import-constrained here; integration and application follow the
    frontend allowed-edges in frontend.convention.yaml::dependency.
  - Test files are out of scope.
metadata:
  aliases:
  - BOUNDARIES-FE-IMPORTS-001
  severity: 3
  disposition: documentation-only
  introduced_in: 0.1.0
