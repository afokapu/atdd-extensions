schema_version: "1.0.0"
extension_id: frontend.extension.vite-coder
version: "0.1.0"
kind: extension
role: coder
flow_wagon: validate-source-surface
feature: vite-coder-conventions
# Front-end (Vite/React) coder conventions — the 10 Core front-end rules deferred
# from the Convex wave. owns.conventions wired at assembly (workers are add-only).
owns:
  conventions:
    - conventions/coder.vite.boundaries-http-client.convention.yaml
    - conventions/coder.vite.design-orphan-ui.convention.yaml
    - conventions/coder.vite.design-primitives.convention.yaml
    - conventions/coder.vite.design-token-color.convention.yaml
    - conventions/coder.vite.design-token-hardcoded.convention.yaml
    - conventions/coder.vite.presentation-gsap-commons.convention.yaml
    - conventions/coder.vite.presentation-gsap-layer.convention.yaml
    - conventions/coder.vite.presentation-i18n-config.convention.yaml
    - conventions/coder.vite.presentation-i18n-switcher.convention.yaml
    - conventions/coder.vite.refactor-coach-ratchet-pres.convention.yaml
  relationships:
    - relationships.yaml
  implementations: []
  schemas: []
  gates: []
  scopes: []
depends_on:
  core:
    - atdd.core.convention-node-schema
    - atdd.core.relationship-schema
    - atdd.core.workspace-schema
    - atdd.core.implementation-schema
    - atdd.core.violation-output-schema
  workspaces:
    - id: frontend.workspace.runtime
      contract: "^1.0.0"
removal_policy:
  allowed_if_no_external_dependents: true
