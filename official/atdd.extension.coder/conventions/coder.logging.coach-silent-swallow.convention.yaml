terms:
- term_id: silent_swallow
  text: a `try/except` (try/catch) whose handler body has no logging call and no `raise`, and which
    either returns a value or is a single `pass` — suppressing the failure with no observable signal.
- term_id: observable_reaction
  text: a logging-level call on a known logger receiver (`logger`/`log`/`logging`/`self.logger` X) or a
    `raise` statement in the handler body, making the caught failure visible in production observability.
- term_id: production_code
  text: shippable application code under the scanned source roots, excluding test files, `conftest.py`,
    `__init__.py` shims, and fixture directories.
