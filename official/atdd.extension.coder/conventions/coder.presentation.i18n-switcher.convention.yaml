terms:
- term_id: language_switcher
  text: a frontend component (`LanguageSwitcher`/`LocaleSwitcher`) that lets users choose the active
    locale; its selectable options must come from the shared supported-locale list, not a local literal.
- term_id: shared_locale_list
  text: the manifest-backed `SUPPORTED_LOCALES` (or `getSupportedLocales()`) exposed via the i18n config;
    the single source the switcher must read so the picker never drifts from the manifest.
