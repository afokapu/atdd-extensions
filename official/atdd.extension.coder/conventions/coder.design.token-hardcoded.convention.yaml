terms:
- term_id: visual_token
  text: a non-color design value — spacing, border-radius, or motion duration — that belongs in the
    design-system foundations rather than inline in a wagon.
- term_id: wagon_ui_file
  text: a feature UI file outside the design system (`maintain-ux/`) and outside test trees; the surface
    this rule scans for hardcoded visual tokens.
