terms:
- term_id: foundations
  text: the lowest design-system layer holding pure values (spacing, radii, motion, color tokens) that
    primitives and components compose; the web home is `maintain-ux/foundations`.
- term_id: raw_pixel_literal
  text: a hardcoded multi-digit `px` value embedded in a primitive/component (an `"16px"` or `24px` style
    value) that bypasses the foundations token set.
