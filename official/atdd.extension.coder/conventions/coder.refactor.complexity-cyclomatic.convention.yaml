terms:
- term_id: cyclomatic_complexity
  text: the count of independent paths through a function, computed as 1 plus the number of decision
    points (branch keywords and boolean operators in conditions).
- term_id: decision_point
  text: a construct that introduces a branch — if / elif / for / while / except / case, plus each and / or
    appearing in a condition line.
- term_id: complexity_threshold
  text: the configured maximum cyclomatic complexity a function may have (industry-standard default 10);
    the obligation is to stay below it.
