terms:
- term_id: presentation_reduction
  text: a presentation-layer file (`*/presentation/*.{tsx,ts,py}`) whose line count dropped by more than
    20% relative to the merge base in a single change set; a full deletion is a 100% reduction.
- term_id: smoke_evidence
  text: a recorded attestation that the trimmed feature was manually smoke-tested, stored at
    `.atdd/smoke-evidence/<issue>.yaml`; its presence (for the governing issue) absorbs the reduction.
- term_id: advisory_gate
  text: the disposition for this rule — severity 3, advisory rather than blocking, but gating the
    SMOKE->REFACTOR transition until smoke evidence is recorded.
