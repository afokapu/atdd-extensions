schema_version: 1.1.0
rule_id: coder.design.orphan-export
kind: rule
status: active
name: Design-system exports have at least one consumer
statement: Every primitive or component the design system exports MUST be imported by at least one
  consumer outside the design system, so the system stays lean and free of dead exports. This is the
  language-agnostic obligation owned by the coder extension. The stack-specific detector that enforces it
  (a pytest/regex scan comparing design-system index exports against import usage across the codebase) is
  the python-pytest workspace implementation referenced below — the obligation is agnostic, the detector
  is not.
implementation:
  type: validator
  ref: coder.design.primitives
content:
  summary: An agnostic "no dead design-system exports" obligation. The web realization reads the names
    exported from `maintain-ux/primitives` and `maintain-ux/components` index barrels, collects every name
    imported from `maintain-ux` across non-design-system files, and flags any exported primitive/component
    name that no consumer imports (after dropping the known false positives `type` / `h` / `Fragment`). It
    is realized by the same multi-rule detector as the rest of the design-system family (declared via that
    implementation's `emits_rule_ids`).
  normative_text: |
    A design-system export with zero consumers is dead weight: it grows the surface area, the bundle, and
    the maintenance burden of the system without paying for itself. The obligation: every exported
    primitive/component is imported somewhere outside the design system. WHICH export and import forms are
    parsed (barrel re-exports, named imports) and WHICH names are treated as framework false positives is
    delegated to the per-stack detector; for the web stack it reads `export { ... }` from the
    primitives/components `index.ts` barrels and named `import { ... } from '...maintain-ux...'` usage,
    dropping `type` / `h` / `Fragment`. Foundations exports are out of scope for this rule (only
    primitives + components are checked, mirroring core).
  fix_hint: |
    Wire the orphaned export into a consumer, or remove it:
      maintain-ux/primitives/index.ts  exports `Orphan`  (imported by nothing)  ->  import it from a
      presentation component, OR delete the primitive and its barrel export if it is genuinely unused.
    Keep the design system lean — every exported primitive/component earns its place by having a consumer.
    This rule is `strict`: an unconsumed design-system export is not suppressible and fails.
  exceptions:
    - Foundations exports are not checked — only primitives and components must have a consumer.
    - Framework false positives (`type`, `h`, `Fragment`) are never flagged.
    - Type-only exports (names ending in `Props`) are filtered out before the consumer check.
