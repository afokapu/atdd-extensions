terms:
- term_id: design_system_export
  text: a primitive or component name re-exported from the design system's barrel index
    (`maintain-ux/primitives/index.ts` or `maintain-ux/components/index.ts`).
- term_id: consumer
  text: any file outside the design system that imports the name from a `maintain-ux` path; one such
    importer satisfies the rule for that export.
