terms:
- term_id: graph_root
  text: a file that anchors reachability analysis — an app entry point (`main.ts(x)`/`app.ts(x)`), a test
    file, an `index.ts`/`index.tsx` barrel, `composition.ts`/`wagon.ts`, or a registered entry. All files
    reachable from a root are "alive".
- term_id: reachable_file
  text: a TS file that some graph root transitively imports (forward edge) or that is imported by a
    reachable file (reverse edge); the union of forward and reverse BFS from the roots.
- term_id: barrel_export
  text: an `index.ts`/`index.tsx` file that re-exports symbols (`export { X } from './m'`), the TS
    equivalent of an `__init__.py` shim — a graph edge and a root, never reported as dead.
