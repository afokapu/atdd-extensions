terms:
- term_id: contract_entity
  text: an entity name derived from a contract `*.schema.json` `$id` (the segment after the last `:`, with
    `.`→`_`), normalized to PascalCase for matching against class names.
- term_id: synthetic_location
  text: an aggregate `contracts/<entity>` location with empty `source_line`, used because the violation is
    a cross-file "missing in language L" fact rather than a single offending source line.
- term_id: advisory_disposition
  text: the routing decision (per issue 395) that markerless synthetic-location cross-language facts warn
    and pass rather than hard-fail, since per-site suppression cannot apply to them.
