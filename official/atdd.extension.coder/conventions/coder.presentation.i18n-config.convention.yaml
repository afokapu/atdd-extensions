terms:
- term_id: locale_manifest
  text: the centralized single-source-of-truth declaration of an application's supported locales, exposed
    to runtime as a shared `SUPPORTED_LOCALES` list (or `getSupportedLocales()`); all runtime locale
    decisions derive from it.
- term_id: hardcoded_locale_array
  text: a literal array assignment (`locales`/`supportedLocales`/`languages = ['en', ...]`) that
    enumerates locales inline instead of importing them from the manifest — the drift this rule forbids.
