terms:
- term_id: nesting_depth_ts
  text: the maximum control-block brace depth in a TypeScript function, counting only braces that follow a
    control-flow keyword.
- term_id: control_keyword
  text: a keyword that opens a counted nested block — if / else / for / while / do / switch / try / catch /
    finally; braces not preceded by one (object literals, arrow bodies) are ignored.
- term_id: nesting_threshold
  text: the configured maximum nesting depth a TS function may have (default 4, parity with the Python
    rule); the obligation is to stay at or below it.
