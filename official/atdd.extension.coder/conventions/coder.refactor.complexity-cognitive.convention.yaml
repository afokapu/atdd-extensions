terms:
- term_id: cognitive_complexity
  text: the SonarQube / Campbell measure of how hard a function is to understand — a structural increment
    per control construct plus a nesting increment proportional to depth.
- term_id: nesting_increment
  text: the extra +N (N = current nesting depth) added for an if / for / while / except / with nested
    inside another control structure; elif / else and boolean operators are exempt.
- term_id: cognitive_threshold
  text: the configured maximum cognitive complexity a function may have (SonarQube default 15); the
    obligation is to stay at or below it.
