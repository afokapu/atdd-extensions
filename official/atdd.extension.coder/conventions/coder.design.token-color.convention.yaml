terms:
- term_id: color_token
  text: a named color value defined in the design-system foundations (referenced via a `colors.` accessor)
    that centralizes the palette.
- term_id: raw_color_literal
  text: an inline color value embedded directly in source — a six-digit hex (`#rrggbb`) or an `rgba()`
    call — that bypasses the token set.
