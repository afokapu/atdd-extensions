terms:
- term_id: per_item_io
  text: an IO operation (database query, network/HTTP call, filesystem or other external round trip)
    executed once per element of an enclosing loop or comprehension, producing O(N) round trips.
- term_id: batching
  text: restructuring per-item IO into a single bounded operation outside the loop — a batch/IN query, a
    JOIN, a dataloader, or one bulk request — so cost does not scale with collection size.
