terms:
- term_id: honored_contract
  text: a contract entity for which at least one Python or Dart class matches the normalized entity name;
    honored contracts are not flagged.
- term_id: orphaned_contract
  text: a contract entity with zero matching classes in every stack — the flagged "implemented nowhere"
    fact, reported at a synthetic `contracts/<entity>` location.
- term_id: distinct_from_entity_rule
  text: xlang-contract fires only when NO stack implements the entity; xlang-entity fires when SOME but not
    all stacks do — the two rules partition the cross-language coverage gap.
