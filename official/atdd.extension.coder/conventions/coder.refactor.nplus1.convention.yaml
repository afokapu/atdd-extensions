terms:
- term_id: n_plus_one
  text: a DB (or HTTP-as-DB) client call executed once per item of an enclosing loop/comprehension,
    issuing O(N) round trips where one batched query (O(1)) would suffice.
- term_id: db_client_call
  text: an attribute call whose method is a known database/ORM/cursor/Supabase operation, or an HTTP
    verb invoked on a known HTTP module (`requests`/`httpx`/`aiohttp`) used as a data source.
- term_id: iteration_construct
  text: a `for`/`while`/`async for` statement or a list/set/dict comprehension or generator expression —
    any construct whose body executes per element.
