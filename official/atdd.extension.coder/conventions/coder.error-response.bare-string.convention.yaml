terms:
- term_id: structured_error_response
  text: an HTTP error body conforming to the commons:error:response contract — an object with
    required `status_code`, `error_code`, `message` and an optional `details` object — so clients can
    classify and handle errors programmatically.
- term_id: bare_string_detail
  text: an `HTTPException(...)` whose `detail=` argument is a plain string or f-string literal rather
    than a structured dict — the anti-pattern this rule forbids.
- term_id: production_code
  text: shippable application code under the scanned source roots, excluding bytecode caches and
    non-shipped surfaces.
