terms:
- term_id: contract_driven_http_client
  text: the project's governed HTTP client (HttpClient) through which all frontend HTTP access must
    flow, applying request/response contracts, interceptors, auth, and telemetry uniformly.
- term_id: raw_fetch
  text: a direct call to the platform `fetch()` primitive (matched as a bare `fetch(` that is not a
    property access or part of a longer identifier) — the un-governed egress this boundary forbids.
- term_id: whitelist
  text: the set of frontend paths permitted to use the primitive directly (the consumer's
    `contract_driven_http.whitelist`), transported into the hermetic run as scan exclusion globs
    rather than read from disk.
