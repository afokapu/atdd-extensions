terms:
- term_id: structured_context
  text: a machine-readable key/value payload attached to a log event (Python stdlib `logging`
    `extra={...}`, structured-logger fields, JS logger context object) carrying correlation ids, request
    scope, and resource keys so the event is queryable and redactable.
- term_id: bare_log_call
  text: a logging-level call (`logger.info/debug/warning/error/critical/exception/log`) on a known
    logger receiver that supplies no structured-context channel — only a message string.
- term_id: production_code
  text: shippable application code under the scanned source roots, excluding test files, `__init__.py`
    shims, and exempt surfaces.
