schema_version: 1.1.0
rule_id: coder.logging.structured
kind: rule
status: active
name: Logger calls must carry structured context
statement: When production application code emits an observability event through a structured logger,
  the call MUST attach a structured-context payload (the language's keyword/argument channel for
  correlation ids, request scope, and other key/value context) rather than logging a bare message
  string. This is the language-agnostic obligation owned by the coder extension. The stack-specific
  detector that enforces it (a pytest/AST scan for logger method calls lacking the `extra=` keyword in
  non-test Python production code) is the python-pytest workspace implementation referenced below — the
  obligation is agnostic, the detector is not.
implementation:
  type: validator
  ref: coder.logging.structured
content:
  summary: An agnostic "log with structured context, not a bare string" obligation. The Python
    realization forbids `logger.info("msg")` without an `extra={...}` context dict; other stacks realize
    the same obligation with their own structured-context channel under their own workspace detector.
  normative_text: |
    A logging call in shippable application code must carry machine-readable context alongside its
    message so the event is queryable, correlatable, and redactable in production observability. A bare
    message string (no structured context) degrades to an unstructured log line that cannot be filtered
    by request/correlation scope. The obligation is "logger calls carry structured context"; WHICH
    channel supplies that context and HOW it is detected is delegated to the per-stack detector. For
    Python that channel is the stdlib `logging` `extra={...}` keyword and the detector is an AST scan
    (`ast.Call` on a known logger receiver whose method is a logging level and whose keywords lack
    `extra`).
  fix_hint: |
    Attach a structured-context dict to the logging call:
      logger.info("user created")  ->  logger.info("user created", extra={"user_id": uid})
    Promote the salient identifiers (user/request/correlation ids, resource keys) into `extra=` so the
    event is queryable. If a pre-existing bare call cannot be cleaned immediately, this rule's
    disposition is `suppress-and-clean`: stamp the offending line with an inline marker
    `# atdd:suppress(coder.logging.structured) UNTIL=<YYYY-MM-DD>` to absorb it on a deadline while the
    backlog is burned down. New bare calls are not suppressible by default and fail.
  exceptions:
    - Test code is out of scope — test files (`test_*.py`, `*/tests/`) log freely without `extra=`.
    - Re-export shims (`__init__.py`) are excluded from the scan.
    - Pre-existing bare calls carrying a valid inline `# atdd:suppress(coder.logging.structured)` marker
      are absorbed by the `suppress-and-clean` disposition (applied by the coach/consumer layer, NOT by
      the workspace detector — the detector emits the RAW violation regardless of marker).
