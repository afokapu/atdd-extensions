terms:
- term_id: cyclomatic_complexity_ts
  text: the count of independent paths through a TypeScript function, computed by regex as 1 plus decision
    keywords plus boolean / nullish operators plus ternaries.
- term_id: regex_extraction
  text: the no-runtime approach this detector uses — regex function patterns plus brace matching to slice a
    TS function body, instead of a TypeScript AST or tree-sitter parse.
- term_id: complexity_threshold
  text: the configured maximum cyclomatic complexity a TS function may have (default 10, parity with the
    Python rule); the obligation is to stay at or below it.
