schema_version: 1.1.0
rule_id: coder.refactor.composition-consumer
kind: rule
status: active
name: Every layer file has a valid downstream consumer
statement: Within a feature, each implementation file in a source layer (domain, application, or
  integration) MUST be consumed by at least one valid downstream consumer drawn from the layer's
  permitted consumer set (per the composition layer rules), so that intra-feature vertical slices are
  fully wired and no implementation is left orphaned. This is the language-agnostic obligation owned by
  the coder extension. The stack-specific detector that enforces it (a pytest/AST import-graph scan that
  checks each layer file for an upstream consumer in an allowed layer) is the python-pytest workspace
  implementation referenced below — the obligation is agnostic, the detector is not.
implementation:
  type: atdd.workspace.python-pytest
  ref: coder.refactor.composition-consumer
content:
  summary: An agnostic "no unwired layer files" obligation. The python realization builds an
    import-reachability graph for each feature and flags a domain/application/integration file that has
    zero upstream consumers among its permitted layers (e.g. an application file imported by neither a
    presentation file nor the composition root) when local consumer candidates exist. Existing-layers-only
    filtering avoids false positives on intentionally partial features.
  normative_text: |
    Every implementation file in a source layer should be consumed by at least one valid downstream
    consumer or composition root; an unwired file is dead weight that signals an incomplete vertical
    slice. Candidate consumer layers are filtered by existing-layers-only at validation time, so a
    missing higher layer does not create a false positive for an intentionally partial feature. The
    permitted consumer set per source layer (verbatim from the composition convention): application ->
    {presentation, composition}; integration -> {application, composition}; domain -> {application,
    integration, presentation, composition}. WHICH import forms count and HOW reachability is computed is
    delegated to the per-stack detector. For the python stack the detector resolves `ast` imports
    (including feature-local layer imports) into a file graph, then checks each source file for an
    upstream consumer in an allowed layer.
  fix_hint: |
    Wire the orphaned file into a valid consumer, or remove it:
      src/application/orphan_use_case.py  (imported by nothing)  ->  import it from a presentation
      controller or from the feature's composition.py, OR delete it if it is genuinely unused.
    A file is only flagged when local consumer candidates exist (the allowed consumer layers are present
    in the feature) — partial features do not over-fail. This rule is `strict`: a newly unwired layer
    file is not suppressible and fails.
  exceptions:
    - Existing-layers-only — if none of a source layer's permitted consumer layers exist yet in the
      feature, the file is not flagged (intentionally partial features are allowed).
    - Connector/barrel files (`__init__.py`) and test trees are excluded from the graph.
    - Cross-feature consumption is allowed — a consumer in another feature satisfies the rule.
