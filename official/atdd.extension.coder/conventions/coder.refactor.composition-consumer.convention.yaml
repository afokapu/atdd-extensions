terms:
- term_id: source_layer
  text: a feature layer that holds implementation files subject to the consumer rule — domain,
    application, or integration (presentation is a consumer, not a checked source layer here).
- term_id: valid_consumer
  text: an upstream file that imports the target (directly or transitively) and lives in one of the
    target layer's permitted consumer layers, including the feature composition root.
- term_id: existing_layers_only
  text: the filter that restricts the permitted-consumer set to layers that actually exist in the
    feature, so intentionally partial features are not failed for absent higher layers.
