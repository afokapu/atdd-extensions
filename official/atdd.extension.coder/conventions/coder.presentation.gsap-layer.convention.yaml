terms:
- term_id: animation_library
  text: a frontend motion/animation dependency (the web stack's `gsap`, `gsap/*`, `@gsap/*`) used to
    drive view transitions; the agnostic obligation confines it to the view layer, each stack's detector
    binds the concrete import token.
- term_id: presentation_layer
  text: the view layer of a feature, located at `{wagon}/{feature}/presentation/**` under the scanned web
    source root; the only layer permitted to import an animation library.
- term_id: production_code
  text: shippable frontend source under the scanned web roots, excluding test trees and other exempt
    surfaces supplied as scan exclusions.
