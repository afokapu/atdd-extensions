terms:
- term_id: nesting_depth
  text: the maximum number of enclosing control blocks at any point in a function, measured from
    indentation (4 spaces == 1 level).
- term_id: block_keyword
  text: a statement that opens a nested block — if / elif / else / for / while / with / try / except /
    finally / def / class — recognized by a trailing ":".
- term_id: nesting_threshold
  text: the configured maximum nesting depth a function may have (default 4); the obligation is to stay
    below it.
