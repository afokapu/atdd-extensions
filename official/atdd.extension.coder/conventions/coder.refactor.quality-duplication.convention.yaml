terms:
- term_id: normalized_fragment
  text: a window of consecutive AST statements with Name nodes rewritten to `VAR` and string/numeric
    constants rewritten to `""`/`0`, hashed so that renamed-but-structurally-identical copies collide.
- term_id: cross_file_collision
  text: the same normalized-fragment hash appearing in two DIFFERENT files — the unit of a duplication
    violation; same-file repetition does not count.
