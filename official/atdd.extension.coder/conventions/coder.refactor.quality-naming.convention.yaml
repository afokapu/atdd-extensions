terms:
- term_id: pascal_case_class
  text: a class name written with a leading capital and internal capitals (e.g. `OrderRepository`); a
    class whose name starts lowercase violates the rule.
- term_id: upper_case_constant
  text: a module-level constant named in all caps with underscores (e.g. `MAX_RETRIES`); a lowercase
    snake_case module assignment to a literal is flagged as a mis-cased constant.
