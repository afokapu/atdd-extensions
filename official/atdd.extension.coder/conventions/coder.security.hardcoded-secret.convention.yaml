schema_version: 1.1.0
rule_id: coder.security.hardcoded-secret
kind: rule
status: active
name: No hardcoded secrets in source files
statement: Source files MUST NOT contain hardcoded credentials — AWS access keys, PEM private-key headers,
  password / API-key / secret-key assignments, or bearer-token literals — because committed secrets are
  immediately compromised and cannot be rotated by code review alone. This is the language-agnostic
  obligation owned by the coder extension. The stack-specific detector that enforces it (a pytest/regex
  line scan for secret-shaped strings, skipping comment lines) is the python-pytest workspace
  implementation referenced below — the obligation is agnostic, the detector is not.
implementation:
  type: validator
  ref: coder.security.sql-injection
content:
  summary: An agnostic "no committed secrets" obligation. The python realization scans each file
    line-by-line (skipping `#` comment lines) for a fixed set of secret patterns — `AKIA…` AWS access keys,
    `-----BEGIN … PRIVATE KEY-----` headers (both case-sensitive), and case-insensitive
    password/api_key/secret_key/token assignments to a quoted literal of sufficient length — and flags each
    matching line (truncating the evidence so the secret itself is not echoed in full).
  normative_text: |
    A secret literal in source is leaked the moment it is committed; the only correct place for credentials
    is an injected secret store / environment variable. The obligation: no line of source matches a known
    secret shape. WHICH patterns count and HOW they are matched is delegated to the per-stack detector; for
    python it is a line scan with the vendored regex set (AWS key, private-key header — both
    case-sensitive; password/api_key/generic_token assignments — case-insensitive), with comment lines
    skipped and the matched text truncated in the emitted evidence to avoid re-leaking the secret.
  fix_hint: |
    Remove the literal and read the secret from configuration:
      password = "supersecret123"                 # ❌ hardcoded
      password = os.environ["DB_PASSWORD"]         # ✅ injected at runtime
    AWS keys, PEM private keys, and API tokens must come from a secret store / env var, never source.
    `.env.example`, fixtures, and test trees are excluded by the consumer's scan policy. This rule is
    `strict`: a newly committed secret literal is not suppressible and fails.
  exceptions:
    - Comment lines (leading `#`) are skipped — a documented non-secret example in a comment is not flagged.
    - Example/fixture/test files (`.env.example`, `**/fixtures/**`, test trees) are removed by the
      consumer's exclusion globs, not by the detector.
metadata:
  aliases:
    - SECURITY-HARDCODED-SECRET-001
    - SPEC-CODER-SEC-0003
  severity: 4
  disposition: strict
  introduced_in: 1.67.0
source:
  legacy_path: src/atdd/coder/conventions/security.convention.yaml
  legacy_section: rules
  legacy_rule_id: coder.security.hardcoded-secret
  legacy_sha: a63b6862a146e7df
  extraction_mode: high_fidelity
parity:
  source_fragments_preserved: true
  examples_preserved: true
  implementation_preserved: true
  fix_hint_preserved: true
  reviewed_at: '2026-06-28'
terms:
- term_id: secret_pattern
  text: one of the vendored regexes — AWS access key (`AKIA[0-9A-Z]{16}`), PEM private-key header, or a
    password/api_key/secret_key/token assignment to a quoted literal of sufficient length.
- term_id: case_sensitivity
  text: AWS-key and private-key-header patterns match case-sensitively; the password/api_key/token
    assignment patterns match case-insensitively (mirrored verbatim from the source validator).
- term_id: truncated_evidence
  text: the emitted evidence truncates the offending line so the actual secret value is not reproduced in
    the violation report.
