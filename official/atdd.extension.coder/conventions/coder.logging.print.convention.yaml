terms:
- term_id: console_print_primitive
  text: a language's bare write-to-stdout/stderr call (Python `print()`, JS `console.log`, Dart
    `debugPrint`/`print`, Go `fmt.Println`). The agnostic obligation forbids it for diagnostics; each
    stack's detector binds the concrete primitive.
- term_id: structured_logger
  text: a logging facility carrying level + structured context (e.g. Python stdlib `logging` with
    `extra={...}`) whose output is routed to managed sinks rather than the raw console.
- term_id: production_code
  text: shippable application code under the scanned source roots, excluding test files, `__init__.py`
    shims, and exempt CLI/user-output surfaces.
