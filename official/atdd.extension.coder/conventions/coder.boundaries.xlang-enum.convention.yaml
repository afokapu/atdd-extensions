terms:
- term_id: shared_enum
  text: an enum name that appears in both the Python and Dart extractions; only shared enums are compared.
- term_id: value_set_mismatch
  text: a non-empty symmetric difference between the two stacks' lower-cased member sets; the violation
    reports which members each side lacks.
- term_id: case_insensitive_compare
  text: enum members are compared after lower-casing, so capitalization conventions differing across
    languages do not create false mismatches.
