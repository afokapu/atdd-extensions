terms:
- term_id: report_threshold
  text: the 500-line mark above which a file is surfaced as a raw observation; not a hard limit but the
    input to a downstream growth ratchet.
- term_id: growth_ratchet
  text: the downstream disposition that baselines an over-threshold file's current size and fails only on
    further growth — applied by the consumer, never by the provider/detector.
