terms:
- term_id: sink_method
  text: a call whose attribute name is one of the configured database execution methods (`execute`,
    `executemany`, `raw`, `execute_sql`); the argument to such a call is what the rule inspects.
- term_id: dynamic_sql_string
  text: a SQL-keyword-bearing string built at runtime via f-string interpolation (`ast.JoinedStr`) or `+`
    concatenation (`ast.BinOp` with `ast.Add`) — as opposed to a single static constant.
- term_id: parameterized_query
  text: the safe construction — a static SQL string plus separately bound parameters — that satisfies the
    obligation and is never flagged.
