terms:
- term_id: layer_hierarchy
  text: the design-system dependency order tokens ← primitives ← components ← templates; imports may only
    flow downward (toward tokens).
- term_id: outward_import
  text: an import from a design-system file into a feature wagon (a `@/` or `../` path that leaves
    `maintain-ux`); forbidden because the design system must stay wagon-agnostic.
