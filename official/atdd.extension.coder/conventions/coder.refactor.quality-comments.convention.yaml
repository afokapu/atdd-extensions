  extraction_mode: high_fidelity
parity:
  source_fragments_preserved: true
  examples_preserved: true
  implementation_preserved: true
  fix_hint_preserved: true
  reviewed_at: '2026-06-28'
terms:
- term_id: comment_ratio
  text: the fraction of a module's non-blank lines that are comments or docstrings; the rule requires
    >= 0.10 (10%).
- term_id: docstring_span
  text: a triple-quoted (`"""` or `'''`) string region — counted line-by-line as comment lines, including
    the single-line form where the delimiter opens and closes on one line.
