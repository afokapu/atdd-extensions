terms:
- term_id: maintainability_index
  text: the SEI/Microsoft 0-100 composite metric (Halstead volume + cyclomatic complexity + LOC +
    comment ratio) where >= 20 is considered maintainable; computed for python via radon's `mi_visit`.
- term_id: dont_penalize_fallback
  text: the behavior (preserved verbatim from core) of returning MI=100.0 for any file the backend
    cannot score — a parse error or an absent radon dependency yields no violation, never a false fail.
