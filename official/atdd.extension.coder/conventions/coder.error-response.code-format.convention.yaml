terms:
- term_id: error_code
  text: the stable, machine-readable classification field of a structured error response that clients
    branch on (e.g. `INVALID_INPUT`, `RESOURCE_NOT_FOUND`).
- term_id: upper_snake_case
  text: an identifier matching `^[A-Z][A-Z0-9_]+$` — an initial uppercase letter followed by
    uppercase letters, digits, and underscores; the required shape for an enum-style error_code.
- term_id: production_code
  text: shippable application code under the scanned source roots, excluding bytecode caches and
    non-shipped surfaces.
