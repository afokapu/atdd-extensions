terms:
- term_id: presentation_layer
  text: the view layer of a feature (web `{wagon}/{feature}/presentation/**`) that renders markup; the
    only layer this rule checks for design-system composition.
- term_id: design_system_import
  text: an import from the shared design system (web `maintain-ux` primitives / components / foundations,
    via `@/maintain-ux/*`, `@maintain-ux/*`, or relative `../primitives` / `../components` /
    `../foundations` paths).
