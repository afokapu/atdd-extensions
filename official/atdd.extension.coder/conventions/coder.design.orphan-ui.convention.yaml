terms:
- term_id: ui_surface
  text: any file that renders markup (a page, container, layout, or presentation component), regardless of
    layer; the full set this rule checks, broader than presentation-only.
- term_id: design_system_connection
  text: at least one import from the shared design system (`maintain-ux` / `@maintain-ux`) in a rendering
    UI file; its absence is what this rule flags.
