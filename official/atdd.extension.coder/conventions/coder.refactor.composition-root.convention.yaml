terms:
- term_id: composition_root
  text: the feature's dependency-injection entry point (python `composition.py` / `wagon.py`) that
    assembles the feature's layers; reachability is measured from here.
- term_id: setter_wiring
  text: wiring a layer into the composition root by importing a `set_*` setter and CALLING it; an
    imported-but-uncalled setter does not count as reaching the layer (the #955 behavior).
- term_id: reaches_all_existing_layers
  text: the obligation that the transitive import/called-setter closure from the composition root
    includes every layer the feature actually implements.
