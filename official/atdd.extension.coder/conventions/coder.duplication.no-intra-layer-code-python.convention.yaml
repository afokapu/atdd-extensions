terms:
- term_id: architectural_layer
  text: the role a file plays in clean architecture — domain, application, presentation, or
    integration — inferred from path segments (e.g. `/domain/`, `/use_cases/`, `/controllers/`,
    `/adapters/`); files with no recognizable layer segment classify as `unknown` and are excluded.
- term_id: structural_fingerprint
  text: a hash that captures code shape while ignoring identifiers and literal values, so a renamed
    or re-valued copy still collides; for Python a SHA-256 over normalized AST subtrees (Names ->
    `VAR`, numeric/string Constants -> `0`/`""`).
- term_id: code_fragment
  text: a sliding window of N consecutive statements (default N=5) at module top level (after the
    header prefix) or within a function/method body, the unit compared for cross-file duplication.
