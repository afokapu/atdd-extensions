terms:
- term_id: architectural_layer
  text: the role a TypeScript file plays in clean architecture — domain, application, presentation,
    or integration — inferred from path segments (e.g. `/domain/`, `/hooks/`, `/components/`,
    `/clients/`); files with no recognizable layer segment classify as `unknown` and are excluded.
- term_id: structural_normalization
  text: a regex pipeline that reduces a source line to its structural shape — comments removed,
    string/number literals replaced with sentinels, non-keyword identifiers replaced with `ID`,
    whitespace collapsed — so renamed or re-valued copies still collide.
- term_id: non_trivial_line
  text: a normalized line that is not empty and not a pure structural token (`{`, `}`, `};`, `);`,
    `]`, `})`, etc.); only non-trivial lines are windowed for the duplication fingerprint.
