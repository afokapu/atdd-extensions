terms:
- term_id: commons_module
  text: a shared frontend module under `web/src/commons/**` imported across features and layers; it
    carries no presentation sub-layer and therefore admits no animation-library import.
- term_id: animation_library
  text: a frontend motion/animation dependency (the web stack's `gsap`, `gsap/*`, `@gsap/*`); forbidden
    in commons by this rule, confined to presentation elsewhere by `coder.presentation.gsap-layer`.
