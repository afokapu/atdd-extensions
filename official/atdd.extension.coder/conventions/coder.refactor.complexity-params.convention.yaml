  implementation_preserved: true
  fix_hint_preserved: true
  reviewed_at: '2026-06-28'
terms:
- term_id: parameter_count
  text: the number of declared parameters in a function signature, excluding the implicit self / cls
    receivers.
- term_id: parameter_threshold
  text: the configured maximum parameter count a function may have (default 6); the obligation is to stay
    below it.
