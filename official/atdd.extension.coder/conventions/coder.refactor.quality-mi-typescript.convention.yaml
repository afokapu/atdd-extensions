terms:
- term_id: approximate_mi
  text: the SEI maintainability-index formula computed for TypeScript with a regex-estimated Halstead
    volume and cyclomatic-complexity proxy (no AST/radon); directionally correct and comparable within a
    codebase, thresholded at 20.
- term_id: regex_halstead_volume
  text: an estimate of Halstead volume from regex operator/operand token counts over comment-stripped
    source, standing in for the AST-based volume the Python rule gets from radon.
