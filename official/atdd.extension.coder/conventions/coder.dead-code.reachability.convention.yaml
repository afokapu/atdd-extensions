terms:
- term_id: graph_root
  text: a file that anchors reachability analysis — a test file, `composition.py`, `wagon.py`,
    `conftest.py`, `__init__.py` shim, or a registered CLI/plugin entry point. All files reachable from a
    root are "alive".
- term_id: reachable_file
  text: a source file that some graph root transitively imports (forward edge) or that is imported by a
    reachable file (reverse edge); the union of forward and reverse BFS from the roots.
- term_id: production_code
  text: shippable `*.py` application code under the scanned source roots, excluding `__pycache__` and
    excluded globs; `__init__.py` shims are scanned for edges but never reported as dead.
