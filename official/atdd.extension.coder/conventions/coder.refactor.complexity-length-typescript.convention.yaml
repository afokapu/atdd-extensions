terms:
- term_id: function_length_ts
  text: the count of lines of code in a TypeScript function body, excluding blank lines and // or /* */
    comment lines.
- term_id: length_threshold
  text: the configured maximum lines of code a TS function may have (default 50, parity with the Python
    rule); the obligation is to stay at or below it.
