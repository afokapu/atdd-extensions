terms:
- term_id: route_handler
  text: a function whose decorator is `@<router_object>.<verb>(...)` for a recognized router object (`app`
    / `router`) and HTTP verb (get/post/put/delete/patch/options/head).
- term_id: auth_dependency
  text: a parameter default of the form `Depends(<auth_fn>)` where `<auth_fn>` is one of the approved auth
    functions (`get_current_user`, `require_auth`, `verify_token`, `get_authenticated_user`).
- term_id: depends_injection
  text: FastAPI's dependency-injection call `Depends(...)`; the rule reads its first positional argument to
    decide whether an approved auth function is wired into the route.
