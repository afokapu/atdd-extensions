terms:
- term_id: ts_comment_ratio
  text: the fraction of a TS/TSX module's non-blank lines that are `//`, `/* */`, or JSDoc `*` comment
    lines; the rule requires >= 0.10 (10%).
- term_id: jsdoc_continuation
  text: a line beginning with `*` inside a `/** ... */` block — counted as a comment line by the TS
    classifier.
