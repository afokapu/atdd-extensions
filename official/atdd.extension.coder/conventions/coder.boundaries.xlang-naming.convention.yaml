terms:
- term_id: architectural_suffix
  text: one of the tracked role suffixes (`Entity`, `Model`, `DTO`, `Service`, `Repository`) stripped from
    a class name to obtain the comparable base.
- term_id: shared_base
  text: a base name (class name minus its architectural suffix) that appears in both the Python and Dart
    suffix buckets; only shared bases can produce a suffix-conflict violation.
- term_id: suffix_conflict
  text: a shared base spelled with one tracked suffix in Python and a different tracked suffix in Dart — the
    flagged drift, reported at a synthetic `naming/<base>` location.
