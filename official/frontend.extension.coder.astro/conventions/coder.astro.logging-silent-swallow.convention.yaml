schema_version: 1.1.0
rule_id: coder.astro.logging-silent-swallow
kind: rule
status: active
name: Astro catch blocks must not silently swallow exceptions
statement: >-
  A `catch` block in Astro frontend source (the `---` frontmatter fence of `*.astro` components and
  their `*.ts`/`*.tsx`/`*.jsx` islands, excluding `_generated/` codegen and test files) MUST observably
  react to the caught error â€” log it, rethrow it, or take an otherwise visible action â€” and MUST NOT
  silently swallow it: an empty `catch (e) {}` (or comment-only handler), or a handler that just
  `return`s a fallback value with no log and no rethrow, is forbidden. In an Astro frontmatter fence
  (which runs at build/SSR time) a swallowed fetch/parse error silently renders an empty page instead of
  surfacing the fault. This is the Astro-stack realization of the agnostic "an exception handler must
  observably react" obligation owned by the coder extension (the python-pytest sibling is
  `coder.logging.coach-silent-swallow`, whose scan_scope explicitly includes the frontend `web/src/`;
  the Convex/backend sibling is `coder.convex.logging-silent-swallow`; the Vite sibling is
  `coder.vite.logging-silent-swallow`). The obligation is stack-bound; the detector â€” a brace-matched
  scan over a string/comment-masked copy of `*.astro`/`*.ts`/`*.tsx`/`*.jsx` â€” is the
  frontend.workspace.runtime implementation referenced below.
terms:
- term_id: silent_swallow
  text: >-
    a `catch` handler that neither logs (a `console`/`logger`/`log`/`logging`/`this.logger` call) nor
    rethrows (`throw`), and is either empty/comment-only OR returns a fallback value. Such a handler
    absorbs the error with no observable trace.
- term_id: observable_reaction
  text: >-
    the prescribed correct behavior â€” the handler logs the error (with context) and then rethrows, or
    logs and returns a documented fallback. Either makes the failure visible; the detector treats a log
    call or a `throw` in the handler body as satisfying the obligation.
- term_id: frontmatter_scope
  text: >-
    the `---...---` fence of an `.astro` file runs as the component script at build/SSR time; a
    swallowed error there silently degrades the rendered output. The detector scans the fence and island
    modules alike (`.astro`/`.ts`/`.tsx`/`.jsx`).
implementation:
  type: validator
  ref: coder.astro.logging-silent-swallow
content:
  summary: >-
    A "no silently-swallowed exceptions in Astro frontend code" obligation, the Astro sibling of
    coder.logging.coach-silent-swallow. The realization is a zero-dependency JS detector that masks
    strings/templates/comments, finds each `catch (...) { â€¦ }` by brace matching, and flags the handler
    when its body has NO log call and NO `throw` AND is either empty or contains a `return`. Scans
    `*.astro` (frontmatter + islands) plus `*.ts`/`*.tsx`/`*.jsx`.
  normative_text: |
    A `catch` that quietly discards the error â€” `catch (e) {}` or `catch (e) { return fallback; }` with
    no logging and no rethrow â€” is the frontend form of the canonical silent-swallow incident. In an
    Astro frontmatter fence it is especially costly: the fence executes during build/SSR, so a swallowed
    fetch or parse error renders an empty or stale page with no signal that anything failed. The
    obligation is "an exception handler observably reacts"; HOW handlers are found and judged is
    delegated to the per-stack detector. For the Astro stack the detector masks
    strings/templates/comments (so a `catch` token or a log call inside a string never counts), locates
    each `catch` block by brace matching, and reports it when the (comment-stripped) body contains no
    `console`/`logger`/`log`/`logging`/`this.logger` call and no `throw`, and is either empty or has a
    `return`. A handler that logs-and-rethrows or logs-and-returns-a-fallback is not flagged.
  fix_hint: |
    Make the handler observably react â€” log with context, then rethrow or return a documented fallback:
      try { return await load(); } catch (e) { return []; }                 // âťŚ silent swallow
      try {
        return await load();
      } catch (e) {
        logger.error("load failed", { error: e });                          // âś… log â€¦
        throw e;                                                            // â€¦ then rethrow
      }
    When a fallback is intended, still log first so the failure is observable. This rule's disposition is
    `suppress-and-clean`: existing swallows are held flat by a downstream ratchet baseline while they are
    cleaned up; the detector always emits the RAW handler list.
  exceptions:
  - A handler that logs (`console`/`logger`/`log`/`logging`/`this.logger` call) or rethrows (`throw`) is
    an observable reaction and is not flagged.
  - A handler that does other work but neither returns a value nor is empty is not flagged (core parity â€”
    the canonical incident is the empty or returning handler).
  - Test code is out of scope â€” `*.test.*` / `*.spec.*` files are excluded (assertion patterns
    legitimately suppress exceptions).
  - Comment lines are masked (a comment-only handler reads as empty); vendored/build dirs (`node_modules`,
    `dist`, `build`, `.next`) and `_generated/` codegen are never scanned.
metadata:
  aliases:
  - ASTRO-SILENT-SWALLOW-001
  - COACH-SILENT-SWALLOW-001
  severity: 4
  disposition: suppress-and-clean
  introduced_in: 0.1.0
