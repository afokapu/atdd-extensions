schema_version: 1.1.0
rule_id: coder.astro.security-xss
kind: rule
status: active
name: Astro frontend must not inject unsanitized HTML into the DOM
statement: >-
  Astro frontend source (`*.astro` components and their `*.ts`/`*.tsx`/`*.jsx` islands, excluding
  `_generated/` codegen and test files) MUST NOT render an unsanitized HTML string through an XSS
  sink — Astro's `set:html={…}` directive, React's `dangerouslySetInnerHTML` prop (in islands), an
  `.innerHTML =` assignment, or an `.outerHTML =` assignment — because each materializes
  attacker-controllable markup as live DOM, the canonical cross-site-scripting vector. Untrusted
  content MUST be rendered as escaped text (`{value}` interpolation / `textContent`) or passed
  through a dedicated sanitizer first. This is the Astro-stack realization of the agnostic "no
  unsanitized HTML injection in frontend code" obligation owned by the coder extension (the
  python-pytest sibling is `coder.security.xss`; the Vite sibling is `coder.vite.security-xss`). The
  obligation is stack-bound; the detector that enforces it — a regex-over-source scan reporting each
  sink site — is the frontend.workspace.runtime implementation referenced below.
terms:
- term_id: set_html_directive
  text: >-
    Astro's `set:html={expr}` template directive, which renders `expr` as raw HTML rather than
    escaped text. It is Astro's idiomatic HTML-injection escape hatch and the primary XSS sink on
    the Astro stack.
- term_id: island_dom_sink
  text: >-
    a DOM/React HTML-injection point reachable from an Astro island (`.ts`/`.tsx`) — React's
    `dangerouslySetInnerHTML` prop, an `.innerHTML =` assignment, or an `.outerHTML =` assignment.
    Each takes an HTML string and materializes it as live DOM.
- term_id: assignment_not_read
  text: >-
    only an *assignment* to `innerHTML`/`outerHTML` is a sink; a *read* (`el.innerHTML.length`) does
    not inject anything and is not flagged. The detector matches those properties followed by a single
    `=` (not `==`/`===`).
- term_id: sanitizer_boundary
  text: >-
    the one place a raw HTML-injection sink is permitted — a dedicated sanitizer module (a file whose
    basename contains `sanitize`) that scrubs markup before insertion. Mirrors the core convention's
    `**/sanitize*.ts(x)` exclusion.
implementation:
  type: validator
  ref: coder.astro.security-xss
content:
  summary: >-
    A "no unsanitized HTML injection in Astro frontend code" obligation, the Astro sibling of
    coder.security.xss. The realization is a zero-dependency JS detector (regex over source, no TS/Astro
    runtime) that flags every `set:html=`, `dangerouslySetInnerHTML`, `.innerHTML =`, and `.outerHTML =`
    site in each scanned `*.astro`/`*.ts`/`*.tsx`/`*.jsx` file, skipping tests, comment lines, sanitizer
    modules, and vendored/build/`_generated` dirs.
  normative_text: |
    Rendering an HTML string with Astro's `set:html`, React's `dangerouslySetInnerHTML`,
    `element.innerHTML =`, or `element.outerHTML =` parses that string as markup. If any part of it
    derives from user input — a scenario body, a URL parameter, a profile field — an attacker can
    inject `<script>` or event handlers that run in the victim's session. That is cross-site
    scripting. The obligation is "frontend code does not inject unsanitized HTML"; HOW the sinks are
    recognized is delegated to the per-stack detector. For the Astro stack the detector matches the
    `set:html=` directive plus the three shared island sinks (`dangerouslySetInnerHTML`, an
    `innerHTML =`/`outerHTML =` assignment — a `==`/`===` comparison or a plain read is not matched),
    scanning non-test `*.astro`/`*.ts`/`*.tsx`/`*.jsx` files. The correct form renders untrusted
    content as escaped text (`{value}`) or routes it through a sanitizer first.
  fix_hint: |
    Render untrusted content as text, or sanitize before injecting:
      <div set:html={userHtml} />        // ❌ XSS sink
      <div>{userText}</div>              // ✅ Astro escapes interpolated text
      el.innerHTML = userHtml;           // ❌ XSS sink
      el.textContent = userText;         // ✅ no markup parsed
    When rich HTML is genuinely required, pass it through a vetted sanitizer (e.g. DOMPurify /
    `sanitize-html`) in a dedicated `sanitize*.ts` module — that module is the sole place the sink is
    allowed. This rule's disposition is `strict`: a new sink is not suppressible by default.
  exceptions:
  - Sanitizer modules (basename contains `sanitize`) legitimately wrap the sink and are out of scope —
    mirrors the core `**/sanitize*.ts(x)` exclusion.
  - A *read* of `innerHTML`/`outerHTML` (no `=` assignment) is not a sink and is not flagged.
  - Test code is out of scope — `*.test.*` / `*.spec.*` files are excluded.
  - Comment lines (single-line `//` and block `/* */`) are skipped; vendored/build dirs (`node_modules`,
    `dist`, `build`, `.next`) and `_generated/` codegen are never scanned.
metadata:
  aliases:
  - ASTRO-SECURITY-XSS-001
  - SECURITY-XSS-001
  severity: 4
  disposition: strict
  introduced_in: 0.1.0
