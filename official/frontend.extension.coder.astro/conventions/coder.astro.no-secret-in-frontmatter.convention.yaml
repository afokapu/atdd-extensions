schema_version: 1.1.0
rule_id: coder.astro.no-secret-in-frontmatter
kind: rule
status: active
name: Astro frontmatter must not contain secret-shaped literals
statement: The `---` frontmatter fence of any `.astro` component (the component script that runs at build/SSR
  time and ships in source) MUST NOT contain a secret-shaped string literal — an API key, access token,
  password, or client secret. Credentials MUST be read from `import.meta.env.*` so the value lives in
  the environment, not in the repository. This is the Astro-stack realization of the agnostic "no hardcoded
  credential in source" obligation (the Vite/React sibling is `coder.vite.token-hardcoded` for design
  tokens; the secret arm here is stack-native to Astro's frontmatter-fence model).
terms:
- term_id: frontmatter_fence
  text: the leading block of an `.astro` file delimited by a `---` line at the top of the file and the
    next `---` line. Astro runs it as the component script at build/SSR time; this rule scans only this
    block.
- term_id: secret_shaped_literal
  text: a quoted string that either carries a known credential prefix (`sk_`, `pk_live`/`pk_test`, `AKIA…`,
    `ghp_`, `xox*`, `AIza…`) or is assigned to a secret-named binding (`*secret*`/`*token*`/`*apiKey*`/`*password*`/`*accessKey*`/`*clientSecret*`),
    as opposed to a value read from `import.meta.env.*`.
implementation:
  type: validator
  ref: coder.astro.no-secret-in-frontmatter
content:
  summary: A "no secret-shaped literal in the .astro frontmatter fence" obligation. The realization is
    a zero-dependency JS detector that isolates the `---...---` fence at the top of each `.astro` file
    and flags (a) any string literal carrying a known credential prefix (`sk_`, `pk_live`/`pk_test`, `AKIA…`,
    `ghp_`, `xox*`, `AIza…`) and (b) any binding whose name reads as a secret (`*secret*`, `*token*`,
    `*apiKey*`, `*password*`, `*accessKey*`, `*clientSecret*`) assigned a bare quoted string instead of
    `import.meta.env.*`.
  normative_text: 'An `.astro` frontmatter fence is the component script: it executes during the build/SSR

    pass and its text is committed to the repository. A credential inlined there is a

    hardcoded secret with all the usual consequences — it is leaked to anyone with repo read

    access, it cannot be rotated without a code change, and it is trivially harvested from

    git history. The obligation is "no credential literal survives in the fence"; HOW the

    literals are recognized is delegated to the per-stack detector. For Astro the detector

    parses only the leading `---...---` block (markup and `<script>`/`<style>` bodies are out

    of scope for THIS rule) and reports each offending line. The approved form is

    `const x = import.meta.env.SOME_KEY;` — an environment read, never a quoted literal.

    '
  fix_hint: "Move the secret out of source and read it from the environment:\n  * replace `const apiKey\
    \ = \"sk_…\"` with `const apiKey = import.meta.env.API_KEY;`\n  * define the value in a `.env` file\
    \ (and your deploy provider's env settings), which\n    Astro exposes through `import.meta.env`;\n\
    \  * prefix with `PUBLIC_` only when the value is genuinely safe to ship to the client —\n    true\
    \ secrets must stay server-side and never reach the browser bundle.\nDisposition is `strict` (severity\
    \ 4): there is no inline-suppression marker. Rotate any\ncredential that was ever committed; removing\
    \ the line does not un-leak history.\n"
  exceptions:
  - Markup, `<script>` blocks, and `<style>` blocks are out of scope for THIS rule — only the leading
    `---...---` frontmatter fence is inspected.
  - '`import.meta.env.*` reads are the approved form and are never flagged.'
  - Use placeholder values in fixtures WITHOUT a real provider sub-format (e.g. `sk_REDACTED_PLACEHOLDER_VALUE`)
    — real key formats trip platform push-protection.
  - Vendored/build dirs (`node_modules`, `dist`, `build`, `.next`, `_generated`) are skipped.
metadata:
  aliases:
  - ASTRO-NO-SECRET-001
  severity: 4
  disposition: strict
  introduced_in: 0.1.0
