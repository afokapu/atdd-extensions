schema_version: "1.0.0"

# First-class workspace PROVIDER: a reusable, domain-agnostic runtime that many
# extensions target. Namespaced id (scope segment is `workspace`):
#   <publisher>.workspace.<name>
# SKELETON — mirrors atdd.workspace.python-pytest exactly. The adapter bodies are
# NotImplementedError stubs; real FastAPI/HTTP-REST discovery+run is authored in
# the build slice. Kept distinct from python-pytest (FastAPI ≠ pytest; see DESIGN
# §5 Open Decision 3). Owns ZERO conventions (those live in atdd.extension.coder/tester).
workspace_id: atdd.workspace.fastapi
kind: workspace
version: "0.1.0"

# Discovery + run CONTRACT this provider implements. Implementations declare the
# contract they satisfy (`contract_version`); the resolver checks SemVer
# compatibility against this value, refusing on mismatch.
contract_version: "1.0.0"

# Typed CAPABILITIES this workspace provides (#1138). fastapi provides exactly one
# capability: an execution command-runner (pytest over a FastAPI TestClient app).
# No domain semantics here.
capabilities:
  - capability_id: execution.fastapi
    domain: execution
    type: test-runner
    contract: atdd.workspace.capability.execution.command-runner.v1
    runtime:
      language: python
      runner: pytest
      package_manager: pip
      command: pytest

# Shared runtime files materialized into each workspace INSTANCE at resolve time.
# Authored in the build slice (e.g. pyproject.toml with fastapi + httpx deps).
shared_runtime:
  files: []

# How this provider finds the executable units an extension ships, and the
# provider-contract range those implementations must satisfy.
discovers:
  implementations:
    - "**/atdd.implementation.yaml"
  requires_contract: "^1.0.0"

# A new runtime proves it satisfies the SAME contract by passing this suite.
conformance:
  suite: conformance/

# Conventions are owned by the extensions that depend on this runtime, never here.
governed_by_conventions: []
