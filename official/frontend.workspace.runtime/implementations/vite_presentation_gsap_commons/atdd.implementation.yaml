schema_version: "1.1.0"
kind: implementation
implementation_id: coder.vite.presentation-gsap-commons
targets_workspace: frontend.workspace.runtime
contract_version: "1.1.0"

# Back-reference to the agnostic obligation this detector realizes. The convention
# node is authored in frontend.extension.vite-coder; this implementation is the
# frontend-workspace (Vite/React) realization of it (two-layer model).
realizes_convention: coder.vite.presentation-gsap-commons

# Single rule_id (disposition strict). The detector emits RAW violations; the
# strict verdict is a downstream consumer concern.
emits_rule_ids:
  - coder.vite.presentation-gsap-commons   # disposition: strict

# The detector module. It scans ATDD_SCAN_ROOTS for Vite/React source and writes
# the RAW {rule_id,file,line,col,evidence,source_line} report to
# ATDD_VIOLATIONS_REPORT (v1.1 channel). No disposition.
entrypoint: detect.mjs

# The runnable v1.1 report-emitting unit the provider command executes (run with
# `node`). Declared (not hardcoded) so the provider CLI runs THIS detector.
report: detect.mjs
