schema_version: "1.1.0"
kind: implementation
implementation_id: coder.astro.no-hardcoded-color
targets_workspace: frontend.workspace.runtime
contract_version: "1.1.0"

realizes_convention: coder.astro.no-hardcoded-color

# Single rule_id (disposition strict, severity 2). RAW emit only.
emits_rule_ids:
  - coder.astro.no-hardcoded-color   # disposition: strict

# Scans `.astro` (style blocks, inline style attrs, Tailwind arbitrary values) and
# `styles/*.css` for hardcoded hex / rgb()/hsl() color literals used as values, while
# allowing the literal on a CSS custom-property (token) DEFINITION line.
entrypoint: detect.mjs
report: detect.mjs
