schema_version: "1.1.0"
kind: implementation
implementation_id: coder.astro.no-secret-in-frontmatter
targets_workspace: frontend.workspace.runtime
contract_version: "1.1.0"

# Back-reference to the agnostic obligation this detector realizes. The convention
# node is authored in frontend.extension.astro-coder; this implementation is the
# frontend-workspace realization of it (two-layer model).
realizes_convention: coder.astro.no-secret-in-frontmatter

# Single rule_id (disposition strict, severity 4). The detector emits RAW
# violations; the strict verdict is a downstream consumer concern.
emits_rule_ids:
  - coder.astro.no-secret-in-frontmatter   # disposition: strict

# The detector module. Scans ATDD_SCAN_ROOTS for `.astro` files, inspects only the
# `---` frontmatter fence, and writes the RAW v1.1 report to ATDD_VIOLATIONS_REPORT.
entrypoint: detect.mjs

# The runnable v1.1 report-emitting unit the provider command executes (declared,
# not hardcoded, so the provider CLI runs THIS detector).
report: detect.mjs
