schema_version: 1.1.0
rule_id: tester.convex.filename-urn
kind: rule
status: active
name: Convex/Vitest test files are named deterministically from their acceptance URN
statement: >-
  A Vitest test file under the Convex function tree (a `*.test.ts`/`*.spec.ts` file beneath a
  `convex/` scan root, excluding `_generated/` codegen) MUST be named deterministically from its
  acceptance URN so the file is both traceable to its acceptance and collectable by Vitest. Two
  renderings are accepted: the URN-named form
  `{wmbt_lower}-{harness_lower}-{nnn}[-{slug-kebab}].test.ts` (e.g.
  `e001-unit-001-evaluate-cell.test.ts`), or a colocated `{layer}.test.ts` (`domain.test.ts`,
  `api.test.ts`, ...). This is the Convex/Vitest realization of the agnostic tester FILENAME
  obligation owned by the tester extension (the test-IDENTITY-comes-from-the-URN-header invariant
  stays in CORE; what stays here is the per-stack FILENAME rendering of that URN). The realizing
  detector — a basename scan over `convex/**` test files that flags any basename matching neither
  rendering — is the convex.workspace.runtime implementation referenced below; the obligation is
  stack-bound, the detector is TypeScript/Vitest-specific. It is the Convex sibling of the official
  python-pytest `tester.filename.urn` (python renders `test_*.py`; convex renders `*.test.ts`).
implementation:
  type: validator
  ref: tester.convex.filename-urn
content:
  summary: >-
    A "Convex test files follow the URN-derived naming pattern" obligation, the Vitest sibling of
    the official `tester.filename.urn`. The realization is a zero-dependency JS detector that scans
    each `*.test.ts`/`*.spec.ts` under the supplied Convex scan roots and flags any basename that is
    neither the URN-named rendering `{wmbt_lower}-{harness_lower}-{nnn}[-{slug-kebab}].test.ts` nor
    a colocated `{layer}.test.ts` for a known architectural layer. A mis-named test file is a silent
    green gap — if the runner never collects it, it "passes" CI by never running.
  normative_text: |
    Convex test filenames are derived from the acceptance URN
    `acc:{wagon}:{WMBT}-{HARNESS}-{NNN}[-{slug}]` so that acceptance criteria and their test
    implementations map bidirectionally and Vitest can discover tests deterministically. The
    IDENTITY of a test comes from its explicit `// URN: test:...` header (a CORE invariant, owned
    elsewhere); the FILENAME is the per-language rendering of that URN.

    For the Convex/Vitest stack the rendering is
    `{wmbt_lower}-{harness_lower}-{nnn}[-{slug-kebab}].test.ts` — all lowercase, hyphen-separated,
    kebab-case slug — e.g. `acc:score-grid:E001-UNIT-001-evaluate-cell` ->
    `e001-unit-001-evaluate-cell.test.ts`. As an equivalent colocation form, a single test file
    placed next to its layer source may take the layer name directly: `{layer}.test.ts` (e.g.
    `domain.test.ts`, `api.test.ts`) where `{layer}` is one of `domain`, `application`,
    `presentation`, `integration`, `composition`, `assembly`, `api`. WHICH per-language pattern
    applies, and HOW the URN is transformed into the filename, is delegated to the per-stack
    detector. dart/go/java/kotlin and the python-pytest rendering are owned by their own workspace
    packages, NOT by this Convex detector.
  fix_hint: |
    Rename the flagged file to a URN-derivable name, e.g.
    `acc:score-grid:E001-UNIT-001-evaluate-cell` -> `e001-unit-001-evaluate-cell.test.ts`, or — for
    a single colocated test next to its layer source — to `{layer}.test.ts` (e.g. `domain.test.ts`).
    A Convex test file MUST end in `.test.ts` and its basename MUST be all-lowercase kebab-case;
    camelCase or otherwise ad-hoc names (e.g. `myTest.test.ts`) break the URN<->filename mapping and
    are untraceable to any acceptance criterion. This rule is `documentation-only`: the detector
    emits the RAW mis-named-test list as an advisory signal (no inline-suppression marker, no hard
    fail); whether it blocks is the downstream consumer's disposition decision, never the
    detector's.
  exceptions:
    - Non-test files (any file that is not `*.test.ts` / `*.spec.ts`) are out of scope — helpers,
      fixtures, schema, and Convex function modules are not flagged.
    - Generated code under `convex/_generated/` is never scanned (codegen, never edited).
    - Vendored/build dirs (`node_modules`, `dist`, `build`, `.next`) are skipped during traversal.
    - Tests outside the `convex/` server tree (e.g. React/Vite component tests under `src/`) are
      governed by a separate frontend tester rendering, not this Convex one.
metadata:
  aliases:
    - TESTER-CONVEX-FILENAME-URN-001
  severity: 2
  disposition: documentation-only
  introduced_in: 0.1.0
terms:
  - term_id: test_urn_header
    text: >-
      the explicit `// URN: test:{wagon}:{feature}:{WMBT}-{HARNESS}-{NNN}-{slug}` comment that
      carries a test file's authoritative identity; its presence marks a `*.test.ts` as an intended
      test. The IDENTITY invariant is a CORE concern — this rule governs only the FILENAME rendering.
  - term_id: vitest_collectable_name
    text: >-
      a basename Vitest collects and that is derivable from the acceptance URN — either the
      URN-named `{wmbt_lower}-{harness_lower}-{nnn}[-{slug-kebab}].test.ts` rendering or a colocated
      `{layer}.test.ts`; an intended test that is neither is a silent green gap.
  - term_id: convex_test_layer
    text: >-
      one of the architectural layers a colocated single test file may be named after —
      `domain`, `application`, `presentation`, `integration`, `composition`, `assembly`, `api`.
