schema_version: 1.1.0
rule_id: tester.convex.journey-train-header
kind: rule
status: active
name: Convex journey tests declare a valid Train header
statement: >-
  A Convex/Vitest journey test — a `*.test.ts`/`*.spec.ts` file whose header carries a
  `test:train:` URN or a `Train:` marker — MUST include a `// Train:` header line referencing a
  valid train URN matching `train:\d{4}-[a-z0-9][a-z0-9-]*` (e.g. `// Train: train:3001-solo-match-complete`).
  A journey test with a missing or malformed `Train:` header is untraceable to the train plan it
  exercises. This is the Convex/Vitest realization of the agnostic journey-test header obligation
  (`required_header`: "Train: header MUST reference a valid train URN") in
  `tester/conventions/train.convention.yaml`, whose convention ships an explicit TypeScript
  rendering. The detector is the convex.workspace.runtime implementation referenced below.
implementation:
  type: validator
  ref: convex_journey_test_detector
content:
  summary: >-
    A "journey tests carry a valid Train: header" obligation, the Convex/Vitest sibling of the
    core journey-test header contract. The realization is a zero-dependency JS detector that,
    for any test file identifiable as a journey test (a `test:train:` URN or a `Train:` marker in
    its header), flags a missing or pattern-invalid `Train:` line.
  normative_text: |
    Journey (E2E/assembly) tests validate a whole train workflow, so each one must name the train
    it drives. The `// Train:` header carries that binding and MUST match
    `train:{NNNN}-{kebab-case}` (four-digit train number, kebab slug). A journey test with no
    `Train:` line, or one whose value is not a valid train URN, cannot be linked back to a train
    plan and silently drifts from the orchestration it claims to cover. WHICH files are journey
    tests is decided by the presence of a `test:train:` URN or a `Train:` marker; validating the
    `Train:` line is delegated to the per-stack detector.
  fix_hint: |
    Add (or correct) the header line so it references a valid train URN, e.g.:
      `// Train: train:3001-solo-match-complete`
    The value MUST match `train:\d{4}-[a-z0-9][a-z0-9-]*`. This rule's disposition is
    `documentation-only`: the detector emits the RAW missing/invalid-header list; whether it
    blocks is the downstream consumer's decision.
  exceptions:
    - Non-test files, and test files that are not journey tests (no `test:train:` URN and no
      `Train:` marker — i.e. acceptance/unit tests) are out of scope.
    - Generated code under `convex/_generated/` is never scanned.
    - Vendored/build dirs (`node_modules`, `dist`, `build`, `.next`) are skipped during traversal.
metadata:
  aliases:
    - TESTER-CONVEX-JOURNEY-TRAIN-HEADER-001
  severity: 2
  disposition: documentation-only
  introduced_in: 0.1.0
terms:
  - term_id: journey_test
    text: >-
      a Vitest test file whose header carries a `test:train:` URN or a `// Train:` marker — an
      assembly-layer test that drives an end-to-end train workflow (as opposed to an acceptance or
      unit test).
  - term_id: train_urn
    text: >-
      the reference `train:{NNNN}-{kebab-case}` (e.g. `train:3001-solo-match-complete`) that a
      journey test's `Train:` header MUST carry to bind the test to its train plan.
