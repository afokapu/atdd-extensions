schema_version: 1.1.0
rule_id: tester.convex.journey-urn-format
kind: rule
status: active
name: Convex journey test URNs follow the test:train pattern
statement: >-
  A Convex/Vitest journey test's `// URN:` header MUST match the journey-test URN pattern
  `test:train:{train_id}:{HARNESS}-{NNN}-{slug}` — where `{train_id}` is `\d{4}-[a-z0-9][a-z0-9-]*`,
  `{HARNESS}` is an uppercase harness code (e.g. `E2E`), `{NNN}` is a three-digit index, and
  `{slug}` is kebab-case (e.g. `test:train:3001-solo-match-complete:E2E-001-match-lifecycle`). A
  journey test whose URN does not match this shape is not deterministically traceable to its train.
  This is the Convex/Vitest realization of the agnostic `urn_format.pattern`
  (`test:train:{train_id}:{HARNESS}-{NNN}-{slug}`) in `tester/conventions/train.convention.yaml`.
  The detector is the convex.workspace.runtime implementation referenced below.
implementation:
  type: validator
  ref: convex_journey_test_detector
content:
  summary: >-
    A "journey-test URN matches test:train:{train_id}:{HARNESS}-{NNN}-{slug}" obligation, the
    Convex/Vitest sibling of the core journey URN format. The realization is a zero-dependency JS
    detector that, for any journey test, flags a `URN:` header not matching the pattern.
  normative_text: |
    A journey test URN links a test to a train plan deterministically:
    `test:train:{train_id}:{HARNESS}-{NNN}-{slug}`. Each component is constrained — a four-digit
    train number with a kebab train slug, an uppercase harness code, a zero-padded three-digit
    index, and a kebab test slug. A URN missing a component (e.g. a non-padded index, a lowercase
    harness, or a train_id without its number) breaks the URN<->plan mapping. The gate for "is this
    a journey test" is the presence of a `test:train:` URN or a `Train:` marker; validating the URN
    SHAPE is delegated to the per-stack detector.
  fix_hint: |
    Rewrite the URN to the canonical shape, e.g.:
      `// URN: test:train:3001-solo-match-complete:E2E-001-match-lifecycle`
    train_id MUST be `\d{4}-{kebab}`, HARNESS uppercase, index three digits, slug kebab-case.
    Disposition is `documentation-only`: the detector emits the RAW malformed-URN list.
  exceptions:
    - Non-journey tests (no `test:train:` URN and no `Train:` marker) are out of scope.
    - Generated code under `convex/_generated/` is never scanned.
    - Vendored/build dirs (`node_modules`, `dist`, `build`, `.next`) are skipped during traversal.
metadata:
  aliases:
    - TESTER-CONVEX-JOURNEY-URN-FORMAT-001
  severity: 2
  disposition: documentation-only
  introduced_in: 0.1.0
terms:
  - term_id: journey_urn
    text: >-
      the `test:train:{train_id}:{HARNESS}-{NNN}-{slug}` identifier in a journey test's `// URN:`
      header that binds the test to a specific train and enumerates it within that train's suite.
