schema_version: 1.1.0
rule_id: tester.convex.journey-layer-assembly
kind: rule
status: active
name: Convex journey tests declare Layer assembly
statement: >-
  A Convex/Vitest journey test's `// Layer:` header, when present, MUST be `assembly`. Journey
  tests validate an end-to-end train workflow across wagons and therefore live at the assembly
  layer; a journey test declaring any other layer (`domain`, `application`, `integration`, …) is
  mis-classified. This is the Convex/Vitest realization of the agnostic journey-test header rule
  "Layer MUST be 'assembly' for journey tests" in `tester/conventions/train.convention.yaml`. The
  detector is the convex.workspace.runtime implementation referenced below.
implementation:
  type: validator
  ref: convex_journey_test_detector
content:
  summary: >-
    A "journey tests are Layer: assembly" obligation, the Convex/Vitest sibling of the core
    journey layer rule. The realization is a zero-dependency JS detector that, for any journey
    test, flags a `Layer:` header whose value is not `assembly`.
  normative_text: |
    The assembly layer is where whole trains are exercised — the composition root plus every wagon
    it orchestrates. A journey test declaring `Layer: domain` (or any non-assembly layer) is
    claiming a scope it does not have and will be mis-bucketed by layer-aware tooling and coverage.
    The gate for "is this a journey test" is a `test:train:` URN or a `Train:` marker; validating
    the `Layer:` value is delegated to the per-stack detector.
  fix_hint: |
    Set the header to `// Layer: assembly`. If the test truly is not assembly-scoped, it is not a
    journey test — remove its `Train:`/`test:train:` markers and classify it as the acceptance or
    unit test it actually is. Disposition is `documentation-only`: the detector emits the RAW
    non-assembly-layer list.
  exceptions:
    - Non-journey tests (no `test:train:` URN and no `Train:` marker) are out of scope.
    - A journey test with no `Layer:` header at all is handled by the header-completeness rule, not
      this value check.
    - Generated/vendored/build dirs are skipped during traversal.
metadata:
  aliases:
    - TESTER-CONVEX-JOURNEY-LAYER-ASSEMBLY-001
  severity: 2
  disposition: documentation-only
  introduced_in: 0.1.0
terms:
  - term_id: assembly_layer
    text: >-
      the architectural layer at which whole trains are driven end-to-end (composition root + all
      orchestrated wagons); the only valid `Layer:` for a journey test.
