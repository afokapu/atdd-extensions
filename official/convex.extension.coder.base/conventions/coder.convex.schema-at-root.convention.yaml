schema_version: 1.1.0
rule_id: coder.convex.schema-at-root
kind: rule
status: active
name: A Convex app must define convex/schema.ts at the convex root
statement: Every Convex app MUST have a `schema.ts` file directly under its `convex/` function root (the
  scan root). Convex auto-loads `convex/schema.ts` to define the database schema; it does not recurse
  into subdirectories for it. An app whose convex root has no `schema.ts` ships without a declared schema,
  so Convex falls back to an implicit, unvalidated table shape. The detector that enforces it — a per-root
  existence check for `schema.ts` directly under each scan root — is the convex.workspace.runtime implementation
  referenced below; the obligation is stack-bound, the detector is Convex-specific.
implementation:
  type: validator
  ref: convex_layout_structure_detector
content:
  summary: A "convex root must declare a schema" obligation. The realization is a zero-dependency JS detector
    (a file-existence check, no TS runtime) that emits one violation per scan root when `schema.ts` is
    not present directly under that root.
  normative_text: 'Convex auto-loads the module at `convex/schema.ts` to define the application''s

    database schema (tables, fields, validators, indexes). The file must sit DIRECTLY

    under the convex function root — Convex does not search subdirectories for it. The

    obligation is "a schema.ts exists at the convex root"; HOW the root is located is

    delegated to the per-stack detector. For Convex the detector treats each supplied

    scan root as a convex root and asserts a regular `schema.ts` file directly under it,

    emitting one RAW violation (pointed at the expected `convex/schema.ts` path) when it

    is absent.

    '
  fix_hint: "Add a `convex/schema.ts` at the convex root that calls `defineSchema(...)`:\n  * import {\
    \ defineSchema, defineTable } from \"convex/server\";\n  * export default defineSchema({ /* your tables\
    \ */ });\nA schema living in a subdirectory does not satisfy Convex — it must be the\ntop-level `convex/schema.ts`.\
    \ This rule's disposition is `strict`: there is no\ninline-suppression marker. The detector always\
    \ emits the RAW result; any baseline\nratchet over pre-existing state is a downstream consumer/coach\
    \ concern.\n"
  exceptions:
  - A scan root that does not exist on disk is skipped (a missing root is not a fault), not reported as
    a violation.
  - The check is structural (a single missing-file violation per root); it does not inspect the schema's
    contents — an empty or trivial `defineSchema({})` satisfies it.
  - Generated code under `convex/_generated/` is never the schema source; only a top-level `schema.ts`
    counts.
metadata:
  aliases:
  - CONVEX-RT-001
  severity: 4
  disposition: strict
  introduced_in: 0.1.0
terms:
- term_id: convex_root
  text: the `convex/` function directory Convex auto-discovers and runs on its backend, supplied to the
    detector as a scan root. The unit this rule checks for a top-level `schema.ts`.
- term_id: schema_module
  text: the `convex/schema.ts` module Convex auto-loads to define the database schema via `defineSchema(...)`.
    Must sit directly under the convex root (no recursion).
