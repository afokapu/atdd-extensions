schema_version: 1.1.0
rule_id: coder.convex.complexity-nesting
kind: rule
status: active
name: Convex server functions must keep control-block nesting depth at or below 4
statement: Every Convex server function (a function declaration or block-bodied arrow in a `*.ts`/`*.tsx`/`*.js`/`*.mjs`
  module under the `convex/` function tree, excluding `_generated/` codegen and test files) MUST keep
  its maximum control-block nesting depth at or below the threshold (default 4) so that deeply nested
  control flow does not make a function hard to read and test. This is the Convex-stack realization of
  the language-neutral `coder.refactor.complexity-nesting` obligation owned by the Core coder extension
  (TypeScript sibling `coder.refactor.complexity-nesting-typescript`, threshold 4). The detector that
  enforces it — a zero-dependency regex brace-tracking scan (no AST/tree-sitter) — is the atdd.workspace.convex
  implementation referenced below; the obligation is stack-bound, the detector is JS-specific.
terms:
- term_id: nesting_depth_convex
  text: the maximum control-block brace depth in a Convex server function, counting only braces opened
    by a control-flow keyword.
- term_id: control_keyword
  text: a keyword that opens a counted nested block — if / else / for / while / do / switch / try / catch
    / finally; braces not preceded by one (object literals, arrow/function bodies) are ignored.
- term_id: nesting_threshold
  text: the configured maximum nesting depth a Convex function may have (default 4, parity with Core's
    TypeScript rule); the obligation is to stay at or below it.
implementation:
  type: validator
  ref: convex_complexity_detector
content:
  summary: A "no deeply nested Convex server function" obligation, the Convex sibling of coder.refactor.complexity-nesting-typescript.
    The realization is a zero-dependency Node ESM detector (regex + brace tracking over source, no TS
    runtime) that measures the deepest brace level opened by a control-flow keyword (if / else / for /
    while / do / switch / try / catch / finally) within each function body, flagging any function nested
    deeper than 4.
  normative_text: 'Deep nesting (nested if / for / switch / try blocks) makes Convex server code hard
    to read and

    test; the obligation mirrors Core''s (default threshold <= 4 levels). HOW depth is measured is

    delegated to the per-stack detector; for the Convex/TS stack it masks strings/comments, then

    walks the function body tracking brace depth and counts a level only when the opening brace is

    preceded by a control-flow keyword (`if` / `else` / `for` / `while` / `do` / `switch` / `try` /

    `catch` / `finally`), so object literals and arrow/function bodies do not inflate the count. This

    realization needs no TypeScript runtime; it runs under the atdd.workspace.convex provider (`node`

    over the detector `.mjs`). The detector emits one RAW violation per offending function, located

    at the function''s header line.

    '
  fix_hint: "Flatten the flagged Convex function:\n  * use guard clauses / early returns to remove an\
    \ outer level,\n  * extract a deeply nested block into its own helper function,\n  * invert conditions\
    \ to reduce the deepest branch.\nThis rule's disposition is `strict`: a function over the nesting\
    \ threshold is not suppressible\nand fails. Pre-existing depth in a consumer repo is held flat by\
    \ a downstream ratchet baseline (a\nconsumer/coach concern), not the workspace detector — the detector\
    \ always emits the RAW\nover-threshold function list.\n"
  exceptions:
  - Non-control braces (object literals, arrow/function bodies) do not count toward the nesting depth.
  - Test files (`*.test.*` / `*.spec.*`) and generated code under `convex/_generated/` are out of scope.
  - Vendored/build dirs (`node_modules`, `dist`, `build`, `.next`) are skipped during traversal.
  - The threshold (default 4) is configurable; the obligation is "at or below the configured threshold".
metadata:
  aliases:
  - CONVEX-COMPLEXITY-NESTING-001
  severity: 3
  disposition: strict
  introduced_in: 0.1.0
