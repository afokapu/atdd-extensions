schema_version: 1.1.0
rule_id: coder.interlocking.runner-infrastructure
kind: rule
status: active
name: InterlockingRunner route-control layer exists and is wired Station Master -> TrainRunner
statement: >-
  When a consumer interlocking declares guarded routes, the consumer runtime MUST ship an
  `InterlockingRunner` route-control layer that (a) exists with a `resolve_train(...)` entry point and
  a structured resolution model (not a bare `train_id` string), (b) is reachable from the Station
  Master entrypoint, which routes both direct `train_id` mappings and interlocking route objects, and
  (c) ultimately delegates linear train execution to `TrainRunner`. The InterlockingRunner is a pure
  route-control component: it MUST NOT execute wagons directly, duplicate the TrainRunner step loop,
  bypass TrainRunner, mutate Cargo, or store artifact data — and wagons MUST NOT import interlocking
  code. This is the agnostic obligation owned by the train-interlocking-enforcement coder surface; the
  python-pytest AST detector that enforces it is the implementation referenced below — the obligation
  is agnostic, the detector is not.
implementation:
  type: validator
  ref: coder.interlocking.runner-infrastructure
content:
  summary: >-
    An agnostic "interlocking runtime infrastructure exists and is wired correctly" obligation. The
    python realization parses the consumer's `python/trains/**/*.py` runtime + `python/app.py` Station
    Master with `ast` and flags: a missing `InterlockingRunner` class (when interlocking routes are
    declared); a missing `resolve_train` method; the absence of a structured `InterlockingResolution`
    model carrying the route metadata fields; a Station Master whose `JOURNEY_MAP` declares an
    interlocking route object but never references `InterlockingRunner` (unlinked) or never references
    `TrainRunner` (no delegation); an InterlockingRunner module that imports a wagon module, calls
    `run_train(...)`, or loops over `train.sequence` (direct wagon execution); an InterlockingRunner
    module that references/mutates `Cargo` or stores `artifact_urn` values (cargo bleed); and any wagon
    module that imports interlocking code. A pure direct-train consumer (no interlocking routes, no
    InterlockingRunner) is NOT flagged — the rule only bites interlocking-enabled consumers.
  normative_text: |
    Core runtime spec afokapu/atdd#1251 (Part of #1246) locks the interlocking call model:

        Station Master -> InterlockingRunner.resolve_train(action, inputs, state)
                       -> TrainRunner.execute(selected_train_id, ...)

    An interlocking is executable ONLY as a route-control component. It evaluates guarded route
    conditions, resolves exactly one admissible train_id (failing closed on no/multiple match),
    validates the selected route, then DELEGATES execution to the production TrainRunner. It must not
    execute wagon steps, mutate Cargo, choose the next train step inside a train, bypass TrainRunner,
    or duplicate TrainRunner's execution loop. Cargo remains the artifact data plane INSIDE a selected
    train (carried by TrainRunner between wagons); the InterlockingRunner only reads the initial
    action/inputs/state before execution and a completed TrainResult at a declared route boundary.
    Wagons must not import interlocking code.

    The resolution model is structured metadata, not a bare train_id string. The expected fields
    (suggested `InterlockingResolution` dataclass, #1251): interlocking_id, route_id, train_id,
    train_path, category, category_digit, guard_id, reason.

    WHICH runtime/Station-Master files are inspected and HOW the wiring is recognized is delegated to
    the per-stack detector; for python it is an `ast` walk over the scope's `python_runtime` +
    `station_master` selectors.
  fix_hint: |
    Ship the route-control layer and wire it (core afokapu/atdd#1251):

      # python/trains/interlocking.py
      @dataclass(frozen=True)
      class InterlockingResolution:
          interlocking_id: str; route_id: str; train_id: str; train_path: str
          category: str; category_digit: str; guard_id: str; reason: str

      class InterlockingRunner:
          def resolve_train(self, action, inputs, state=None) -> InterlockingResolution: ...
          def execute(self, action, inputs, state=None, ...):
              res = self.resolve_train(action, inputs, state)
              return TrainRunner(res.train_path).execute(res.train_id, ...)   # delegate

      # python/app.py — Station Master routes direct AND interlocking, then delegates to TrainRunner.

    Do NOT: import a wagon module from interlocking code, call run_train(...) there, loop over
    train.sequence as an executor, mutate Cargo / store artifact_urn values, or import InterlockingRunner
    from a wagon. This rule is `strict`: a newly introduced violation is not suppressible and fails CI.
  exceptions:
    - A pure direct-train consumer (no interlocking route object in JOURNEY_MAP and no InterlockingRunner
      class) is not flagged — it carries no interlocking obligation.
    - The production `TrainRunner` module is the legitimate wagon-step executor; its run_train loop is
      NOT flagged (only the InterlockingRunner-defining modules are scanned for direct execution).
metadata:
  aliases:
    - INTERLOCKING-RUNTIME-INFRA-001
    - SPEC-CODER-INTERLOCKING-0001
  severity: 4
  disposition: strict
  introduced_in: 0.1.0
  core_design_refs:
    - afokapu/atdd#1246
    - afokapu/atdd#1251
terms:
  - term_id: interlocking_runner
    text: >-
      the route-control component (`class InterlockingRunner` with `resolve_train(...)`) that selects
      exactly one admissible train and delegates its execution to TrainRunner; it never executes wagons.
  - term_id: interlocking_resolution_model
    text: >-
      the structured result of `resolve_train` (`InterlockingResolution`) carrying interlocking_id,
      route_id, train_id, train_path, category, category_digit, guard_id, reason — not a bare train_id.
  - term_id: station_master
    text: >-
      the entrypoint (`python/app.py`) whose JOURNEY_MAP routes both direct train_id strings and
      interlocking route objects, referencing InterlockingRunner and ultimately calling TrainRunner.
  - term_id: cargo_boundary
    text: >-
      the rule that Cargo (artifact data plane) stays inside TrainRunner execution; the InterlockingRunner
      must not reference, mutate, or store Cargo / artifact_urn values, and wagons must not import it.
