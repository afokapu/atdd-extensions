schema_version: 1.1.0
rule_id: coder.train.train-runner.definition
kind: family
status: active
name: TrainRunner — runtime executor of a resolved train (advisory semantic anchor)
statement: >-
  TrainRunner is the production runtime component that runs a train's wagons and carries Cargo between
  them; it is the only wagon-step executor, and it runs — via `TrainRunner.execute(selected_train_id,
  ...)` — the single admissible train that an `InterlockingRunner` resolves and delegates to. This node
  is an advisory semantic anchor — it enforces nothing directly; the enforceable parts of this meaning
  are decomposed into the constraint/rule nodes that require it.
content:
  summary: >-
    An advisory definition of the runtime (coder-layer) TrainRunner concept — the executor a planner
    `train` compiles to. It fixes the meaning that the enforcing interlocking rules operationalize:
    TrainRunner is the single component that runs wagons and carries Cargo between them, and the sole
    delegation target of the route-control layer.
  note: >-
    Advisory anchor: it ships no validator. Within this extension it connects (relationships.yaml,
    `type: relates-to`) to the enforcing rules that assert TrainRunner's role —
    coder.train.interlocking-delegates-to-trainrunner ("TrainRunner remains the only wagon-step
    executor"; delegation via `TrainRunner.execute(selected_train_id, ...)`) and
    coder.train.interlocking-does-not-carry-cargo ("Cargo is the artifact data plane carried by
    TrainRunner between wagons inside a selected train"). Dedicated TrainRunner existence / step-order
    enforcers live in the core repo (afokapu/atdd); per boundary spec §6.2 that core<->extension
    relationship is declared narratively here, never as a relationship-graph edge.
metadata:
  aliases:
    - TRAIN-RUNNER-DEFINITION
  introduced_in: 0.1.0
  core_design_refs:
    - afokapu/atdd#1246
    - afokapu/atdd#1251
terms:
  - term_id: train_runner
    text: >-
      the production runtime component that runs a selected train's wagons and carries Cargo between
      them; the only wagon-step executor and the delegation target an InterlockingRunner resolves to.
