  - agent-session
  - command-feed
  - orchestration
  - transport
  - workspace-provider
  - official

description: >-
  Official ATDD cmux + Claude workspace provider (reusable runtime): orchestrates
  agent sessions (spawn/deliver/signal a Claude worker in a cmux pane) and transports
  commands/events over a durable, ordered command-feed. Owns no execution runner and
  no isolation boundary. Carries the core two-way decision channel
  (atdd.coach.decision_channel) on its command-feed + agent-session capabilities.
