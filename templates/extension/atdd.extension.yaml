schema_version: "1.0.0"

extension_id: publisher-name.extension.example-extension
version: "0.1.0"
kind: extension

role: coder
flow_wagon: validate-source-surface
feature: example-feature

owns:
  conventions: []
  relationships: []
  implementations: []
  schemas: []
  gates: []
  scopes: []

depends_on:
  core:
    - atdd.core.convention-node-schema
    - atdd.core.relationship-schema
    - atdd.core.workspace-schema
    - atdd.core.implementation-schema
    - atdd.core.violation-output-schema
  # The reusable runtime(s) this extension's implementations target. Referenced
  # by id + contract range; never copied into the extension. The resolver checks
  # the range against the provider's contract_version.
  workspaces:
    - id: atdd.workspace.python-pytest
      contract: "^1.0.0"

removal_policy:
  allowed_if_no_external_dependents: true
