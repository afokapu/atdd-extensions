<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1140 360" font-family="-apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif">
  <rect width="1140" height="360" fill="#ffffff"/>

  <!-- row zebra -->
  <rect x="14" y="120" width="1112" height="44" fill="#f8fafc"/>
  <rect x="14" y="232" width="1112" height="44" fill="#f8fafc"/>

  <!-- column headers -->
  <rect x="180" y="14" width="228" height="40" rx="6" fill="#dbeafe"/>
  <rect x="414" y="14" width="228" height="40" rx="6" fill="#dcfce7"/>
  <rect x="648" y="14" width="228" height="40" rx="6" fill="#fef3c7"/>
  <rect x="882" y="14" width="244" height="40" rx="6" fill="#ede9fe"/>
  <text x="294" y="39" font-size="14" font-weight="700" fill="#1e40af" text-anchor="middle">Extension</text>
  <text x="528" y="39" font-size="14" font-weight="700" fill="#15803d" text-anchor="middle">Workspace Provider</text>
  <text x="762" y="39" font-size="14" font-weight="700" fill="#92400e" text-anchor="middle">Workspace Instance</text>
  <text x="1004" y="39" font-size="14" font-weight="700" fill="#6d28d9" text-anchor="middle">Implementation</text>

  <g font-size="12.5">
    <!-- Is a -->
    <text x="26" y="86" font-weight="700" fill="#334155">Is a…</text>
    <text x="294" y="86" fill="#1e3a5f" text-anchor="middle">use-case package</text>
    <text x="528" y="86" fill="#14532d" text-anchor="middle">reusable runtime</text>
    <text x="762" y="86" fill="#7c4a03" text-anchor="middle">resolved execution env</text>
    <text x="1004" y="86" fill="#4c1d95" text-anchor="middle">executable code unit</text>

    <!-- Answers -->
    <text x="26" y="148" font-weight="700" fill="#334155">Answers</text>
    <text x="294" y="148" fill="#1e3a5f" text-anchor="middle">what use case + rules?</text>
    <text x="528" y="148" fill="#14532d" text-anchor="middle">how can code run?</text>
    <text x="762" y="148" fill="#7c4a03" text-anchor="middle">where does it run now?</text>
    <text x="1004" y="148" fill="#4c1d95" text-anchor="middle">what enforces the rule?</text>

    <!-- Owns -->
    <text x="26" y="196" font-weight="700" fill="#334155">Owns</text>
    <text x="294" y="190" fill="#1e3a5f" text-anchor="middle">conventions, scopes,</text>
    <text x="294" y="208" fill="#1e3a5f" text-anchor="middle">gates, rule_ids</text>
    <text x="528" y="190" fill="#14532d" text-anchor="middle">language, runner,</text>
    <text x="528" y="208" fill="#14532d" text-anchor="middle">command, contract</text>
    <text x="762" y="190" fill="#7c4a03" text-anchor="middle">resolved files, cache,</text>
    <text x="762" y="208" fill="#7c4a03" text-anchor="middle">run state</text>
    <text x="1004" y="190" fill="#4c1d95" text-anchor="middle">src, tests, fixtures,</text>
    <text x="1004" y="208" fill="#4c1d95" text-anchor="middle">emitted rule_ids</text>

    <!-- Domain-specific -->
    <text x="26" y="260" font-weight="700" fill="#334155">Domain-specific?</text>
    <text x="294" y="260" font-weight="700" fill="#1e40af" text-anchor="middle">yes</text>
    <text x="528" y="260" font-weight="700" fill="#15803d" text-anchor="middle">no</text>
    <text x="762" y="260" font-weight="700" fill="#b45309" text-anchor="middle">no</text>
    <text x="1004" y="260" font-weight="700" fill="#6d28d9" text-anchor="middle">usually yes</text>

    <!-- Example -->
    <text x="26" y="308" font-weight="700" fill="#334155">Example</text>
    <text x="294" y="308" font-family="monospace" font-size="11" fill="#1e40af" text-anchor="middle">component-header-validator</text>
    <text x="528" y="308" font-family="monospace" font-size="11.5" fill="#15803d" text-anchor="middle">python-pytest</text>
    <text x="762" y="308" font-family="monospace" font-size="10.5" fill="#92400e" text-anchor="middle">…/python-pytest/1.0.0</text>
    <text x="1004" y="308" font-family="monospace" font-size="11" fill="#6d28d9" text-anchor="middle">component-header</text>
  </g>

  <!-- authored/generated strip -->
  <rect x="180" y="324" width="462" height="28" rx="7" fill="#eef2ff" stroke="#c7d2fe" stroke-width="1"/>
  <text x="411" y="343" font-size="12" font-weight="700" fill="#3730a3" text-anchor="middle">authored &amp; versioned · committed</text>
  <rect x="648" y="324" width="228" height="28" rx="7" fill="#fffbeb" stroke="#fde68a" stroke-width="1"/>
  <text x="762" y="343" font-size="12" font-weight="700" fill="#92400e" text-anchor="middle">generated · not committed</text>
  <rect x="882" y="324" width="244" height="28" rx="7" fill="#f5f3ff" stroke="#ddd6fe" stroke-width="1"/>
  <text x="1004" y="343" font-size="12" font-weight="700" fill="#6d28d9" text-anchor="middle">authored · runs in instance</text>
</svg>
