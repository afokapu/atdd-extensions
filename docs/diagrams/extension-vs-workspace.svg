<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 348" font-family="-apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif">
  <rect width="1000" height="348" fill="#ffffff"/>

  <!-- row backgrounds -->
  <rect x="14" y="58"  width="972" height="40" fill="#f8fafc"/>
  <rect x="14" y="138" width="972" height="40" fill="#f8fafc"/>
  <rect x="14" y="218" width="972" height="40" fill="#f8fafc"/>
  <rect x="14" y="298" width="972" height="40" fill="#f8fafc"/>

  <!-- header -->
  <rect x="334" y="14" width="324" height="44" rx="6" fill="#dbeafe"/>
  <rect x="662" y="14" width="324" height="44" rx="6" fill="#dcfce7"/>
  <text x="496" y="42" font-size="16" font-weight="700" fill="#1e40af" text-anchor="middle">Extension</text>
  <text x="824" y="42" font-size="16" font-weight="700" fill="#15803d" text-anchor="middle">Workspace</text>

  <!-- rows: label | extension | workspace -->
  <g font-size="14">
    <text x="26" y="84"  font-weight="600" fill="#334155">Is a…</text>
    <text x="350" y="84" fill="#1e3a5f">use-case package</text>
    <text x="678" y="84" fill="#14532d">runtime environment</text>

    <text x="26" y="124" font-weight="600" fill="#334155">Answers</text>
    <text x="350" y="124" fill="#1e3a5f">what + what rules</text>
    <text x="678" y="124" fill="#14532d">how / where it runs</text>

    <text x="26" y="164" font-weight="600" fill="#334155">Manifest</text>
    <text x="350" y="164" font-family="monospace" font-size="13" fill="#1e40af">atdd.extension.yaml</text>
    <text x="678" y="164" font-family="monospace" font-size="13" fill="#15803d">atdd.workspace.yaml</text>

    <text x="26" y="204" font-weight="600" fill="#334155">Installed / removed as a unit?</text>
    <text x="350" y="204" font-weight="700" fill="#1e40af">yes — it's the boundary</text>
    <text x="678" y="204" fill="#14532d">no — lives inside an extension</text>

    <text x="26" y="244" font-weight="600" fill="#334155">Domain-specific?</text>
    <text x="350" y="244" fill="#1e3a5f">yes (backend / frontend / …)</text>
    <text x="678" y="244" font-weight="700" fill="#15803d">no — reusable across domains</text>

    <text x="26" y="284" font-weight="600" fill="#334155">Cardinality</text>
    <text x="350" y="284" fill="#1e3a5f">contains 1..N workspaces</text>
    <text x="678" y="284" fill="#14532d">contains 1..N implementations</text>

    <text x="26" y="324" font-weight="600" fill="#334155">Example</text>
    <text x="350" y="324" font-family="monospace" font-size="13" fill="#1e40af">component-header-validator</text>
    <text x="678" y="324" font-family="monospace" font-size="13" fill="#15803d">python-pytest</text>
  </g>
</svg>
