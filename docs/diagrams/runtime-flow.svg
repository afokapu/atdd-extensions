<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 286" font-family="-apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif">
  <rect width="1120" height="286" fill="#ffffff"/>

  <!-- 1 Extension installed -->
  <rect x="14" y="24" width="156" height="132" rx="12" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <circle cx="40" cy="50" r="13" fill="#2563eb"/><text x="40" y="55" font-size="14" font-weight="700" fill="#fff" text-anchor="middle">1</text>
  <text x="92" y="98" font-size="13.5" font-weight="600" fill="#1e3a5f" text-anchor="middle">Extension</text>
  <text x="92" y="116" font-size="13.5" font-weight="600" fill="#1e3a5f" text-anchor="middle">installed</text>

  <!-- 2 Provider resolved -->
  <rect x="196" y="24" width="156" height="132" rx="12" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
  <circle cx="222" cy="50" r="13" fill="#16a34a"/><text x="222" y="55" font-size="14" font-weight="700" fill="#fff" text-anchor="middle">2</text>
  <text x="274" y="90" font-size="13.5" font-weight="600" fill="#14532d" text-anchor="middle">Provider</text>
  <text x="274" y="108" font-size="13.5" font-weight="600" fill="#14532d" text-anchor="middle">resolved</text>
  <text x="274" y="130" font-size="10" font-family="monospace" fill="#15803d" text-anchor="middle">python-pytest@1.0.0</text>

  <!-- 3 Instance materialized -->
  <rect x="378" y="24" width="156" height="132" rx="12" fill="#fffbeb" stroke="#f59e0b" stroke-width="2"/>
  <circle cx="404" cy="50" r="13" fill="#f59e0b"/><text x="404" y="55" font-size="14" font-weight="700" fill="#fff" text-anchor="middle">3</text>
  <text x="456" y="90" font-size="13.5" font-weight="600" fill="#7c4a03" text-anchor="middle">Instance</text>
  <text x="456" y="108" font-size="13.5" font-weight="600" fill="#7c4a03" text-anchor="middle">materialized</text>
  <text x="456" y="130" font-size="10" font-family="monospace" fill="#92400e" text-anchor="middle">.atdd/resolved-…</text>

  <!-- 4 Discover + run -->
  <rect x="560" y="24" width="156" height="132" rx="12" fill="#fffbeb" stroke="#f59e0b" stroke-width="2"/>
  <circle cx="586" cy="50" r="13" fill="#f59e0b"/><text x="586" y="55" font-size="14" font-weight="700" fill="#fff" text-anchor="middle">4</text>
  <text x="638" y="90" font-size="13.5" font-weight="600" fill="#7c4a03" text-anchor="middle">Implementations</text>
  <text x="638" y="108" font-size="13.5" font-weight="600" fill="#7c4a03" text-anchor="middle">discovered &amp;</text>
  <text x="638" y="126" font-size="13.5" font-weight="600" fill="#7c4a03" text-anchor="middle">run (pytest)</text>

  <!-- 5 Violation emitted -->
  <rect x="742" y="24" width="156" height="132" rx="12" fill="#faf5ff" stroke="#7c3aed" stroke-width="2"/>
  <circle cx="768" cy="50" r="13" fill="#7c3aed"/><text x="768" y="55" font-size="14" font-weight="700" fill="#fff" text-anchor="middle">5</text>
  <text x="820" y="90" font-size="13" font-weight="600" fill="#4c1d95" text-anchor="middle">Implementation</text>
  <text x="820" y="108" font-size="13" font-weight="600" fill="#4c1d95" text-anchor="middle">emits Violation</text>
  <text x="820" y="128" font-size="12.5" font-weight="700" fill="#6d28d9" text-anchor="middle">(rule_id=…)</text>

  <!-- 6 Back to convention -->
  <rect x="924" y="24" width="182" height="132" rx="12" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <circle cx="950" cy="50" r="13" fill="#2563eb"/><text x="950" y="55" font-size="14" font-weight="700" fill="#fff" text-anchor="middle">6</text>
  <text x="1015" y="90" font-size="12.5" font-weight="600" fill="#1e3a5f" text-anchor="middle">Violation points</text>
  <text x="1015" y="108" font-size="12.5" font-weight="600" fill="#1e3a5f" text-anchor="middle">back to the extension's</text>
  <text x="1015" y="126" font-size="12.5" font-weight="600" fill="#1e3a5f" text-anchor="middle">convention / rule</text>

  <!-- arrows -->
  <g fill="#94a3b8">
    <path d="M174 90 l16 0 l0 -5 l10 5 l-10 5 l0 -5 z"/>
    <path d="M356 90 l16 0 l0 -5 l10 5 l-10 5 l0 -5 z"/>
    <path d="M538 90 l16 0 l0 -5 l10 5 l-10 5 l0 -5 z"/>
    <path d="M720 90 l16 0 l0 -5 l10 5 l-10 5 l0 -5 z"/>
    <path d="M902 90 l16 0 l0 -5 l10 5 l-10 5 l0 -5 z"/>
  </g>

  <!-- closed-loop banner -->
  <rect x="14" y="190" width="1092" height="42" rx="10" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="560" y="216" font-size="15" font-weight="700" text-anchor="middle"><tspan fill="#1e40af">Declarative (Extension)</tspan><tspan fill="#334155"> + </tspan><tspan fill="#15803d">Runtime (Provider)</tspan><tspan fill="#334155"> + </tspan><tspan fill="#b45309">Execution (Instance)</tspan><tspan fill="#334155"> + </tspan><tspan fill="#6d28d9">Code (Implementation)</tspan><tspan fill="#334155"> = Closed loop</tspan></text>
  <text x="560" y="258" font-size="13" fill="#64748b" text-anchor="middle">Conventions declare the rules · implementations enforce them · the provider runtime, materialized as an instance, executes them.</text>
</svg>
