<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 588" font-family="-apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif">
  <rect width="940" height="588" fill="#ffffff"/>

  <!-- EXTENSION -->
  <rect x="40" y="20" width="600" height="116" rx="14" fill="#eff6ff" stroke="#2563eb" stroke-width="2.5"/>
  <text x="64" y="54" font-size="22" font-weight="700" fill="#1e40af">EXTENSION</text>
  <rect x="252" y="34" width="132" height="24" rx="12" fill="#2563eb"/>
  <text x="318" y="51" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">WHAT you ship</text>
  <g font-size="14" fill="#1e3a5f">
    <text x="66" y="84">• use-case package — install / version / remove as a unit</text>
    <text x="66" y="108">• owns conventions, scopes, gates, relationships, implementations</text>
  </g>

  <!-- targets -->
  <text x="340" y="158" font-size="13" font-weight="700" fill="#2563eb" text-anchor="middle">targets — by id + contract range</text>
  <text x="340" y="150" font-size="18" fill="#64748b" text-anchor="middle">&#8595;</text>

  <!-- WORKSPACE PROVIDER -->
  <rect x="40" y="168" width="600" height="116" rx="14" fill="#f0fdf4" stroke="#16a34a" stroke-width="2.5"/>
  <text x="64" y="202" font-size="22" font-weight="700" fill="#15803d">WORKSPACE PROVIDER</text>
  <rect x="372" y="182" width="160" height="24" rx="12" fill="#16a34a"/>
  <text x="452" y="199" font-size="11.5" font-weight="700" fill="#fff" text-anchor="middle">HOW it runs (shared)</text>
  <g font-size="14" fill="#14532d">
    <text x="66" y="232">• reusable, domain-agnostic runtime — one serves many extensions</text>
    <text x="66" y="256">• language + runner + command + discovery/run contract_version</text>
  </g>

  <!-- materialized as -->
  <text x="340" y="306" font-size="13" font-weight="700" fill="#b45309" text-anchor="middle">materialized as (at resolve time)</text>
  <text x="340" y="298" font-size="18" fill="#64748b" text-anchor="middle">&#8595;</text>

  <!-- WORKSPACE INSTANCE -->
  <rect x="40" y="316" width="600" height="116" rx="14" fill="#fffbeb" stroke="#f59e0b" stroke-width="2.5"/>
  <text x="64" y="350" font-size="22" font-weight="700" fill="#92400e">WORKSPACE INSTANCE</text>
  <rect x="372" y="330" width="150" height="24" rx="12" fill="#f59e0b"/>
  <text x="447" y="347" font-size="11.5" font-weight="700" fill="#fff" text-anchor="middle">WHERE it runs now</text>
  <g font-size="14" fill="#7c4a03">
    <text x="66" y="380">• provider resolved locally under .atdd/resolved-workspaces/&lt;id&gt;/&lt;ver&gt;/</text>
    <text x="66" y="404">• generated · cacheable · reproducible from lock · never committed</text>
  </g>

  <!-- runs -->
  <text x="340" y="454" font-size="13" font-weight="700" fill="#6d28d9" text-anchor="middle">runs</text>
  <text x="340" y="446" font-size="18" fill="#64748b" text-anchor="middle">&#8595;</text>

  <!-- IMPLEMENTATION -->
  <rect x="40" y="464" width="600" height="104" rx="14" fill="#faf5ff" stroke="#7c3aed" stroke-width="2.5"/>
  <text x="64" y="498" font-size="22" font-weight="700" fill="#6d28d9">IMPLEMENTATION</text>
  <rect x="318" y="478" width="170" height="24" rx="12" fill="#7c3aed"/>
  <text x="403" y="495" font-size="11.5" font-weight="700" fill="#fff" text-anchor="middle">the executable unit</text>
  <g font-size="14" fill="#4c1d95">
    <text x="66" y="528">• validator code (subtype) — src / tests / fixtures</text>
    <text x="66" y="550">• enforces a rule and emits rule_id → points back to the convention</text>
  </g>

  <!-- authored vs generated rail -->
  <rect x="676" y="20" width="224" height="548" rx="14" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="788" y="52" font-size="15" font-weight="700" fill="#334155" text-anchor="middle">Authored vs generated</text>

  <rect x="700" y="76" width="176" height="150" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
  <text x="712" y="100" font-size="12" font-weight="700" fill="#475569">AUTHORED &amp; versioned</text>
  <text x="712" y="126" font-size="14" font-weight="700" fill="#1e40af">extension</text>
  <text x="712" y="150" font-size="14" font-weight="700" fill="#15803d">workspace provider</text>
  <text x="712" y="174" font-size="14" font-weight="700" fill="#6d28d9">implementation</text>
  <text x="712" y="204" font-size="11.5" fill="#64748b">committed to git</text>

  <rect x="700" y="244" width="176" height="104" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
  <text x="712" y="268" font-size="12" font-weight="700" fill="#475569">GENERATED</text>
  <text x="712" y="294" font-size="14" font-weight="700" fill="#92400e">workspace instance</text>
  <text x="712" y="320" font-size="11.5" fill="#64748b">resolved at run time</text>
  <text x="712" y="338" font-size="11.5" fill="#64748b">never committed</text>

  <rect x="700" y="366" width="176" height="184" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
  <text x="712" y="390" font-size="12" font-weight="700" fill="#475569">CONTRACT</text>
  <text x="712" y="414" font-size="12.5" fill="#334155">provider declares</text>
  <text x="712" y="432" font-size="12.5" font-weight="700" fill="#15803d">contract_version</text>
  <text x="712" y="458" font-size="12.5" fill="#334155">extension + impl</text>
  <text x="712" y="476" font-size="12.5" fill="#334155">declare the range</text>
  <text x="712" y="500" font-size="12.5" fill="#334155">resolver checks</text>
  <text x="712" y="518" font-size="12.5" fill="#334155">SemVer, refuses</text>
  <text x="712" y="536" font-size="12.5" fill="#334155">on mismatch</text>
</svg>
