<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 540" font-family="-apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif">
  <rect width="920" height="540" fill="#ffffff"/>

  <!-- EXTENSION (outer, blue) -->
  <rect x="24" y="24" width="600" height="492" rx="16" fill="#eff6ff" stroke="#2563eb" stroke-width="2.5"/>
  <text x="52" y="66" font-size="24" font-weight="700" fill="#1e40af">EXTENSION</text>
  <rect x="210" y="48" width="132" height="24" rx="12" fill="#2563eb"/>
  <text x="276" y="65" font-size="12" font-weight="700" fill="#ffffff" text-anchor="middle">WHAT you ship</text>
  <g font-size="14.5" fill="#1e3a5f">
    <text x="54" y="96">• use-case package</text>
    <text x="54" y="120">• install / version / remove as a unit</text>
    <text x="54" y="144">• owns conventions, scopes, gates, relationships</text>
    <text x="54" y="168">• contains 1..N workspaces</text>
  </g>

  <!-- WORKSPACE (middle, green) -->
  <rect x="52" y="188" width="544" height="328" rx="14" fill="#f0fdf4" stroke="#16a34a" stroke-width="2.5"/>
  <text x="80" y="226" font-size="21" font-weight="700" fill="#15803d">WORKSPACE</text>
  <rect x="232" y="210" width="172" height="22" rx="11" fill="#16a34a"/>
  <text x="318" y="226" font-size="11.5" font-weight="700" fill="#ffffff" text-anchor="middle">HOW / WHERE it runs</text>
  <g font-size="14" fill="#14532d">
    <text x="82" y="254">• runtime environment</text>
    <text x="82" y="277">• language + runner + package manager + command</text>
    <text x="82" y="300">• discovers implementations</text>
    <text x="82" y="323">• contains 1..N implementations</text>
  </g>

  <!-- IMPLEMENTATION (inner, purple) -->
  <rect x="80" y="346" width="488" height="156" rx="12" fill="#faf5ff" stroke="#7c3aed" stroke-width="2.5"/>
  <text x="108" y="382" font-size="18" font-weight="700" fill="#6d28d9">IMPLEMENTATION</text>
  <rect x="300" y="368" width="156" height="22" rx="11" fill="#7c3aed"/>
  <text x="378" y="384" font-size="11" font-weight="700" fill="#ffffff" text-anchor="middle">Actual validator code</text>
  <g font-size="13.5" fill="#4c1d95">
    <text x="110" y="412">• enforces a rule</text>
    <text x="110" y="434">• emits rule_id</text>
    <text x="110" y="456">• contains src / tests / fixtures</text>
  </g>

  <!-- Right: three layers stack -->
  <rect x="664" y="120" width="232" height="300" rx="14" fill="#fffbeb" stroke="#f59e0b" stroke-width="2"/>
  <text x="780" y="160" font-size="16" font-weight="700" fill="#92400e" text-anchor="middle">Three layers</text>
  <text x="780" y="214" font-size="20" font-weight="700" fill="#1e40af" text-anchor="middle">extension</text>
  <text x="780" y="246" font-size="20" fill="#64748b" text-anchor="middle">&#8595;</text>
  <text x="780" y="284" font-size="20" font-weight="700" fill="#15803d" text-anchor="middle">workspace</text>
  <text x="780" y="316" font-size="20" fill="#64748b" text-anchor="middle">&#8595;</text>
  <text x="780" y="356" font-size="20" font-weight="700" fill="#6d28d9" text-anchor="middle">implementation</text>
</svg>
