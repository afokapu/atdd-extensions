<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1142 340" font-family="-apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif">
  <rect width="1142" height="340" fill="#ffffff"/>

  <!-- EXTENSION -->
  <rect x="14" y="14" width="268" height="312" rx="14" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <circle cx="44" cy="46" r="15" fill="#2563eb"/><text x="44" y="51" font-size="15" font-weight="700" fill="#fff" text-anchor="middle">E</text>
  <text x="70" y="51" font-size="17" font-weight="700" fill="#1e40af">Extension</text>
  <g font-size="12.5" fill="#1e3a5f">
    <text x="30" y="84">✓ the use-case package /</text>
    <text x="42" y="101">ownership boundary</text>
    <text x="30" y="125">✓ install · version · remove</text>
    <text x="42" y="142">as one unit</text>
    <text x="30" y="166">✓ owns rule + implementation</text>
    <text x="30" y="190">✓ targets a workspace provider</text>
  </g>
  <text x="30" y="232" font-size="12" fill="#475569">Manifest:</text>
  <rect x="96" y="219" width="170" height="20" rx="6" fill="#dbeafe"/>
  <text x="181" y="233" font-size="11" font-family="monospace" fill="#1e40af" text-anchor="middle">atdd.extension.yaml</text>
  <text x="30" y="276" font-size="12" fill="#475569">Like an npm package or a</text>
  <text x="30" y="294" font-size="12" fill="#475569">VS Code extension.</text>

  <!-- WORKSPACE PROVIDER -->
  <rect x="296" y="14" width="268" height="312" rx="14" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
  <circle cx="326" cy="46" r="15" fill="#16a34a"/><text x="326" y="51" font-size="14" font-weight="700" fill="#fff" text-anchor="middle">P</text>
  <text x="352" y="51" font-size="17" font-weight="700" fill="#15803d">Workspace Provider</text>
  <g font-size="12.5" fill="#14532d">
    <text x="312" y="84">✓ reusable, domain-agnostic</text>
    <text x="324" y="101">runtime</text>
    <text x="312" y="125">✓ language + runner + command</text>
    <text x="312" y="149">✓ shared by many extensions</text>
    <text x="312" y="173">✓ declares contract_version;</text>
    <text x="324" y="190">versioned independently</text>
  </g>
  <text x="312" y="232" font-size="12" fill="#475569">Manifest:</text>
  <rect x="378" y="219" width="176" height="20" rx="6" fill="#dcfce7"/>
  <text x="466" y="233" font-size="11" font-family="monospace" fill="#15803d" text-anchor="middle">atdd.workspace.yaml</text>
  <text x="312" y="276" font-size="12" fill="#475569">Like a Docker image or a</text>
  <text x="312" y="294" font-size="12" fill="#475569">devcontainer definition.</text>

  <!-- WORKSPACE INSTANCE -->
  <rect x="578" y="14" width="268" height="312" rx="14" fill="#fffbeb" stroke="#f59e0b" stroke-width="2"/>
  <circle cx="608" cy="46" r="15" fill="#f59e0b"/><text x="608" y="51" font-size="14" font-weight="700" fill="#fff" text-anchor="middle">I</text>
  <text x="634" y="51" font-size="17" font-weight="700" fill="#92400e">Workspace Instance</text>
  <g font-size="12.5" fill="#7c4a03">
    <text x="594" y="84">✓ the provider resolved &amp;</text>
    <text x="606" y="101">materialized locally</text>
    <text x="594" y="125">✓ where implementations run</text>
    <text x="594" y="149">✓ cacheable · reproducible</text>
    <text x="594" y="173">✓ generated — never committed</text>
  </g>
  <text x="594" y="232" font-size="12" fill="#475569">Path:</text>
  <rect x="636" y="219" width="200" height="20" rx="6" fill="#fef3c7"/>
  <text x="736" y="233" font-size="9.5" font-family="monospace" fill="#92400e" text-anchor="middle">.atdd/resolved-workspaces/</text>
  <text x="594" y="276" font-size="12" fill="#475569">Like a running container or</text>
  <text x="594" y="294" font-size="12" fill="#475569">an installed node_modules.</text>

  <!-- IMPLEMENTATION -->
  <rect x="860" y="14" width="268" height="312" rx="14" fill="#faf5ff" stroke="#7c3aed" stroke-width="2"/>
  <circle cx="890" cy="46" r="15" fill="#7c3aed"/><text x="890" y="51" font-size="13" font-weight="700" fill="#fff" text-anchor="middle">V</text>
  <text x="916" y="51" font-size="17" font-weight="700" fill="#6d28d9">Implementation</text>
  <g font-size="12.5" fill="#4c1d95">
    <text x="876" y="84">✓ the executable unit</text>
    <text x="876" y="108">✓ subtype today: validator</text>
    <text x="876" y="132">✓ enforces a convention,</text>
    <text x="888" y="149">emits rule_ids / violations</text>
    <text x="876" y="173">✓ contains src · tests · fixtures</text>
  </g>
  <text x="876" y="232" font-size="12" fill="#475569">Manifest:</text>
  <rect x="958" y="219" width="166" height="20" rx="6" fill="#f3e8ff"/>
  <text x="1041" y="233" font-size="9.5" font-family="monospace" fill="#6d28d9" text-anchor="middle">atdd.implementation.yaml</text>
  <text x="876" y="276" font-size="12" fill="#475569">Like a single rule's checker</text>
  <text x="876" y="294" font-size="12" fill="#475569">library or plugin.</text>
</svg>
