# Wave 1 cluster C3 — obligation-node graph edges (fragment for the overseer).
#
# The overseer merges these into atdd.extension.coder/relationships.yaml. These
# are EXTENSION-LOCAL edges only (boundary spec §6.2): no core<->extension edges
# are authored here — the core coder rules these nodes realize are referenced
# narratively in each node body / source: block, never as graph edges.
#
# Cluster C3 added 7 obligation nodes (4 validators):
#   coder.presentation.gsap-layer        coder.presentation.gsap-commons
#   coder.presentation.i18n-config       coder.presentation.i18n-switcher
#   coder.refactor.composition-consumer  coder.refactor.composition-root
#   coder.refactor.coach-ratchet-pres
# Every new node participates in at least one edge below.
#
# Edge schema: source_ref / target_ref / type / reason.
#   - refines    : source is a narrower / companion specialization of target.
#   - relates-to : sibling obligations realized by one detector or one spec area.

edges:
  - source_ref: coder.presentation.gsap-commons
    target_ref: coder.presentation.gsap-layer
    type: refines
    reason: >-
      gsap-commons is the commons-specific companion of the general layer-purity
      rule: where gsap-layer confines animation imports to a feature's
      presentation/ layer, gsap-commons forbids them outright under web/src/commons
      (which has no presentation sub-layer). Same detector (one emits_rule_ids run),
      same animation-library tokens; commons is the stricter special case.

  - source_ref: coder.presentation.i18n-switcher
    target_ref: coder.presentation.i18n-config
    type: relates-to
    reason: >-
      Both realize the same Localization Manifest obligation — supported locales
      have a single source of truth — on two surfaces: i18n-config governs the
      runtime config file, i18n-switcher governs the language-switcher component.
      One detector emits both rule_ids; the switcher reads the list the config
      exposes from the manifest.

  - source_ref: coder.refactor.composition-root
    target_ref: coder.refactor.composition-consumer
    type: relates-to
    reason: >-
      The two halves of intra-feature composition completeness, emitted by one
      detector: composition-consumer requires every layer file to have a valid
      upstream consumer; composition-root requires the feature composition.py to
      reach every existing layer. Together they assert the vertical slice is fully
      wired from both the leaf and the root.

  - source_ref: coder.refactor.coach-ratchet-pres
    target_ref: coder.refactor.composition-root
    type: relates-to
    reason: >-
      Both are REFACTOR-phase coder obligations that protect feature structure:
      composition-root guards that the composition root still wires every layer,
      while coach-ratchet-pres guards that mechanical ratchet trimming of the
      presentation layer does not silently remove behavior without smoke evidence.
      They co-govern the integrity of a feature during the REFACTOR phase.
