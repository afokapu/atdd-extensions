- coder.boundaries.xlang-naming
- coder.boundaries.xlang-contract

edges:
# ── security_patterns_detector: 3 co-emitted, co-equal pattern families ───────
- source_ref: coder.security.missing-auth
  target_ref: coder.security.sql-injection
  type: complements
  reason: 'Co-emitted by one security-patterns detector run: both are co-equal known-bad pattern families
    the AST scan flags in the same pass — sql-injection governs that dynamic SQL never reaches a database
    sink, missing-auth governs that every route carries an auth dependency. Neither narrows the other; they
    are co-equal facets of one security obligation, both strict.'
- source_ref: coder.security.hardcoded-secret
  target_ref: coder.security.sql-injection
  type: complements
  reason: 'Co-emitted by the same security-patterns detector run: hardcoded-secret is the regex leg
    (secret-shaped literals in source) alongside the AST legs (sql-injection, missing-auth). All three are
    co-equal strict security obligations surfaced from one scan; hardcoded-secret complements the SQL/auth
    AST checks rather than refining either.'

# ── cross_language_consistency_detector: 4 co-emitted consistency dimensions ──
- source_ref: coder.boundaries.xlang-enum
  target_ref: coder.boundaries.xlang-entity
  type: relates-to
  reason: 'Co-emitted by one cross-language-consistency detector run: xlang-entity asserts a contract
    entity is implemented across stacks, xlang-enum asserts a shared enum carries identical members across
    stacks. Both guard Python<->Dart agreement on the domain model from different angles (class presence vs
    enum membership); they relate as facets of one consistency obligation.'
- source_ref: coder.boundaries.xlang-naming
  target_ref: coder.boundaries.xlang-entity
  type: relates-to
  reason: 'Co-emitted by the same cross-language-consistency run: xlang-naming asserts a shared concept
    uses the same architectural suffix across stacks, complementing xlang-entity''s presence check — one
    guards that the entity exists everywhere, the other that it is named consistently everywhere. Two
    angles on cross-stack domain-model agreement.'
- source_ref: coder.boundaries.xlang-contract
  target_ref: coder.boundaries.xlang-entity
  type: relates-to
  reason: 'Two halves of contract coverage emitted by one run: xlang-contract fires when a contract entity
    is implemented in NO stack, xlang-entity fires when it is implemented in SOME but not ALL stacks. They
    partition the cross-language coverage gap — contract is the empty-set case, entity the partial case —
    and so directly relate.'
