# Wave 2 cluster C4 — obligation-node graph edges (fragment for the overseer).
#
# The overseer merges these into atdd.extension.coder/relationships.yaml. These
# are EXTENSION-LOCAL edges only (boundary spec §6.2): no core<->extension edges
# are authored here — the core coder rules these nodes realize are referenced
# narratively in each node body / source: block, never as graph edges.
#
# Cluster C4 added 7 obligation nodes from ONE multi-rule validator
# (test_design_system_compliance.py, which bound all seven via bind_rule). They
# are all emitted by ONE detector (implementation coder.design.primitives,
# emits_rule_ids), all disposition `strict`:
#   coder.design.primitives        coder.design.token-color
#   coder.design.orphan-export      coder.design.foundations
#   coder.design.hierarchy-import   coder.design.token-hardcoded
#   coder.design.orphan-ui
# Every new node participates in at least one edge below (NO-ORPHAN gate).
#
# Edge schema: source_ref / target_ref / type / reason.
#   - refines     : source is a narrower / companion specialization of target.
#   - complements : co-equal facets of one obligation, neither narrows the other.
#   - relates-to  : sibling obligations realized by one detector / one spec area.

edges:
  - source_ref: coder.design.primitives
    target_ref: coder.design.orphan-ui
    type: refines
    reason: >-
      Both assert "a rendering UI surface must compose the design system", emitted
      by one detector. orphan-ui is the codebase-wide obligation (every rendering
      .tsx in any layer must import the design system); primitives is the narrower
      presentation-layer-only companion. A bare presentation component triggers
      both by design — primitives is the focused presentation slice of the broader
      orphan-ui rule.

  - source_ref: coder.design.token-hardcoded
    target_ref: coder.design.token-color
    type: complements
    reason: >-
      Both enforce "visual values come from design tokens, not inline literals",
      emitted by one detector: token-color governs color literals (hex/rgba), while
      token-hardcoded extends the same intent to the remaining visual tokens
      (spacing, border-radius, motion duration). Co-equal token facets — neither
      narrows the other; together they cover the full token surface in wagon UI.

  - source_ref: coder.design.foundations
    target_ref: coder.design.token-hardcoded
    type: complements
    reason: >-
      Two halves of the single "spatial values come from foundations" obligation,
      split by surface: token-hardcoded forbids hardcoded spacing/radii/duration in
      WAGON UI files, while foundations forbids raw pixel literals INSIDE the design
      system's own primitives/components. Same compose-from-foundations rule applied
      on both sides of the design-system boundary; one detector emits both.

  - source_ref: coder.design.hierarchy-import
    target_ref: coder.design.foundations
    type: relates-to
    reason: >-
      Both are the design-system's internal-consistency rules, emitted by one
      detector: foundations requires primitives/components to compose foundations
      rather than raw values, while hierarchy-import requires design-system files to
      import only downward (tokens ← primitives ← components ← templates) and never
      out into a wagon. Together they keep the system itself layered and consistent.

  - source_ref: coder.design.orphan-export
    target_ref: coder.design.orphan-ui
    type: relates-to
    reason: >-
      The two "no orphaned wiring" obligations of the design system, emitted by one
      detector: orphan-export flags a design-system export that no consumer imports
      (dead supply), while orphan-ui flags a rendering UI file that imports no
      design-system element (disconnected demand). Together they keep supply and
      demand of the design system fully wired.
