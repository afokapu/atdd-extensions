schema_version: "1.0.0"

# Extension-LOCAL relationship FRAGMENT for the tester EXTENSION decomposition.
#
# Staging fragment authored by the tester-extension-atomize slice. The overseer
# CONSOLIDATES these nodes/edges into the shared
# official/atdd.extension.tester/relationships.yaml — do NOT hand-edit that shared
# manifest here (per task GOTCHAS).
#
# NO-ORPHAN (planner.relationship.no-orphan-nodes): every obligation node authored
# in this slice carries >=1 edge below.
#
# BOUNDARY (boundary spec §6.2): core<->extension edges are NOT authored as graph
# edges — the CORE nodes a detector realizes are declared narratively (in each
# convention body + each implementation's realizes_convention). Only
# extension-INTERNAL edges live here.
graph_id: atdd.extension.tester.relationships.fragment

# Obligation nodes authored in this slice (atdd.extension.tester/conventions/).
nodes:
  - tester.filename.urn
  - tester.migration.naming

edges:
  - source_ref: tester.migration.naming
    target_ref: tester.filename.urn
    type: relates-to
    reason: >-
      Both are documentation-only, stack-bound NAMING-discipline obligations: a
      test/migration artifact is named deterministically from its identity (the
      acceptance/test URN for tester.filename.urn; the migration ID for
      tester.migration.naming) and colocated with what it covers, so the artifact
      and its proof never drift apart. Co-equal naming facets of the tester
      extension, each realized by a different per-stack detector
      (tester.filename.urn -> python-pytest; tester.migration.naming -> the
      not-yet-built atdd.workspace.supabase provider). Extension-internal link.
