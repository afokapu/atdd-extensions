# Wave 1, cluster C2 — extension-LOCAL graph edges for the obligation nodes
# migrated by this worker. The overseer merges these into
# official/atdd.extension.coder/relationships.yaml (under `edges:`) and appends
# the five new node ids to its `nodes:` list. Field names per task spec
# (source_ref / target_ref / type / reason); the overseer normalizes to the
# relationships.yaml shape (from / to / type / rationale) on merge.
#
# Boundary spec §6.2: these are EXTENSION-INTERNAL edges only. The core coder
# validators each node realizes are recorded narratively in the node bodies'
# `source:` provenance, never as graph edges.
#
# Nodes introduced by this cluster (each appears in >= 1 edge below):
#   - coder.duplication.no-intra-layer-code-python
#   - coder.duplication.no-intra-layer-code-typescript
#   - coder.error-response.bare-string
#   - coder.error-response.code-format
#   - coder.boundaries.http-client

edges:
  # --- duplication: the two language realizations of one convention are peers ---
  - source_ref: coder.duplication.no-intra-layer-code-typescript
    target_ref: coder.duplication.no-intra-layer-code-python
    type: complements
    reason: >-
      Both realize the single coder.duplication obligation (no structurally
      identical fragment duplicated across different files of the same
      architectural layer) for their respective stacks — the TypeScript rule via
      regex structural normalization, the Python rule via AST-subtree hashing.
      Neither narrows the other; they are co-equal language facets of one
      convention.

  # --- error-response: bare-string + code-format are peers of one envelope ---
  - source_ref: coder.error-response.code-format
    target_ref: coder.error-response.bare-string
    type: complements
    reason: >-
      Both enforce the commons:error:response structured-error envelope from one
      detector run: bare-string governs that the HTTPException detail is a
      structured dict at all, while code-format governs that the dict's
      error_code field is a stable UPPER_SNAKE_CASE identifier. Together they make
      one error response both structured and machine-classifiable.

  # --- contract-driven HTTP boundary complements structured error ingress ---
  - source_ref: coder.boundaries.http-client
    target_ref: coder.error-response.bare-string
    type: complements
    reason: >-
      Both discipline the frontend<->backend HTTP seam: http-client requires
      egress to flow through the contract-driven client so request/response
      contracts apply uniformly, and bare-string requires the error responses
      returning over that seam to carry the structured envelope the client's
      contracts expect. Governing the same boundary from the request and the
      error-response sides, they complement each other.
