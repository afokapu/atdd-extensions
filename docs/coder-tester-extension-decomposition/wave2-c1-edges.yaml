schema_version: "1.0.0"

# Wave-2 cluster C1 obligation-node edge fragment (NOT yet consolidated into
# official/atdd.extension.coder/relationships.yaml — the overseer merges this).
#
# Covers the two MULTI-RULE complexity validators migrated in this wave:
#   * complexity_detector            -> 5 rule_ids (python)
#   * complexity_typescript_detector -> 3 rule_ids (TypeScript)
#
# NO-ORPHAN: every obligation node authored in this cluster appears in >=1 edge
# below. All edges are extension-internal (both endpoints live in
# atdd.extension.coder), so NONE is a core-targeted link — no `boundary:
# core-narrative` markers are needed. The core coder rules these realize are
# declared narratively in each node's `source:` provenance, never as graph edges
# (boundary spec §6.2).
fragment_id: atdd.extension.coder.wave2-c1
edges:

# ── Python complexity cluster — five co-emitted facets of one detector run ─────
# All five rule_ids are emitted by complexity_detector in a single run (the v1.1
# multi-rule channel). They are co-equal complexity facets of one REFACTOR-phase
# obligation; cyclomatic is the primary the detector's realizes_convention names,
# so the other four `complements` it. Neither facet narrows another — they are
# distinct metrics (path count / depth / length / arity / cognitive load) the
# same scan reports together.
- source_ref: coder.refactor.complexity-nesting
  target_ref: coder.refactor.complexity-cyclomatic
  type: complements
  reason: 'Both are co-emitted by the one python complexity detector run (emits_rule_ids): cyclomatic bounds
    the number of independent paths through a function, nesting bounds how deeply its control blocks stack.
    Co-equal complexity facets of the same REFACTOR-phase obligation; neither narrows the other.'
- source_ref: coder.refactor.complexity-length
  target_ref: coder.refactor.complexity-cyclomatic
  type: complements
  reason: 'Both are co-emitted by the one python complexity detector run: cyclomatic bounds branching,
    length bounds lines of code per function. Co-equal facets — a function can be long but flat or short
    but branchy — the same scan reports both.'
- source_ref: coder.refactor.complexity-params
  target_ref: coder.refactor.complexity-cyclomatic
  type: complements
  reason: 'Both are co-emitted by the one python complexity detector run: cyclomatic bounds branching,
    params bounds the parameter arity of a function. Co-equal facets of one complexity obligation; neither
    narrows the other.'
- source_ref: coder.refactor.complexity-cognitive
  target_ref: coder.refactor.complexity-cyclomatic
  type: complements
  reason: 'Both are co-emitted by the one python complexity detector run and both measure understandability,
    but distinctly: cyclomatic counts independent paths (flat or nested alike), cognitive (SonarQube/Campbell)
    penalises deep nesting over flat chains. Co-equal, complementary lenses on the same function — neither
    subsumes the other.'

# ── TypeScript complexity cluster — each -typescript node refines its sibling ──
# complexity_typescript_detector emits the cyclomatic/nesting/length subset for
# the TS stack. Per DESIGN §2.1 (*-typescript-refines-sibling), each TS node
# `refines` its language-neutral Python sibling: the same obligation peeled to
# the TypeScript stack via a regex (no-TS-runtime) detector. (The params and
# cognitive facets have no TS sibling — the core TS validator does not bind them.)
- source_ref: coder.refactor.complexity-cyclomatic-typescript
  target_ref: coder.refactor.complexity-cyclomatic
  type: refines
  reason: "Same \"function cyclomatic complexity stays under threshold\" obligation, peeled to the TypeScript\
    \ stack (regex decision-point count over a brace-matched function body, threshold parity <= 10) from the\
    \ language-neutral Python sibling. DESIGN \xA72.1 *-typescript-refines-sibling pattern; both nodes live\
    \ in atdd.extension.coder."
- source_ref: coder.refactor.complexity-nesting-typescript
  target_ref: coder.refactor.complexity-nesting
  type: refines
  reason: "Same \"function nesting depth stays under threshold\" obligation, peeled to the TypeScript stack\
    \ (regex brace-depth tracking gated on control-flow keywords, threshold parity <= 4) from the\
    \ language-neutral Python sibling. DESIGN \xA72.1 *-typescript-refines-sibling pattern; both nodes live\
    \ in atdd.extension.coder."
- source_ref: coder.refactor.complexity-length-typescript
  target_ref: coder.refactor.complexity-length
  type: refines
  reason: "Same \"function length stays under threshold\" obligation, peeled to the TypeScript stack (regex\
    \ LOC count over a brace-matched function body, excluding // and /* */ comments, threshold parity <= 50)\
    \ from the language-neutral Python sibling. DESIGN \xA72.1 *-typescript-refines-sibling pattern; both\
    \ nodes live in atdd.extension.coder."
